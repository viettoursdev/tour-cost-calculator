# backup.yml
#
# Hourly Supabase backup: a plain-SQL dump (`supabase db dump`, which emits SQL
# text — restore with `psql`), gzipped, uploaded to the Cloudflare R2 bucket
# `viettours-db-backups`. Retention is enforced by an R2 bucket lifecycle rule
# (14 days), not by this workflow.
#
# Secrets (GitHub repo → Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL      — direct Postgres connection string for production.
#   R2_ACCESS_KEY_ID     — R2 S3 API access key id.
#   R2_SECRET_ACCESS_KEY — R2 S3 API secret.
#   R2_ENDPOINT          — https://<accountid>.r2.cloudflarestorage.com

name: Supabase Backup

on:
  schedule:
    - cron: '17 * * * *'  # :17 of every hour, UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dump Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          STAMP="$(date -u +%Y/%m/%d/%H%M%SZ)"
          [ -n "$STAMP" ] || { echo "empty timestamp"; exit 1; }
          echo "OBJECT_KEY=$STAMP/supabase-dump.sql" >> "$GITHUB_ENV"
          npx --yes supabase db dump --db-url "$SUPABASE_DB_URL" -f dump.sql
          gzip -9 dump.sql

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp dump.sql.gz "s3://viettours-db-backups/${OBJECT_KEY}.gz" \
            --endpoint-url "$R2_ENDPOINT"

      - name: Scrub
        if: always()
        run: rm -f dump.sql dump.sql.gz
