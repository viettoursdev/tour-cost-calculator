# backup.yml
#
# Hourly Firestore backup with TWO safety nets:
#   1. Mirror — re-imports the dump into a second Firebase project so its
#      Firestore lags production by at most ~1 hour.
#   2. Artifact — uploads the dump as a 30-day GitHub Actions artifact for
#      point-in-time recovery against any project.
#
# Currently SRC is tour-cost-calculator-4336c (production) and DEST is
# tour-cost-calculator-v2 (backup-only — not served to clients). See CLAUDE.md.
#
# Secrets required (set in: GitHub repo → Settings → Secrets and variables → Actions):
#   FIREBASE_BACKUP_SRC_SA_JSON  — service-account JSON for the SOURCE (production) project.
#   FIREBASE_BACKUP_DEST_SA_JSON — service-account JSON for the DEST (mirror) project.
#
# Failure semantics:
#   - export fails → upload + import skip; run is red.
#   - export ok, upload fails → import skips; run is red (the mirror skip is
#     acceptable because the artifact is the more reliable safety net).
#   - export + upload ok, import fails → run is red but the artifact is
#     already preserved.
#   - SA files are scrubbed unconditionally on exit.

name: Firestore Backup

on:
  schedule:
    - cron: '17 * * * *'  # :17 of every hour, UTC — avoid top-of-hour cron contention
  workflow_dispatch:        # manual trigger

permissions:
  contents: read

concurrency:
  group: firestore-backup
  cancel-in-progress: false  # queue overlapping runs; do not drop them

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Materialize SA JSONs
        env:
          SRC_SA_JSON: ${{ secrets.FIREBASE_BACKUP_SRC_SA_JSON }}
          DEST_SA_JSON: ${{ secrets.FIREBASE_BACKUP_DEST_SA_JSON }}
        run: |
          printf '%s' "$SRC_SA_JSON" > src-sa.json
          printf '%s' "$DEST_SA_JSON" > dest-sa.json
          chmod 600 src-sa.json dest-sa.json

      - name: Export Firestore from SRC
        run: SA_PATH=src-sa.json node scripts/firestore-export.mjs

      - name: Upload dump artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firestore-dump-${{ github.run_id }}
          path: firestore-dump.json
          retention-days: 30
          if-no-files-found: error

      - name: Import Firestore into DEST (mirror)
        if: success()
        run: SA_PATH=dest-sa.json node scripts/firestore-import.mjs

      - name: Scrub SA files
        if: always()
        run: rm -f src-sa.json dest-sa.json
