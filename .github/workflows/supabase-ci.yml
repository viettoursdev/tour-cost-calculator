name: supabase-schema
on:
  push:
    paths: ['supabase/**']
  pull_request:
    paths: ['supabase/**']
jobs:
  pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pin: `latest` gọi GitHub API resolve release → dễ dính "rate limit
          # exceeded" trên runner. Tag cố định tải trực tiếp, ổn định.
          version: 2.108.0
      - run: supabase start
      - run: supabase test db
