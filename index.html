            new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:`(${form.partyB.title||"Giám đốc"})`,italics:true,size:18,color:"707880"})]}),
          ],
        }),
        new TableCell({
          width:{size:4513,type:WidthType.DXA},
          borders:{top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE}},
          children:[
            new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"ĐẠI DIỆN BÊN A",bold:true,size:24})]}),
            new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"(Ký và đóng dấu)",italics:true,size:18,color:"707880"})]}),
            new Paragraph({children:[new TextRun({text:" ",size:24})]}),
            new Paragraph({children:[new TextRun({text:" ",size:24})]}),
            new Paragraph({children:[new TextRun({text:" ",size:24})]}),
            new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"Ông HOÀNG ANH TUẤN",bold:true,size:22})]}),
            new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"(Giám Đốc Điều Hành)",italics:true,size:18,color:"707880"})]}),
          ],
        }),
      ]}),
    ],
  });
  children.push(sigTable);
  
  const doc=new Document({
    styles:{default:{document:{run:{font:"Times New Roman",size:22}}}},
    sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:1134,right:1134,bottom:1134,left:1134}}},children}],
  });
  
  Packer.toBlob(doc).then(blob=>{
    const safeName=(form.partyB.name||info.name||"HD").replace(/[^a-zA-Z0-9_\-]/g,"_").substring(0,40);
    if(window.saveAs)window.saveAs(blob,`HopDong_${safeName}_${new Date().toISOString().slice(0,10)}.docx`);
    else{
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=`HopDong_${safeName}.docx`;a.click();
      URL.revokeObjectURL(url);
    }
  }).catch(err=>{
    console.error(err);
    alert("Lỗi xuất Word: "+err.message);

}

/* ═══ CONTRACT MANAGER MODAL – Danh sách HĐ theo tour ═══ */
function ContractManagerModal({info,pax,roundedPPax,user,onClose}){
  const [contracts,setContracts]=useState(()=>ldContracts(info));
  const [editing,setEditing]=useState(null); // null = list view, "new" = new mode, object = edit existing
  
  const refresh=()=>setContracts(ldContracts(info));
  
  const handleDelete=(c)=>{
    if(!confirm(`Xoá hợp đồng "${c.contractNo||c.id}" của ${c.partyB?.name||"-"}?`))return;
    const next=contracts.filter(x=>x.id!==c.id);
    svContracts(info,next);
    setContracts(next);
  };
  const handleDuplicate=(c)=>{
    /* Chỉ mở editor với dữ liệu copy, KHÔNG lưu trước.
       Hợp đồng chỉ được tạo khi user bấm Lưu/Xuất trong editor. */
    const dup={...c,id:"hd_"+Date.now(),contractNo:"",createdAt:new Date().toISOString(),
      partyB:{...c.partyB,name:c.partyB.name+" (bản sao)"}};
    setEditing(dup);
  };
  
  // If editing mode, render ContractModal
  if(editing!==null){
    return <ContractModal
      info={info} pax={pax} roundedPPax={roundedPPax} user={user}
      existingContract={editing==="new"?null:editing}
      onSaved={refresh}
      onClose={()=>{setEditing(null);refresh();}}
    />;
  }
  
  // List view
  const tourTotalValue=Math.round((roundedPPax||0)*pax);
  const signedPax=contracts.reduce((s,c)=>s+(+c.contractPax||0),0);
  const signedValue=contracts.reduce((s,c)=>s+Math.round((+c.pricePerPax||0)*(+c.contractPax||0)),0);
  const paxPct=pax>0?(signedPax/pax*100):0;
  const valuePct=tourTotalValue>0?(signedValue/tourTotalValue*100):0;
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:1000}}>
        <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",padding:"22px 28px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:19,fontWeight:800,display:"flex",alignItems:"center",gap:10}}>📜 Quản lý hợp đồng</div>
            <div style={{fontSize:12,opacity:0.85,marginTop:3}}>Tour: <strong>{info.name||"(Chưa đặt tên)"}</strong> · {pax} khách · {tourTotalValue.toLocaleString("vi-VN")} ₫</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:8,color:"#fff",width:34,height:34,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
        </div>
        
        <div style={{padding:"20px 28px",maxHeight:"75vh",overflowY:"auto"}}>
          
          {/* Summary cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12,marginBottom:18}}>
            <div style={{background:"linear-gradient(135deg,#0f1c2d,#16314a)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
              <div style={{fontSize:11,opacity:0.7}}>📋 Số hợp đồng</div>
              <div style={{fontSize:24,fontWeight:800,marginTop:3}}>{contracts.length}</div>
            </div>
            <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
              <div style={{fontSize:11,opacity:0.85}}>👥 Khách đã ký</div>
              <div style={{fontSize:20,fontWeight:800,marginTop:3}}>{signedPax} <span style={{fontSize:13,fontWeight:500,opacity:0.8}}>/ {pax}</span></div>
              <div style={{height:4,background:"rgba(255,255,255,0.2)",borderRadius:2,marginTop:6,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(100,paxPct)+"%",background:paxPct>=100?"#27ae60":"#fff"}}/>
              </div>
              <div style={{fontSize:10,opacity:0.7,marginTop:3}}>{paxPct.toFixed(1)}% tổng đoàn</div>
            </div>
            <div style={{background:"linear-gradient(135deg,#dc3250,#c0392b)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
              <div style={{fontSize:11,opacity:0.85}}>💰 Giá trị đã ký</div>
              <div style={{fontSize:16,fontWeight:800,marginTop:3}}>{signedValue.toLocaleString("vi-VN")} ₫</div>
              <div style={{height:4,background:"rgba(255,255,255,0.2)",borderRadius:2,marginTop:6,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(100,valuePct)+"%",background:valuePct>=100?"#27ae60":"#fff"}}/>
              </div>
              <div style={{fontSize:10,opacity:0.7,marginTop:3}}>{valuePct.toFixed(1)}% giá trị tour</div>
            </div>
          </div>
          
          {/* Actions */}
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            <button onClick={()=>setEditing("new")} style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:10,padding:"10px 20px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>➕ Tạo hợp đồng mới</button>
          </div>
          
          {/* Contract list */}
          {contracts.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:"rgba(15,58,74,0.4)"}}>
              <div style={{fontSize:40,marginBottom:12}}>📜</div>
              <div style={{fontSize:15,fontWeight:600}}>Chưa có hợp đồng nào cho tour này</div>
              <div style={{fontSize:13,marginTop:6}}>Bấm "➕ Tạo hợp đồng mới" để bắt đầu</div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {contracts.map(c=>{
                const cAmount=Math.round((+c.pricePerPax||0)*(+c.contractPax||0));
                return(
                  <div key={c.id} style={{background:"#fff",border:"1px solid rgba(20,150,140,0.15)",borderRadius:10,padding:"14px 18px"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:200}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                          <span style={{background:"#14a08c",color:"#fff",fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:4}}>HĐ #{c.contractNo||"(chưa đánh số)"}</span>
                          <span style={{fontSize:11,color:"rgba(15,58,74,0.5)"}}>Ngày: {c.contractDate||"-"}</span>
                        </div>
                        <div style={{color:"#0f3a4a",fontWeight:700,fontSize:14}}>{c.partyB?.name||"(Chưa có Bên B)"}</div>
                        <div style={{color:"rgba(15,58,74,0.55)",fontSize:12,marginTop:3}}>{c.partyB?.rep?c.partyB.rep+" – "+c.partyB.title:""} {c.partyB?.email?"· "+c.partyB.email:""}</div>
                      </div>
                      <div style={{textAlign:"right",minWidth:160}}>
                        <div style={{color:"#dc3250",fontWeight:800,fontSize:16}}>{cAmount.toLocaleString("vi-VN")} ₫</div>
                        <div style={{color:"rgba(15,58,74,0.5)",fontSize:11,marginTop:2}}>{c.contractPax} khách × {Math.round(+c.pricePerPax||0).toLocaleString("vi-VN")} ₫</div>
                      </div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        <button onClick={()=>setEditing(c)} title="Xem & sửa" style={{background:"rgba(20,150,140,0.08)",border:"1px solid rgba(20,150,140,0.25)",color:"#0d7a6a",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>✏️ Sửa</button>
                        <button onClick={()=>{const startD=info.startDate?new Date(info.startDate):new Date();const endD=info.startDate?new Date(startD.getTime()+(info.days-1)*86400000):new Date();exportContract(c,info,startD,endD,"pdf");}} title="Xuất PDF lại" style={{background:"rgba(20,150,140,0.08)",border:"1px solid rgba(20,150,140,0.25)",color:"#0d7a6a",borderRadius:7,padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>📜 PDF</button>
                        <button onClick={()=>{const startD=info.startDate?new Date(info.startDate):new Date();const endD=info.startDate?new Date(startD.getTime()+(info.days-1)*86400000):new Date();exportContract(c,info,startD,endD,"docx");}} title="Xuất Word lại" style={{background:"rgba(43,87,151,0.08)",border:"1px solid rgba(43,87,151,0.25)",color:"#2b5797",borderRadius:7,padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>📄 Word</button>
                        <button onClick={()=>handleDelete(c)} title="Xoá" style={{background:"rgba(220,50,80,0.08)",border:"1px solid rgba(220,50,80,0.25)",color:"#dc3250",borderRadius:7,padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>🗑️</button>
                      </div>
                    </div>
                    {c.updatedAt&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px dashed rgba(20,150,140,0.1)",fontSize:10,color:"rgba(15,58,74,0.4)"}}>Cập nhật: {new Date(c.updatedAt).toLocaleString("vi-VN")} {c.lastExportedBy?"· bởi "+c.lastExportedBy:""}</div>}
                  </div>
                );
              })}
            </div>
          )}

/* ═══ SORTABLE LIST (drag-drop wrapper, SortableJS) ═══ */
function SortableList({onReorder,handle,className,style,deps,children}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Sortable)return;
    const s=window.Sortable.create(ref.current,{animation:160,handle:handle||undefined,
      ghostClass:"sortable-ghost",
      onEnd:(e)=>{
        if(e.oldIndex===e.newIndex||e.oldIndex==null)return;
        /* revert DOM move → để React kiểm soát thứ tự */
        const p=e.from;
        p.removeChild(e.item);
        p.insertBefore(e.item, p.children[e.oldIndex]||null);
        onReorder(e.oldIndex,e.newIndex);
      }});
    return()=>{try{s.destroy();}catch(_){}}
  },deps||[]);
  return <div ref={ref} className={className} style={style}>{children}</div>;
}
function reorder(arr,from,to){const a=[...arr];const[m]=a.splice(from,1);a.splice(to,0,m);return a;}

function getAIWorker(){try{return localStorage.getItem("vte_ai_worker")||"";}catch(e){return "";}}

async function callAIWorker(path,body){
  const url=getAIWorker();
  if(!url)throw new Error("Chưa cấu hình AI Worker URL (bấm ⚙️ AI để nhập)");
  const r=await fetch(url.replace(/\/+$/,"")+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error("Worker lỗi "+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error);
  return d;
}

/* ── Flight string parser (GDS/PNR + casual) ── */
function parseFlights(text){
  const MONTHS={JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12};
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const out=[];
  lines.forEach(line=>{
    let s=line.replace(/^\s*\d{1,2}\s+/," "); // bỏ số thứ tự đầu dòng (segment)
    /* Mã chuyến bay: 2 chữ + số (có thể cách: "BR 396") */
    const fm=s.match(/\b([A-Z]{2})\s*(\d{2,4})\b/);
    const flightNo=fm?`${fm[1]}${fm[2]}`:"";
    if(fm)s=s.replace(fm[0]," ");
    /* Ngày DDMMM (10JUN) hoặc DD/MM */
    let dateStr="";
    const dm=s.match(/\b(\d{1,2})(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/i);
    if(dm){const mo=MONTHS[dm[2].toUpperCase()];dateStr=`${dm[1].padStart(2,"0")}/${String(mo).padStart(2,"0")}`;s=s.replace(dm[0]," ");}
    else{const d2=s.match(/\b(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.]\d{2,4})?\b/);if(d2){dateStr=`${d2[1].padStart(2,"0")}/${d2[2].padStart(2,"0")}`;s=s.replace(d2[0]," ");}}
    const dayM=line.match(/ng[aà]y\s*(\d+)/i);
    /* Giờ: ưu tiên HH:MM, nếu không có thì 4 số HHMM */
    let times=[...s.matchAll(/\b(\d{1,2}):(\d{2})\b/g)].map(m=>`${m[1].padStart(2,"0")}:${m[2]}`);
    if(times.length<2){
      times=[...s.matchAll(/\b([01]?\d|2[0-3])([0-5]\d)\b/g)].map(m=>`${m[1].padStart(2,"0")}:${m[2]}`);
    }
    /* Sân bay: mã 3 chữ */
    const airports=[...s.matchAll(/\b([A-Z]{3})\b/g)].map(m=>m[1]).filter(a=>!["AND","THE"].includes(a));
    if(flightNo||times.length){
      const leg=dayM?`Ngày ${dayM[1]}`+(dateStr?` · ${dateStr}`:""):(dateStr||"");
      out.push({
        id:"f"+Date.now()+Math.random().toString(36).slice(2,6),
        group:"Nhóm 1",leg,flightNo,
        dep:[airports[0],times[0]].filter(Boolean).join(" "),
        arr:[airports[1],times[1]].filter(Boolean).join(" "),
      });
    }
  });
  return out;
}

  function updDayById(dayId,fn){setIt(p=>({...p,schedule:p.schedule.map(d=>d.id===dayId?fn(d):d)}));}

  /* ── Activity ops ── */
  const addAct=(dayId,segId)=>updSeg2(dayId,segId,s=>({...s,activities:[...s.activities,newActivity()]}));
  const delAct=(dayId,segId,actId)=>updSeg2(dayId,segId,s=>({...s,activities:s.activities.filter(a=>a.id!==actId)}));
  const updAct=(dayId,segId,actId,patch)=>updSeg2(dayId,segId,s=>({...s,activities:s.activities.map(a=>a.id===actId?{...a,...patch}:a)}));
  const reorderActs=(dayId,segId,from,to)=>updSeg2(dayId,segId,s=>({...s,activities:reorder(s.activities,from,to)}));
  function updSeg2(dayId,segId,fn){updDayById(dayId,d=>({...d,segments:d.segments.map(s=>s.id===segId?fn(s):s)}));}

  /* ── Flight ops ── */
  const addFlight=()=>setIt(p=>({...p,flights:[...p.flights,{id:"f"+Date.now(),group:"Nhóm",leg:"",flightNo:"",dep:"",arr:""}]}));
  const delFlight=(id)=>setIt(p=>({...p,flights:p.flights.filter(f=>f.id!==id)}));
  const updFlight=(id,patch)=>setIt(p=>({...p,flights:p.flights.map(f=>f.id===id?{...f,...patch}:f)}));

  /* ── Includes/Excludes ── */
  const updList=(key,i,v)=>setIt(p=>{const l=[...p[key]];l[i]=v;return{...p,[key]:l};});
  const addListItem=(key)=>setIt(p=>({...p,[key]:[...p[key],""]}));
  const delListItem=(key,i)=>setIt(p=>({...p,[key]:p[key].filter((_,j)=>j!==i)}));

  const inp={background:"#fff",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:8,padding:"8px 11px",fontSize:13,color:"#0f3a4a",fontFamily:"inherit",outline:"none",width:"100%"};
  const lbl={fontSize:11,fontWeight:700,color:"rgba(15,58,74,0.55)",letterSpacing:0.8,textTransform:"uppercase",marginBottom:5,display:"block"};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#e0fbf7 0%,#ffffff 35%,#a8e6dd 100%)",backgroundAttachment:"fixed"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0a5c50,#0d7a6a 40%,#14a08c)",padding:"16px 28px",color:"#fff",boxShadow:"0 6px 28px rgba(10,60,50,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:14,maxWidth:1280,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <img src={VTE_LOGO_WHITE} style={{height:48}} alt="Viettours"/>
            <div>
              <div style={{fontSize:18,fontWeight:900}}>🗺️ Trình tạo Chương trình tour</div>
              <div style={{fontSize:12,opacity:0.8}}>Mã: <strong style={{fontFamily:"monospace",letterSpacing:0.5}}>{code}</strong></div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{background:"rgba(255,255,255,0.15)",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:600}}>{user.name} · {user.role}</span>
            <button onClick={()=>setShowAISettings(true)} title="Cấu hình AI Worker" style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:9,padding:"8px 12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⚙️ AI</button>
            <button onClick={doSave} disabled={saving} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:9,padding:"8px 14px",color:"#fff",fontSize:13,fontWeight:700,cursor:saving?"not-allowed":"pointer",fontFamily:"inherit"}}>{saving?"⏳ Lưu...":"💾 Lưu"}</button>
            <button onClick={()=>exportItineraryDocx(it,code)} style={{background:"#fff",color:"#0d7a6a",border:"none",borderRadius:9,padding:"8px 16px",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📄 Xuất Word</button>
            <button onClick={onBack} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:9,padding:"8px 14px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>↩ Quay lại</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 28px"}}>
        {/* ── Thông tin chung ── */}
        <div className="glass-strong" style={{borderRadius:16,padding:22,marginBottom:18}}>
          <div style={{fontSize:15,fontWeight:800,color:"#0f3a4a",marginBottom:16}}>📋 Thông tin chương trình</div>
          {/* Region code selectors */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.4fr 0.8fr",gap:12,marginBottom:16}}>
            <div><label style={lbl}>Loại</label>
              <select value={it.type} onChange={e=>set("type",e.target.value)} style={inp}>
                {Object.entries(ITIN_TYPE).map(([k,v])=><option key={k} value={k}>{k} · {v}</option>)}
              </select></div>
            <div><label style={lbl}>Châu lục</label>
              <select value={it.continent} onChange={e=>{const c=e.target.value;set("continent",c);const first=Object.keys(ITIN_COUNTRY[c]||{})[0];setIt(p=>({...p,continent:c,country:first}));}} style={inp}>
                {Object.entries(ITIN_CONTINENT).map(([k,v])=><option key={k} value={k}>{k} · {v}</option>)}
              </select></div>
            <div><label style={lbl}>Quốc gia</label>
              <select value={it.country} onChange={e=>set("country",e.target.value)} style={inp}>
                {Object.entries(ITIN_COUNTRY[it.continent]||{}).map(([k,v])=><option key={k} value={k}>{k} · {v}</option>)}
              </select></div>
            <div><label style={lbl}>STT</label>
              <input type="number" min={1} value={it.seq} onChange={e=>set("seq",+e.target.value)} style={inp}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 0.6fr 0.6fr",gap:12,marginBottom:14}}>
            <div><label style={lbl}>Tên chương trình</label><input value={it.title} onChange={e=>set("title",e.target.value)} style={inp}/></div>
            <div><label style={lbl}>Điểm đến</label><input value={it.destination} onChange={e=>set("destination",e.target.value)} placeholder="VD: BẮC KINH" style={inp}/></div>
            <div><label style={lbl}>Số ngày</label><input type="number" min={1} value={it.days} onChange={e=>set("days",+e.target.value)} style={inp}/></div>
            <div><label style={lbl}>Số đêm</label><input type="number" min={0} value={it.nights} onChange={e=>set("nights",+e.target.value)} style={inp}/></div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <label style={lbl}>Giới thiệu điểm đến (3-4 câu)</label>
              <button onClick={genIntro} disabled={aiBusy==="intro"} style={{background:"rgba(142,68,173,0.1)",border:"1px solid rgba(142,68,173,0.3)",borderRadius:7,padding:"3px 10px",fontSize:11,fontWeight:700,color:"#8e44ad",cursor:aiBusy==="intro"?"wait":"pointer",fontFamily:"inherit",marginBottom:5}}>{aiBusy==="intro"?"⏳ Đang tạo...":"✨ Tạo bằng AI"}</button>
            </div>
            <textarea value={it.intro} onChange={e=>set("intro",e.target.value)} rows={3} placeholder="Đoạn thuyết minh ngắn về điểm đến..." style={{...inp,resize:"vertical"}}/></div>
          <div><label style={lbl}>🔗 Link báo giá (tự lấy điểm đến, ngày từ báo giá)</label>
            <select value={it.linkedQuoteId||""} onChange={e=>linkQuote(e.target.value)} style={inp}>
              <option value="">— Không liên kết —</option>
              {quotes.map(q=><option key={q.id} value={q.id}>{q.quoteCode?`[${q.quoteCode}] `:""}{q.name}{q.customer?` · ${q.customer}`:""}</option>)}
            </select>
            {it.linkedQuoteName&&<div style={{fontSize:11,color:"#14a08c",marginTop:5,fontWeight:600}}>✓ Đã liên kết báo giá: {it.linkedQuoteName}</div>}
          </div>
        </div>

        {/* ── Chuyến bay ── */}
        <div className="glass-strong" style={{borderRadius:16,padding:22,marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:15,fontWeight:800,color:"#0f3a4a"}}>✈️ Thông tin chuyến bay</div>
            <button onClick={addFlight} style={{background:"rgba(20,150,140,0.1)",border:"1px solid rgba(20,150,140,0.3)",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#0d7a6a",cursor:"pointer",fontFamily:"inherit"}}>+ Thêm chuyến</button>
          </div>
          {/* Paste & parse */}
          <div style={{background:"rgba(41,128,185,0.05)",border:"1px dashed rgba(41,128,185,0.3)",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:"#2980b9",marginBottom:6}}>📋 Dán đoạn thông tin chuyến bay → tự phân tích</div>
            <div style={{display:"flex",gap:8}}>
              <textarea value={flightPaste} onChange={e=>setFlightPaste(e.target.value)} rows={2} placeholder="Dán code GDS/PNR, VD:&#10;1  BR 396 10JUN SGN TPE  1545 2010&#10;2  BR 051 24JUN IAH TPE  0120 0605" style={{...inp,resize:"vertical",fontSize:12,flex:1}}/>
              <button onClick={doParseFlights} style={{background:"linear-gradient(135deg,#2980b9,#3498db)",color:"#fff",border:"none",borderRadius:9,padding:"0 18px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>⚡ Phân tích</button>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {it.flights.map(f=>(
              <div key={f.id} style={{display:"grid",gridTemplateColumns:"1.1fr 1.3fr 1fr 1.1fr 1.1fr 30px",gap:8,alignItems:"center"}}>
                <input value={f.group} onChange={e=>updFlight(f.id,{group:e.target.value})} placeholder="Nhóm" style={{...inp,padding:"6px 9px",fontSize:12}}/>
                <input value={f.leg} onChange={e=>updFlight(f.id,{leg:e.target.value})} placeholder="Đi · Ngày 1" style={{...inp,padding:"6px 9px",fontSize:12}}/>
                <input value={f.flightNo} onChange={e=>updFlight(f.id,{flightNo:e.target.value})} placeholder="CA904" style={{...inp,padding:"6px 9px",fontSize:12}}/>
                <input value={f.dep} onChange={e=>updFlight(f.id,{dep:e.target.value})} placeholder="TSN 05:40" style={{...inp,padding:"6px 9px",fontSize:12}}/>
                <input value={f.arr} onChange={e=>updFlight(f.id,{arr:e.target.value})} placeholder="PEK 11:35" style={{...inp,padding:"6px 9px",fontSize:12}}/>
                <button onClick={()=>delFlight(f.id)} style={{background:"none",border:"none",color:"rgba(220,50,80,0.5)",cursor:"pointer",fontSize:14}}>✕</button>
              </div>
            ))}
          </div>
        </div>

        {/* ── Lịch trình theo ngày (drag-drop) ── */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:800,color:"#0f3a4a"}}>📅 Lịch trình theo ngày <span style={{fontSize:11,fontWeight:400,color:"rgba(15,58,74,0.4)"}}>· kéo ⋮⋮ để đổi thứ tự</span></div>
          <button onClick={addDay} style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:9,padding:"8px 16px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ Thêm ngày</button>
        </div>
        <SortableList onReorder={reorderDays} handle=".day-handle" deps={[it.schedule.length]} style={{display:"flex",flexDirection:"column",gap:14}}>
          {it.schedule.map((d)=>(
            <div key={d.id} data-sid={d.id} className="glass-strong" style={{borderRadius:14,overflow:"hidden",border:"1px solid rgba(20,150,140,0.18)"}}>
              {/* Day header */}
              <div style={{background:"linear-gradient(135deg,#0f3a4a,#14566b)",color:"#fff",padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span className="day-handle" style={{cursor:"grab",fontSize:16,opacity:0.7,userSelect:"none"}}>⋮⋮</span>
                <span style={{fontWeight:900,fontSize:14}}>NGÀY {d.dayNum}</span>
                <input value={d.date} onChange={e=>updDay(d.id,{date:e.target.value})} placeholder="Date (tuỳ chọn)" style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:7,padding:"4px 9px",color:"#fff",fontSize:12,fontFamily:"inherit",outline:"none",width:130}}/>
                <input value={d.title} onChange={e=>updDay(d.id,{title:e.target.value})} placeholder="Điểm đến / tuyến (VD: TP.HCM → BẮC KINH)" style={{flex:1,minWidth:200,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:7,padding:"4px 10px",color:"#fff",fontSize:13,fontWeight:600,fontFamily:"inherit",outline:"none"}}/>
                <button onClick={()=>delDay(d.id)} style={{background:"rgba(220,50,80,0.25)",border:"none",borderRadius:6,color:"#fff",width:26,height:26,cursor:"pointer",fontSize:13}}>🗑</button>
              </div>
              {/* Segments */}
              <div style={{padding:"12px 14px"}}>
                {d.segments.map((seg,si)=>(
                  <div key={seg.id} style={{marginBottom:si<d.segments.length-1?12:0}}>
                    {/* segment group label (only show input if >1 segment) */}
                    {d.segments.length>1&&(
                      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                        <input value={seg.groupLabel} onChange={e=>updSeg(d.id,seg.id,{groupLabel:e.target.value})} placeholder="▸ NHÓM HCM — CA904" style={{...inp,padding:"5px 10px",fontSize:12,fontWeight:700,color:"#2980b9",flex:1}}/>
                        <button onClick={()=>delSeg(d.id,seg.id)} style={{background:"none",border:"none",color:"rgba(220,50,80,0.5)",cursor:"pointer",fontSize:13}}>✕ nhóm</button>
                      </div>
                    )}
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      <select onChange={e=>{const pr=TRANSPORT_PRESETS.find(x=>x.label===e.target.value);if(pr)updSeg(d.id,seg.id,{transport:pr.tpl});e.target.value="";}} value="" style={{...inp,padding:"6px 8px",fontSize:12,width:120,flexShrink:0,color:"#14a08c",fontWeight:600}}>
                        <option value="">+ Phương tiện</option>
                        {TRANSPORT_PRESETS.map(pr=><option key={pr.label} value={pr.label}>{pr.icon} {pr.label}</option>)}
                      </select>
                      <input value={seg.transport} onChange={e=>updSeg(d.id,seg.id,{transport:e.target.value})} placeholder="Phương tiện · khoảng cách · thời gian" style={{...inp,padding:"6px 10px",fontSize:12,color:"#14a08c",fontWeight:600,background:"rgba(20,150,140,0.05)",flex:1}}/>
                      <button onClick={()=>genDistance(d.id,seg.id,d.title)} disabled={aiBusy==="dist"+seg.id} title="Tự tính khoảng cách/thời gian từ tuyến ngày (Google Maps)" style={{background:"rgba(41,128,185,0.1)",border:"1px solid rgba(41,128,185,0.3)",borderRadius:7,color:"#2980b9",cursor:"pointer",fontSize:12,padding:"6px 10px",fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>{aiBusy==="dist"+seg.id?"⏳":"📍 Tính"}</button>
                    </div>
                    {/* activities header */}
                    <div style={{display:"flex",gap:7,alignItems:"center",padding:"0 0 4px 0",fontSize:10,fontWeight:700,color:"rgba(15,58,74,0.4)",letterSpacing:0.5,textTransform:"uppercase"}}>
                      <span style={{width:13,flexShrink:0}}></span>
                      <span style={{width:64,flexShrink:0,textAlign:"center"}}>Giờ</span>
                      <span style={{flex:1}}>Hoạt động / Thuyết minh</span>
                    </div>
                    {/* activities (drag-drop) */}
                    <SortableList onReorder={(f,t)=>reorderActs(d.id,seg.id,f,t)} handle=".act-handle" deps={[seg.activities.length,d.id]} style={{display:"flex",flexDirection:"column",gap:5}}>
                      {seg.activities.map(a=>(
                        <div key={a.id} data-sid={a.id} style={{display:"flex",gap:7,alignItems:"center"}}>
                          <span className="act-handle" style={{cursor:"grab",color:"rgba(15,58,74,0.3)",fontSize:13,userSelect:"none",flexShrink:0}}>⋮⋮</span>
                          <input value={a.time} onChange={e=>updAct(d.id,seg.id,a.id,{time:e.target.value})} placeholder="08:00" style={{...inp,width:64,flexShrink:0,padding:"6px 8px",fontSize:12.5,fontWeight:700,color:"#14a08c",textAlign:"center"}}/>
                          <input value={a.text} onChange={e=>updAct(d.id,seg.id,a.id,{text:e.target.value})} placeholder="Nội dung hoạt động / thuyết minh..." style={{...inp,flex:1,width:"auto",minWidth:0,padding:"6px 11px",fontSize:13}}/>
                          <button onClick={()=>genActivity(d.id,seg.id,a.id,a.text)} disabled={aiBusy===a.id} title="AI tạo thuyết minh cho địa điểm này" style={{background:"rgba(142,68,173,0.1)",border:"1px solid rgba(142,68,173,0.3)",borderRadius:6,color:"#8e44ad",cursor:aiBusy===a.id?"wait":"pointer",fontSize:12,padding:"3px 7px",fontFamily:"inherit",flexShrink:0}}>{aiBusy===a.id?"⏳":"✨"}</button>
                          <button onClick={()=>delAct(d.id,seg.id,a.id)} style={{background:"none",border:"none",color:"rgba(220,50,80,0.45)",cursor:"pointer",fontSize:13}}>✕</button>
                        </div>
                      ))}
                    </SortableList>
                    <button onClick={()=>addAct(d.id,seg.id)} style={{marginTop:6,background:"rgba(20,150,140,0.07)",border:"1px dashed rgba(20,150,140,0.3)",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:600,color:"#0d7a6a",cursor:"pointer",fontFamily:"inherit"}}>+ hoạt động</button>
                  </div>
                ))}
                <button onClick={()=>addSeg(d.id)} style={{marginTop:10,background:"rgba(41,128,185,0.08)",border:"1px dashed rgba(41,128,185,0.3)",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:600,color:"#2980b9",cursor:"pointer",fontFamily:"inherit"}}>+ Tách nhóm (ngày đầu/cuối nhiều chuyến bay)</button>
                {/* Bữa ăn bao gồm */}
                <div style={{marginTop:12,paddingTop:12,borderTop:"1px dashed rgba(20,150,140,0.18)",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,fontWeight:700,color:"rgba(15,58,74,0.6)"}}>🍽 Bữa ăn bao gồm:</span>
                  <div style={{display:"flex",gap:6}}>
                    {[["B","Sáng"],["L","Trưa"],["D","Tối"]].map(([m,name])=>(
                      <button key={m} onClick={()=>updDay(d.id,{meals:{...d.meals,[m]:!d.meals[m]}})}
                        style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",border:"1.5px solid",borderColor:d.meals[m]?"#14a08c":"rgba(20,150,140,0.3)",background:d.meals[m]?"#14a08c":"#fff",color:d.meals[m]?"#fff":"rgba(15,58,74,0.5)"}}>
                        {d.meals[m]?"✓ ":""}{name}
                      </button>
                    ))}
                  </div>
                  <input value={d.mealNote||""} onChange={e=>updDay(d.id,{mealNote:e.target.value})} placeholder="Ghi chú bữa ăn (VD: buffet KS, đặc sản địa phương...)" style={{...inp,flex:1,minWidth:180,padding:"6px 11px",fontSize:12}}/>
                </div>
              </div>
            </div>
          ))}
        </SortableList>

        {/* ── Bao gồm / Không bao gồm ── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:20}}>
          {[["includes","✓ GIÁ BAO GỒM","#27ae60"],["excludes","✕ KHÔNG BAO GỒM","#c0392b"]].map(([key,title,color])=>(
            <div key={key} className="glass-strong" style={{borderRadius:14,padding:18}}>
              <div style={{fontSize:13,fontWeight:800,color,marginBottom:10}}>{title}</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {it[key].map((x,i)=>(
                  <div key={i} style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input value={x} onChange={e=>updList(key,i,e.target.value)} style={{...inp,padding:"5px 9px",fontSize:12}}/>
                    <button onClick={()=>delListItem(key,i)} style={{background:"none",border:"none",color:"rgba(220,50,80,0.45)",cursor:"pointer",fontSize:12}}>✕</button>
                  </div>
                ))}
              </div>
              <button onClick={()=>addListItem(key)} style={{marginTop:8,background:"rgba(20,150,140,0.07)",border:"1px dashed rgba(20,150,140,0.3)",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:600,color:"#0d7a6a",cursor:"pointer",fontFamily:"inherit"}}>+ thêm mục</button>
            </div>
          ))}
        </div>
        <div style={{height:40}}/>
      </div>
      {showAISettings&&(
        <div className="modal-bg" onClick={()=>setShowAISettings(false)}>
          <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
            <div style={{background:"linear-gradient(135deg,#8e44ad,#9b59b6)",color:"#fff",padding:"18px 24px",borderRadius:"18px 18px 0 0"}}>
              <div style={{fontSize:17,fontWeight:800}}>⚙️ Cấu hình AI Worker</div>
              <div style={{fontSize:12,opacity:0.85,marginTop:2}}>Cloudflare Worker proxy cho Claude + Google Maps</div>
            </div>
            <div style={{padding:"22px 24px"}}>
              <label style={{fontSize:12,fontWeight:700,color:"rgba(15,58,74,0.6)",marginBottom:6,display:"block"}}>Worker URL</label>
              <input value={workerUrl} onChange={e=>setWorkerUrl(e.target.value)} placeholder="https://viettours-ai.xxx.workers.dev" style={{...inp,fontSize:13,marginBottom:10}}/>

/* ── Restaurant Library ── */
function RestaurantLibrary({user,onBack}){
  const [list,setList]=useState([]);const [loading,setLoading]=useState(true);const [search,setSearch]=useState("");
  useEffect(()=>{if(!window.fbOnRestaurants){setLoading(false);return;}const trySub=()=>{if(window.fbOnRestaurants){const u=window.fbOnRestaurants(items=>{setList(items);setLoading(false);});return()=>u&&u();}else setTimeout(trySub,300);};return trySub();},[]);
  const save=(next)=>{setList(next);if(window.fbSaveRestaurants)window.fbSaveRestaurants(next).catch(()=>{});};
  const addR=()=>save([...list,newRestaurant()]);
  const updR=(id,patch)=>save(list.map(r=>r.id===id?{...r,...patch}:r));
  const delR=(id)=>save(list.filter(r=>r.id!==id));
  const addMenu=(rid)=>updR(rid,{menus:[...(list.find(r=>r.id===rid).menus||[]),{id:"rm"+Date.now(),name:"Set mới",dishes:"",price:0,cur:"VND"}]});
  const updMenu=(rid,mid,patch)=>{const r=list.find(x=>x.id===rid);updR(rid,{menus:r.menus.map(m=>m.id===mid?{...m,...patch}:m)});};
  const delMenu=(rid,mid)=>{const r=list.find(x=>x.id===rid);updR(rid,{menus:r.menus.filter(m=>m.id!==mid)});};
  const inp={background:"#fff",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:8,padding:"7px 11px",fontSize:13,color:"#0f3a4a",fontFamily:"inherit",outline:"none",width:"100%"};
  const filtered=list.filter(r=>{const q=search.toLowerCase();if(!q)return true;return (r.name||"").toLowerCase().includes(q)||(r.city||"").toLowerCase().includes(q)||(r.country||"").toLowerCase().includes(q);});
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#e0fbf7 0%,#ffffff 35%,#a8e6dd 100%)",backgroundAttachment:"fixed"}}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:1100,margin:"0 auto",flexWrap:"wrap",gap:12}}>
          <div style={{fontSize:18,fontWeight:900}}>🏪 Thư viện Nhà hàng <span style={{fontSize:12,fontWeight:400,opacity:0.8}}>· {list.length} nhà hàng</span></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={addR} style={{background:"#fff",color:"#0d7a6a",border:"none",borderRadius:9,padding:"8px 16px",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ Thêm nhà hàng</button>
            <button onClick={onBack} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:9,padding:"8px 14px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>↩ Thực đơn</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 28px"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Tìm nhà hàng, thành phố..." style={{...inp,maxWidth:420,marginBottom:18}}/>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {filtered.map(r=>(
            <div key={r.id} className="glass-strong" style={{borderRadius:14,padding:18}}>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 30px",gap:10,marginBottom:12,alignItems:"center"}}>
                <input value={r.name} onChange={e=>updR(r.id,{name:e.target.value})} placeholder="Tên nhà hàng" style={{...inp,fontWeight:700}}/>
                <input value={r.country} onChange={e=>updR(r.id,{country:e.target.value})} placeholder="Quốc gia" style={inp}/>
                <input value={r.city} onChange={e=>updR(r.id,{city:e.target.value})} placeholder="Thành phố" style={inp}/>
                <button onClick={()=>delR(r.id)} style={{background:"none",border:"none",color:"rgba(220,50,80,0.5)",cursor:"pointer",fontSize:15}}>🗑</button>
              </div>
              <div style={{fontSize:11,fontWeight:700,color:"rgba(15,58,74,0.5)",marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>Thực đơn mẫu (mỗi món 1 dòng)</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {(r.menus||[]).map(m=>(
                  <div key={m.id} style={{display:"grid",gridTemplateColumns:"1.2fr 2.5fr 1fr 30px",gap:10,alignItems:"start",background:"rgba(168,230,221,0.12)",borderRadius:10,padding:"10px 12px"}}>
                    <input value={m.name} onChange={e=>updMenu(r.id,m.id,{name:e.target.value})} placeholder="Tên set" style={{...inp,padding:"6px 9px",fontSize:12,fontWeight:600}}/>
                    <textarea value={m.dishes} onChange={e=>updMenu(r.id,m.id,{dishes:e.target.value})} rows={3} placeholder="Gỏi cuốn&#10;Cá kho tộ&#10;Canh chua..." style={{...inp,padding:"6px 9px",fontSize:12,resize:"vertical"}}/>

                      <span style={{fontSize:11,color:"rgba(15,58,74,0.5)"}}>{m.cur}</span>
                    </div>
                    <button onClick={()=>delMenu(r.id,m.id)} style={{background:"none",border:"none",color:"rgba(220,50,80,0.45)",cursor:"pointer",fontSize:13}}>✕</button>
                  </div>
                ))}
              </div>
              <button onClick={()=>addMenu(r.id)} style={{marginTop:8,background:"rgba(20,150,140,0.07)",border:"1px dashed rgba(20,150,140,0.3)",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:600,color:"#0d7a6a",cursor:"pointer",fontFamily:"inherit"}}>+ Thêm set thực đơn</button>
            </div>
          ))}
        </div>
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

/* ── Menu Builder ── */
function MenuBuilder({user,initial,onBack}){
  const [it,setIt]=useState(()=>initial||({
    id:"mn"+Date.now(),type:"NN",continent:"CA",country:"TQ",seq:1,
    title:"THỰC ĐƠN CHƯƠNG TRÌNH",destination:"",days:4,
    linkedItineraryId:null,linkedItineraryName:"",linkedQuoteId:null,linkedQuoteName:"",
    schedule:[newMenuDay(1),newMenuDay(2),newMenuDay(3),newMenuDay(4)],
  }));
  const [restaurants,setRestaurants]=useState([]);
  const [quotes,setQuotes]=useState([]);
  const [itins,setItins]=useState([]);
  const [saving,setSaving]=useState(false);
  const code=generateMenuCode(it.type,it.continent,it.country,it.seq);
  useEffect(()=>{const subs=[];
    if(window.fbOnRestaurants)subs.push(window.fbOnRestaurants(setRestaurants));
    if(window.fbOnQuoteHistory)subs.push(window.fbOnQuoteHistory(l=>setQuotes(l||[])));
    if(window.fbOnItineraries)subs.push(window.fbOnItineraries(l=>setItins(l||[])));
    return()=>subs.forEach(u=>u&&u());
  },[]);
  /* auto-save (debounce 1.5s) — lưu sau mỗi lần input */
  const saveTimer=useRef(null);
  useEffect(()=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{if(window.fbSaveMenu)window.fbSaveMenu({...it,code}).catch(()=>{});},1500);
    return()=>{if(saveTimer.current)clearTimeout(saveTimer.current);};
  },[it]);

  const set=(k,v)=>setIt(p=>({...p,[k]:v}));
  const updDay=(id,patch)=>setIt(p=>({...p,schedule:p.schedule.map(d=>d.id===id?{...d,...patch}:d)}));
  const addDay=()=>setIt(p=>({...p,schedule:[...p.schedule,newMenuDay(p.schedule.length+1)]}));
  const delDay=(id)=>setIt(p=>({...p,schedule:p.schedule.filter(d=>d.id!==id).map((d,i)=>({...d,dayNum:i+1}))}));
  const reorderDays=(f,t)=>setIt(p=>({...p,schedule:reorder(p.schedule,f,t).map((d,i)=>({...d,dayNum:i+1}))}));
  const addMeal=(dayId)=>updDay2(dayId,d=>({...d,meals:[...d.meals,newMenuMeal("Tối")]}));
  const delMeal=(dayId,mid)=>updDay2(dayId,d=>({...d,meals:d.meals.filter(m=>m.id!==mid)}));
  const updMeal=(dayId,mid,patch)=>updDay2(dayId,d=>({...d,meals:d.meals.map(m=>m.id===mid?{...m,...patch}:m)}));
  function updDay2(dayId,fn){setIt(p=>({...p,schedule:p.schedule.map(d=>d.id===dayId?fn(d):d)}));}

  const pickRestaurant=(dayId,mid,rid)=>{
    const r=restaurants.find(x=>x.id===rid);
    if(!r){updMeal(dayId,mid,{restaurantId:"",restaurantName:""});return;}
    updMeal(dayId,mid,{restaurantId:rid,restaurantName:r.name});
  };
  const pickRestMenu=(dayId,mid,rid,menuId)=>{
    const r=restaurants.find(x=>x.id===rid);const m=r&&r.menus.find(x=>x.id===menuId);
    if(!m)return;
    updMeal(dayId,mid,{suggestedDishes:m.dishes||"",suggestedPrice:m.price||0,cur:m.cur||"VND",adjustedDishes:m.dishes||"",adjustedPrice:m.price||0});
  };
  const linkQuote=(qId)=>{const q=quotes.find(x=>x.id===qId);if(!q){setIt(p=>({...p,linkedQuoteId:null,linkedQuoteName:""}));return;}setIt(p=>({...p,linkedQuoteId:q.id,linkedQuoteName:q.name||"",destination:p.destination||(q.dest||"").toUpperCase()}));};
  const linkItin=(iId)=>{const i=itins.find(x=>x.id===iId);if(!i){setIt(p=>({...p,linkedItineraryId:null,linkedItineraryName:""}));return;}setIt(p=>({...p,linkedItineraryId:i.id,linkedItineraryName:i.destination||i.title||"",destination:p.destination||(i.destination||"")}));};
  const doSaveNow=async()=>{setSaving(true);try{await window.fbSaveMenu({...it,code});if(window.showToast)window.showToast("Đã lưu thực đơn","success",code);}catch(e){alert("Lỗi: "+e.message);}finally{setSaving(false);}};

  const inp={background:"#fff",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:8,padding:"7px 11px",fontSize:13,color:"#0f3a4a",fontFamily:"inherit",outline:"none",width:"100%"};

    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#e0fbf7 0%,#ffffff 35%,#a8e6dd 100%)",backgroundAttachment:"fixed"}}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:1100,margin:"0 auto",flexWrap:"wrap",gap:12}}>

          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>exportMenuDocx(it,code)} style={{background:"#fff",color:"#0d7a6a",border:"none",borderRadius:9,padding:"8px 16px",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📄 Xuất Word</button>
            <button onClick={doSaveNow} disabled={saving} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:9,padding:"8px 14px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{saving?"⏳":"💾 Lưu"}</button>
            <button onClick={onBack} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:9,padding:"8px 14px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>↩ Quay lại</button>

                        <div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:11,color:"rgba(15,58,74,0.5)"}}>Giá:</span><input type="number" value={meal.adjustedPrice} onChange={e=>updMeal(d.id,meal.id,{adjustedPrice:+e.target.value})} style={{...inp,padding:"5px 8px",fontSize:12,textAlign:"right",borderColor:"rgba(142,68,173,0.3)"}}/><span style={{fontSize:11,color:"rgba(15,58,74,0.5)"}}>{meal.cur}</span></div>

  );
}


function MainApp({user,onLogout}){
  const[template,setTemplate]=useState(null);
  const[info,setInfo]=useState({name:"",dest:"",days:1,nights:0});
  const[pax,setPax]=useState(20);
  const[rates,setRates]=useState({...RATES_INIT});
  const[showRates,setShowRates]=useState(false);
  const[margin,setMargin]=useState(5);
  const[vat,setVat]=useState(8);
  const[svcBasis,setSvcBasis]=useState(0);
  const[rounding,setRounding]=useState(100000);
  const[view,setView]=useState("cost");
  const[items,setItems]=useState({});
  const[catEnabled,setCatEnabled]=useState(Object.fromEntries(CATS.map(c=>[c.id,c.id!=="dmc"])));
  const[rateModal,setRateModal]=useState(null);
  const[showInvoice,setShowInvoice]=useState(false);
  const[showContract,setShowContract]=useState(false);
  const[showUserMgmt,setShowUserMgmt]=useState(false);
  const[showRateSync,setShowRateSync]=useState(false);
  const[showExportDD,setShowExportDD]=useState(false);
  const[showRateDD,setShowRateDD]=useState(false);
  const[showSaveHist,setShowSaveHist]=useState(false);
  const[currentQuoteId,setCurrentQuoteId]=useState(null);
  const[outputCurrency,setOutputCurrency]=useState("USD"); // DMC: currency to display totals
  const[dmcPrices,setDmcPrices]=useState({20:0,25:0,30:0,35:0,40:0}); // DMC package prices per pax per group size
  const[dmcMargin,setDmcMargin]=useState({type:"percent",value:0}); // DMC profit margin & service charge
  const fileInputRef=useRef(null);
  const excelInputRef=useRef(null);
  const quoteRef=useRef(null);

  /* ═══ Export / Import báo giá ═══ */
  const handleExportQuote=()=>{
    const data={
      _meta:{
        version:"1.0",
        exportedAt:new Date().toISOString(),
        exportedBy:user.name+" ("+user.role+")",
        app:"Viettours Tour Cost Calculator",
      },
      template,info,pax,rates,margin,vat,svcBasis,rounding,
      items,catEnabled,
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    const safeName=(info.name||"baogia").replace(/[^a-zA-Z0-9_\-]/g,"_");
    a.download=`Viettours_${safeName}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const handleImportQuote=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data._meta||data._meta.app!=="Viettours Tour Cost Calculator"){
          alert("⚠ File không phải là báo giá Viettours hợp lệ");return;
        }
        if(!confirm(`Nhập báo giá "${data.info?.name||"(không tên)"}" do ${data._meta.exportedBy||"?"} xuất ngày ${(data._meta.exportedAt||"").slice(0,10)}?\n\n⚠ Báo giá hiện tại sẽ bị thay thế.`))return;
        if(data.template)setTemplate(data.template);
        if(data.info)setInfo(data.info);
        if(data.pax!=null)setPax(data.pax);
        if(data.rates)setRates(data.rates);
        if(data.margin!=null)setMargin(data.margin);
        if(data.vat!=null)setVat(data.vat);
        if(data.svcBasis!=null)setSvcBasis(data.svcBasis);
        if(data.rounding!=null)setRounding(data.rounding);
        if(data.items)setItems(data.items);
        if(data.catEnabled)setCatEnabled(data.catEnabled);
        alert("✅ Nhập báo giá thành công!");
      }catch(err){
        alert("⚠ Lỗi đọc file: "+err.message);
      }
    };
    reader.readAsText(file);
    e.target.value=""; // reset for re-import same file
  };

  // ALL HOOKS MUST COME BEFORE EARLY RETURN (Rules of Hooks)
  const totalCost=useMemo(()=>
    CATS.reduce((s,cat)=>catEnabled[cat.id]?(items[cat.id]||[]).reduce((ss,it)=>ss+calcVND(it,rates,pax),s):s,0),
    [items,rates,pax,catEnabled]);
  // Note: uses ALL CATS - since domesticOnly cats are auto-disabled via catEnabled when intl template chosen

  if(template==="menu"){
    return <MenuApp user={user} onBack={()=>setTemplate(null)}/>;
  }
  if(template==="itinerary"){
    return <ItineraryApp user={user} onBack={()=>setTemplate(null)}/>;
  }
  if(!template){
    return <TemplateSelector user={user} onSelect={(t)=>{
      const tpl=TEMPLATES[t];
      if(t==="itinerary"||t==="menu"){setTemplate(t);return;}
      setTemplate(t);
      setInfo(tpl.sample);
      setItems(tpl.init(20));
      setVat(t==="domestic"?8:0);
      const enabled=Object.fromEntries(CATS.map(c=>[c.id,true]));
      if(t==="domestic"){enabled.visa=false;enabled.dmc=false;enabled.gala=false;}
      if(t==="intl"){
        CATS.forEach(c=>{if(c.domesticOnly)enabled[c.id]=false;});
        enabled.gala=false;
      }
      if(t==="dmc"){
        // Only enable DMC-relevant categories
        CATS.forEach(c=>{enabled[c.id]=DMC_CAT_IDS.includes(c.id);});
      }
      setCatEnabled(enabled);
      setView("cost");
    }}/>;
  }

  const updItem=(cid,it)=>setItems(p=>({...p,[cid]:(p[cid]||[]).map(x=>x.id===it.id?it:x)}));
  const addItem=(cid,override={})=>setItems(p=>({...p,[cid]:[...(p[cid]||[]),mkItem(override)]}));
  const delItem=(cid,id)=>setItems(p=>({...p,[cid]:(p[cid]||[]).filter(x=>x.id!==id)}));
  const toggleCat=(cid)=>setCatEnabled(p=>({...p,[cid]:!p[cid]}));
  // Profit = margin% × (totalCost + svcBasis) – this is the actual profit
  // svcBasis is OPTIONAL additional cost basis (e.g., overhead not in line items)
  const totalProfit=Math.round((totalCost+svcBasis)*margin/100);
  const totalSC=totalProfit; // keep variable name for backward compat
  const totalVAT=Math.round((totalCost+svcBasis+totalProfit)*vat/100);
  const sellingPPax=pax>0?(totalCost+svcBasis+totalProfit+totalVAT)/pax:0;
  const roundedPPax=Math.ceil(sellingPPax/rounding)*rounding;

  const curState={template,info,pax,rates,margin,vat,svcBasis,rounding,items,catEnabled};
  const loadState=(s,quoteId)=>{
    setTemplate(s.template);setInfo(s.info);setPax(s.pax);setRates(s.rates);
    setMargin(s.margin);setVat(s.vat);setSvcBasis(s.svcBasis);setRounding(s.rounding);
    setItems(s.items);setCatEnabled(s.catEnabled);

  };

  const pickFromRate=(itemData)=>{
    const cid=rateModal==="transport"?"transport"
      :rateModal==="staff"?"staff"
      :rateModal==="insurance"?"insurance"
      :rateModal==="dmc"?"dmc"
      :rateModal==="hotel"?"hotel"
      :rateModal==="logistics"?"logistics"
      :rateModal==="gala"?"gala"
      :rateModal==="teambuild"?"teambuild"
      :rateModal==="meeting"?"meeting"
      :"transport";
    addItem(cid,itemData);
    setRateModal(null);
  };

  const TABS=template==="dmc"?[
    {id:"cost",label:"📊 Bảng chi phí Breakdown"},
    ...(hasPerm(user,"viewHistory")?[{id:"history",label:"🕐 Lịch sử Breakdown"}]:[]),
  ]:[
    {id:"cost",label:"📊 Bảng chi phí"},
    {id:"summary",label:"💰 Tổng kết & Định giá"},
    {id:"dashboard",label:"📈 Dashboard biên lợi"},
    {id:"quote",label:"📄 Báo giá khách hàng"},
    {id:"payment",label:"🧾 Quản lý thanh toán"},
    ...(hasPerm(user,"viewHistory")?[{id:"history",label:"🕐 Lịch sử báo giá"}]:[]),
    ...((hasPerm(user,"manageContracts")||hasPerm(user,"viewContracts"))?[{id:"contracts",label:"📜 Hợp đồng"}]:[]),
    ...(hasPerm(user,"manageCustomers")?[{id:"customers",label:"👥 Khách hàng"}]:[]),
    ...(hasPerm(user,"manageNCC")?[{id:"ncc",label:"🏢 Nhà Cung Cấp"}]:[]),
  ];

  const viewProps={
    items,catEnabled,pax,rates,totalCost,margin,setMargin,vat,setVat,svcBasis,setSvcBasis,
    rounding,setRounding,totalSC,totalVAT,sellingPPax,roundedPPax,info,user,quoteRef,
    showRates,setShowRates,setRates,updItem,addItem,delItem,toggleCat,setRateModal,
    curState,loadState,template,currentQuoteId,setCurrentQuoteId,
    outputCurrency,setOutputCurrency,dmcPrices,setDmcPrices,dmcMargin,setDmcMargin,
    activeCATS:getCATS(template)
  };

  return(
    <div style={{minHeight:"100vh"}}>
      {rateModal==="hotel"&&<HotelModal template={template} canEdit={hasPerm(user,"editRateCard")} onClose={()=>setRateModal(null)} onPick={pickFromRate}/>}

      {showInvoice&&<InvoiceModal info={info} pax={pax} items={items} rates={rates} catEnabled={catEnabled} roundedPPax={roundedPPax} vat={vat} user={user} activeCATS={getCATS(template)} margin={margin} totalCost={totalCost} svcBasis={svcBasis} onClose={()=>setShowInvoice(false)}/>}

      {showRateSync&&<RateCardSyncModal user={user} onClose={()=>setShowRateSync(false)}/>}
      {showSaveHist&&<SaveQuoteModal info={info} template={template} pax={pax} totalCost={totalCost} user={user} curState={curState} currentQuoteId={currentQuoteId} onSave={(entry)=>{setShowSaveHist(false);if(entry?.id)setCurrentQuoteId(entry.id);}} onClose={()=>setShowSaveHist(false)}/>}
      <input type="file" ref={fileInputRef} accept=".json,application/json" onChange={handleImportQuote} style={{display:"none"}}/>
      <input type="file" ref={excelInputRef} accept=".xlsx" onChange={(e)=>{const f=e.target.files?.[0];if(f){importExcelPro(f,(s)=>{loadState(s);setView("cost");});}e.target.value="";}} style={{display:"none"}}/>

      <div style={{background:"linear-gradient(135deg,#0a5c50,#0d7a6a 40%,#14a08c)",borderBottom:"1px solid rgba(255,255,255,0.15)",padding:"18px 32px 16px",color:"#fff",boxShadow:"0 6px 28px rgba(10,60,50,0.25)"}}>
        <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:24,alignItems:"center",maxWidth:1400,margin:"0 auto"}}>

          {/* ── COL 1: Logo + Template badge ── */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <img src={VTE_LOGO_WHITE} style={{height:64}} alt="Viettours"/>
            <div style={{background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:20,padding:"4px 12px",fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#fff",whiteSpace:"nowrap"}}>
              {TEMPLATES[template].icon} {TEMPLATES[template].label}
            </div>
          </div>

          {/* ── COL 2: Tour info ── */}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {/* Tour name + destination */}

                <EN value={info.days} onChange={v=>setInfo(p=>({...p,days:v,nights:Math.max(0,v-1)}))} min={1} width={32} style={{color:"#fff",fontWeight:800,fontSize:15}} suffix=""/>

              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.12)",borderRadius:9,padding:"6px 14px"}}>

              {hasPerm(user,"manageUsers")&&<button onClick={()=>setShowUserMgmt(true)} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:9,padding:"6px 12px",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>👤 TK</button>}

                    <div style={{color:"#dc3250",fontWeight:900,fontSize:24,lineHeight:1}}>{fmt(roundedPPax)}</div>

            </button>
            {showRateDD&&<div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:"#fff",border:"1px solid rgba(20,150,140,0.2)",borderRadius:10,boxShadow:"0 8px 24px rgba(15,58,74,0.15)",zIndex:200,minWidth:170,padding:"6px 0"}}
              onMouseLeave={()=>setShowRateDD(false)}>
              {[
                {key:"hotel",   label:"🏨 Khách sạn",  color:"#d18a13", show:true},

                {key:"dmc",     label:"🌐 DMC",         color:"#8e44ad", show:template==="intl"},

                  onMouseEnter={e=>e.currentTarget.style.background="rgba(20,150,140,0.07)"}

          {hasPerm(user,"exportQuote")&&template!=="dmc"&&<div style={{position:"relative"}}>

              onMouseLeave={()=>setShowExportDD(false)}>

                {label:"📥 Excel báo giá", action:()=>{exportExcelPro(info,items,rates,pax,catEnabled,margin,vat,svcBasis,user,template);setShowExportDD(false);}},

                {label:"📜 Hợp đồng",  action:()=>{setShowContract(true);setShowExportDD(false);}},

        </div>
      </div>

      <div style={{padding:"26px 28px",maxWidth:1280,margin:"0 auto"}}>

        {view==="contracts"&&(hasPerm(user,"manageContracts")||hasPerm(user,"viewContracts"))&&<ContractView user={user}/>}
        {view==="customers"&&hasPerm(user,"manageCustomers")&&<CustomerView user={user}/>}
        {view==="ncc"&&hasPerm(user,"manageNCC")&&<NCCView user={user}/>}
      </div>
    </div>
  );
