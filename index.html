function NotificationBell({ user }) {
  const [notifications, setNotifications] = useState([]);
  const [open, setOpen] = useState(false);
  const [acting, setActing] = useState(null); // notif id being approved/rejected
  const [approvalNotes, setApprovalNotes] = useState({}); // {notifId: noteText}
  const ref = useRef(null);
  const canApprove=["CEO","Trưởng Phòng"].includes(user?.role);

  /* Xử lý duyệt / từ chối đề nghị thanh toán */
  const handleApproval=async(n,approved)=>{
    if(!n.data||acting)return;
    setActing(n.id);
    try{
      if(window.fbGetContracts&&window.fbPushContracts&&n.data?.contractId){
        const contracts=await window.fbGetContracts();
        const idx=contracts.findIndex(c=>c.id===n.data.contractId);
        if(idx>=0){
          const today=new Date().toISOString().slice(0,10);
          const updPayments=(contracts[idx].payments||[]).map(p=>
            p.id===n.data.paymentId?{...p,
              status:approved?"paid":"pending",
              paidDate:approved?today:null,
              approvedBy:approved?(user.name+" ("+user.role+")"):null,
              approvalRequested:!approved, // giữ chờ nếu từ chối
              rejectedBy:approved?null:user.name,
            }:p
          );
          contracts[idx]={...contracts[idx],payments:updPayments,updatedAt:today,updatedBy:user.name};
          await window.fbPushContracts(contracts);
        }
      }
      const _note=approvalNotes[n.id]||"";
      /* Build approvalKey */
      const _aKey=n.data.approvalKey||
        (n.data.tourKey&&(n.data.ciKey||n.data.ciKey==="")
          ?`${n.data.tourKey}_${n.data.ciKey}_${n.data.instIdx!=null?n.data.instIdx:""}`:"");
      const _stage=n.data.approvalStage||1;
      const _label=n.data.catName||n.data.paymentLabel||n.data.content||"";
      const _ref=n.data.tourName?`Tour: ${n.data.tourName}`:(n.data.contractNo?`HĐ #${n.data.contractNo}`:"");
      const _amt=(n.data.amount||0).toLocaleString("vi-VN")+" đ";
      const _sup=n.data.supplier?` · NCC: ${n.data.supplier}`:"";

      /* Ghi staged approval status lên Firestore (kèm tên người được chỉ định) */
      if(window.fbSetApprovalStage&&_aKey){
        await window.fbSetApprovalStage(_aKey,_stage,approved?"approved":"rejected",user.u,user.name,_note,{
          intendedApprover1Name:(n.data?.approver1Name||n.data?.approver1||"").split("(")[0].trim(),
          intendedApprover2Name:(n.data?.approver2Name||n.data?.approver2||"").split("(")[0].trim(),
        });
      }

      /* Thông báo tới collaborators trên cùng project (nếu có approvalKey) */
      if(_aKey&&window.fbOnQuoteHistory){
        (async()=>{
          try{
            const snap=await window.fbPullMasterRC?.();
            // Get quote_projects to find collaborators  
            if(window.fbGetQuoteProject){
              // Find quotes with matching tourKey from _aKey
              const tourKey=_aKey.split("_").slice(0,-2).join("_");
              // Notify collaborators via notification system - they'll see update via onSnapshot
            }
          }catch(e){}
        })();
      }

      /* Nếu stage 1 approved và có người duyệt 2 → forward sang stage 2 */
      if(approved&&_stage===1&&n.data.approver2Username&&window.fbSendNotification){
        await window.fbSendNotification(n.data.approver2Username,{
          type:"payment_approval",
          title:"💰 Đề nghị xác nhận thanh toán (Duyệt 2)",
          message:`${user.name} đã duyệt (bước 1): "${_label}"${_sup} · ${_ref} · ${_amt}${_note?" · Ghi chú: "+_note:""}`,
          createdBy:user.name+" ("+user.role+")",
          data:{...n.data,approvalStage:2,stage1ApproverNote:_note,stage1ApproverName:user.name},
        });
        /* Thông báo người gửi biết đang ở bước 2 */
        if(n.data.requestedBy){
          await window.fbSendNotification(n.data.requestedBy,{
            type:"info",title:"➡️ Đề nghị TT đang chờ duyệt bước 2",
            message:`${user.name} đã duyệt bước 1. Đang chờ ${n.data.approver2Name} duyệt bước 2.`,
            createdBy:user.name+" ("+user.role+")",data:{approvalKey:_aKey}
          });
        }
      } else if(window.fbSendNotification&&n.data.requestedBy){
        /* Stage 2 hoặc từ chối → thông báo kết quả cuối */
        await window.fbSendNotification(n.data.requestedBy,{
          type:approved?"payment_approved":"payment_rejected",
          title:approved?"✅ Đề nghị TT được duyệt":"❌ Đề nghị TT bị từ chối",
          message:approved
            ?`${user.name} đã duyệt: "${_label}"${_sup} · ${_ref} · ${_amt}${_note?" · Ghi chú: "+_note:""}`
            :`${user.name} từ chối: "${_label}"${_sup} · ${_ref}${_note?" · Lý do: "+_note:""}`,
          createdBy:user.name+" ("+user.role+")",
          data:{approvalKey:_aKey||null,contractId:n.data.contractId||null}
        });
      }
      /* Clear note + delete notification */
      setApprovalNotes(prev=>{const next={...prev};delete next[n.id];return next;});
      if(window.fbDeleteNotification)await window.fbDeleteNotification(user.u,n.id);
      if(window.showToast)window.showToast(
        approved?(_stage===1&&n.data.approver2Username?"Đã duyệt bước 1, chuyển sang bước 2":"Đã duyệt thanh toán"):"Đã từ chối thanh toán",
        approved?"approval_done":"error",
        _label||_ref
      );
    }catch(e){alert("❌ Lỗi: "+e.message);}
    finally{setActing(null);}
  };
  
  useEffect(() => {
    if (!user?.u) return;
    let unsub = null;
    /* Đợi Firebase module load xong rồi mới subscribe */
    const trySubscribe = () => {
      if (window.fbOnNotifications) {
        unsub = window.fbOnNotifications(user.u, (notifs) => {
          setNotifications(prev => {
            const newUnread = notifs.filter(n => !n.read && !prev.find(p => p.id === n.id));
            newUnread.forEach(n => {
              if (typeof showBrowserNotif !== 'undefined') showBrowserNotif(n.title, n.message);
              /* Toast for different notification types */
              if(window.showToast){
                const _extra=n.data?.approvalKey||n.data?.quoteId?{quoteId:n.data.quoteId||null}:{};
                if(n.type==="payment_approval")window.showToast(n.title,"approval_request",n.message.slice(0,60),4000,_extra);
                else if(n.type==="payment_approved")window.showToast(n.title,"approved",n.message.slice(0,60),4000,_extra);
                else if(n.type==="collab_invite")window.showToast(n.title,"info",n.message.slice(0,60),4000,{quoteId:n.data?.quoteId||null});
                else if(n.type==="payment_due")window.showToast(n.title,"warning",n.message.slice(0,60),4000,_extra);
              }
              /* Khi nhận được kết quả duyệt, cập nhật payment_approvals */
              if((n.type==="payment_approved"||n.type==="payment_rejected")&&n.data?.approvalKey&&window.fbSetPaymentApproval){
                const status=n.type==="payment_approved"?"approved":"rejected";
                const approverName=n.createdBy?.split("(")[0].trim()||"";
                window.fbSetPaymentApproval(n.data.approvalKey,status,approverName).catch(()=>{});
              }
            });
            return notifs;
          });
        });
      } else {
        /* Retry sau 300ms nếu Firebase chưa sẵn sàng */
        setTimeout(trySubscribe, 300);
      }
    };
    trySubscribe();
    return () => unsub && unsub();
  }, [user?.u]);

  // Close on outside click
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const unread = notifications.filter(n => !n.read).length;
  
  const ICONS = { collab_invite: '👥', payment_approval: '💰', payment_approved: '✅', payment_due: '⏰', acceptance_due: '📋' };
  const COLORS = { collab_invite: '#2980b9', payment_approval: '#f39c12', payment_approved: '#27ae60', payment_due: '#e74c3c', acceptance_due: '#8e44ad' };
  
  const fmtTime = (s) => { try { const d = new Date(s); const now = new Date(); const diff = Math.floor((now - d) / 60000); if (diff < 1) return 'Vừa xong'; if (diff < 60) return `${diff} phút trước`; if (diff < 1440) return `${Math.floor(diff/60)} giờ trước`; return d.toLocaleDateString('vi-VN'); } catch(e) { return s; } };

  return (
    <div ref={ref} style={{ position: 'relative', display: 'inline-block' }}>
      <button onClick={() => setOpen(s => !s)}
        style={{ background: 'rgba(255,255,255,0.15)', border: '1px solid rgba(255,255,255,0.3)', borderRadius: 9, padding: '4px 10px', color: '#fff', fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', position: 'relative', display: 'flex', alignItems: 'center', gap: 4 }}>
        🔔
        {unread > 0 && <span style={{ position: 'absolute', top: -4, right: -4, background: '#e74c3c', color: '#fff', borderRadius: '50%', width: 16, height: 16, fontSize: 9, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{unread > 9 ? '9+' : unread}</span>}
      </button>
      {open && (
        <div style={{ position: 'absolute', top: 'calc(100% + 8px)', right: 0, width: 360, background: '#fff', borderRadius: 14, boxShadow: '0 12px 32px rgba(15,58,74,0.18)', border: '1px solid rgba(20,150,140,0.15)', zIndex: 500, overflow: 'hidden' }}>
          {/* Header */}
          <div style={{ padding: '14px 16px', borderBottom: '1px solid rgba(20,150,140,0.1)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontWeight: 800, fontSize: 14, color: '#0f3a4a' }}>🔔 Thông báo {unread > 0 && <span style={{ background: '#e74c3c', color: '#fff', borderRadius: 10, padding: '1px 7px', fontSize: 10, marginLeft: 4 }}>{unread}</span>}</div>
            {unread > 0 && <button onClick={() => window.fbMarkAllRead && window.fbMarkAllRead(user.u)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, color: '#14a08c', fontWeight: 600, fontFamily: 'inherit' }}>Đọc tất cả</button>}
          </div>
          {/* List */}
          <div style={{ maxHeight: 380, overflowY: 'auto' }}>
            {notifications.length === 0 && <div style={{ padding: '32px 16px', textAlign: 'center', color: 'rgba(15,58,74,0.4)', fontSize: 13 }}>Chưa có thông báo</div>}
            {notifications.map(n => (
              <div key={n.id}
                style={{ padding: '11px 14px', borderBottom: '1px solid rgba(20,150,140,0.07)', background: n.read ? '#fff' : 'rgba(20,150,140,0.05)', display: 'flex', gap: 10, alignItems: 'flex-start' }}
                onClick={() => n.type!=="payment_approval"&&window.fbMarkOneRead&&window.fbMarkOneRead(user.u,n.id)}>
                <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>{ICONS[n.type] || '🔔'}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: n.read ? 500 : 700, fontSize: 13, color: n.read ? 'rgba(15,58,74,0.7)' : '#0f3a4a', marginBottom: 2 }}>{n.title}</div>
                  <div style={{ fontSize: 11, color: 'rgba(15,58,74,0.55)', lineHeight: 1.4 }}>{n.message}</div>
                  <div style={{ fontSize: 10, color: 'rgba(15,58,74,0.35)', marginTop: 3 }}>{fmtTime(n.createdAt)} · {n.createdBy}</div>
                  {/* Approve/Reject buttons — chỉ CEO/Trưởng Phòng */}
                  {n.type==="payment_approval"&&canApprove&&(
                    <div style={{marginTop:8}} onClick={e=>e.stopPropagation()}>
                      {/* Note/comment input */}
                      <textarea
                        value={approvalNotes[n.id]||""}
                        onChange={e=>setApprovalNotes(prev=>({...prev,[n.id]:e.target.value}))}
                        placeholder="Ghi chú / ý kiến (tuỳ chọn)..."
                        rows={2}
                        style={{width:"100%",padding:"6px 9px",border:"1px solid rgba(20,150,140,0.2)",borderRadius:7,fontSize:11,fontFamily:"inherit",color:"#0f3a4a",resize:"none",outline:"none",boxSizing:"border-box",marginBottom:6,background:"rgba(168,230,221,0.08)"}}/>
                      {/* Stage indicator */}
                      {n.data?.approvalStage===2&&<div style={{fontSize:10,color:"#2980b9",fontWeight:600,marginBottom:4}}>📋 Bước duyệt 2/2 — Quyết định cuối cùng</div>}
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>handleApproval(n,true)} disabled={acting===n.id}
                          style={{flex:1,padding:"6px 10px",background:"linear-gradient(135deg,#27ae60,#2ecc71)",color:"#fff",border:"none",borderRadius:7,cursor:acting===n.id?"not-allowed":"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",opacity:acting===n.id?0.7:1}}>
                          {acting===n.id?"⏳":"✅"} Duyệt
                        </button>
                        <button onClick={()=>handleApproval(n,false)} disabled={acting===n.id}
                          style={{flex:1,padding:"6px 10px",background:"rgba(220,50,80,0.1)",color:"#dc3250",border:"1px solid rgba(220,50,80,0.3)",borderRadius:7,cursor:acting===n.id?"not-allowed":"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",opacity:acting===n.id?0.7:1}}>
                          {acting===n.id?"⏳":"❌"} Từ chối
                        </button>
                      </div>
                    </div>
                  )}
                </div>
                {!n.read && <div style={{ width: 7, height: 7, borderRadius: '50%', background: COLORS[n.type] || '#14a08c', flexShrink: 0, marginTop: 4 }}/>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ TOAST SYSTEM ══════════════════════════════════════ */
const TOAST_CONFIG={
  success:       {icon:"✅",title:"Thành công"},
  info:          {icon:"ℹ️",title:"Thông tin"},
  warning:       {icon:"⚠️",title:"Cảnh báo"},
  error:         {icon:"❌",title:"Lỗi"},
  approval_request:{icon:"💰",title:"Yêu cầu duyệt"},
  approval_done: {icon:"✅",title:"Đã duyệt"},
  approved:      {icon:"🎉",title:"Được duyệt"},
  export:        {icon:"📄",title:"Xuất file"},
  sync:          {icon:"☁️",title:"Đồng bộ"},
};

function ToastContainer(){
  const [toasts,setToasts]=useState([]);
  const [leaving,setLeaving]=useState({});

  useEffect(()=>{
    window.showToast=(message,type="success",subMsg="",duration=4000,extra={})=>{
      const id=Date.now()+Math.random();
      setToasts(prev=>[{id,message,type,subMsg,duration,extra},...prev].slice(0,5));
      if(typeof window.playToastSound!=="undefined")window.playToastSound(type);
      setTimeout(()=>{
        setLeaving(prev=>({...prev,[id]:true}));
        setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),260);
      },duration);
    };
  },[]);

  const dismiss=(id)=>{
    setLeaving(prev=>({...prev,[id]:true}));
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),260);
  };

  return(
    <div className="toast-container">
      {toasts.map(t=>{
        const cfg=TOAST_CONFIG[t.type]||TOAST_CONFIG.info;
        return(
          <div key={t.id}
            className={`toast toast-${t.type}${leaving[t.id]?" leaving":""}`}
            onClick={()=>{
              /* CEO: click toast → load quote project */
              if(t.extra?.quoteId&&typeof window._ceoLoadQuote==="function"){
                window._ceoLoadQuote(t.extra.quoteId);
                dismiss(t.id);
              }
            }}
            style={{cursor:t.extra?.quoteId&&typeof window._ceoLoadQuote==="function"?"pointer":"default"}}>
            <span className="toast-icon">{cfg.icon}</span>
            <div className="toast-body">
              <div className="toast-title">{t.message||cfg.title}</div>
              {t.subMsg&&<div className="toast-msg">{t.subMsg}</div>}
              {t.extra?.quoteId&&<div className="toast-msg" style={{color:"#14a08c",fontWeight:600,marginTop:2}}>👆 Click để mở project</div>}
            </div>
            <button className="toast-close" onClick={e=>{e.stopPropagation();dismiss(t.id);}}>✕</button>
          </div>
        );
      })}
    </div>
  );
}

/* ═══ ROOT ═════════════════════════════════════════════ */
async function checkContractDeadlines(user) {
  if (!window.fbGetContracts || !window.fbSendNotification) return;
  try {
    const contracts = await window.fbGetContracts();
    const today = new Date();
    const in7days = new Date(today.getTime() + 7 * 86400000);
    
    for (const c of contracts) {
      const payments = c.payments || [];
      for (const p of payments) {
        if (p.status !== 'pending' || !p.dueDate) continue;
        const due = new Date(p.dueDate);
        if (due <= in7days && due >= today) {
          const daysLeft = Math.ceil((due - today) / 86400000);
          await window.fbSendNotification(user.u, {
            type: 'payment_due',
            title: '⏰ Sắp đến hạn thanh toán',
            message: `HĐ #${c.contractNo || c.id} - "${p.label}": ${(+p.amount||0).toLocaleString('vi-VN')} đ - còn ${daysLeft} ngày`,
            createdBy: 'Hệ thống',
            data: { contractId: c.id, paymentId: p.id }
          });
        }
      }
    }
  } catch(e) { console.warn('Deadline check failed:', e.message); }
}

function App(){
  const[user,setUser]=useState(ldSess);

  /* Sync users từ Firestore khi app load lần đầu */
  useEffect(()=>{
    // Request browser notification permission
    if (typeof requestBrowserNotifPermission !== 'undefined') {
      requestBrowserNotifPermission();
    }
    if(syncUsersFromCloud)syncUsersFromCloud();
    /* Lắng nghe thay đổi user realtime */
    if(window.fbOnUsers){
      const unsub=window.fbOnUsers(cloudUsers=>{
        if(!cloudUsers||cloudUsers.length===0)return;
        try{localStorage.setItem("vte_users",JSON.stringify(cloudUsers));}catch(e){}
      });
      return()=>unsub&&unsub();
    }
  },[]);

  const onLogin=(u)=>{
    setUser(u);svSess(u);
    window._vteUser=u;
    /* Pull lần đầu nếu user không có quyền edit */
    if(window._fbInitialPull&&!PERMISSIONS[u.role]?.editRateCard){
      window._fbInitialPull();
    }
    // Check deadlines after login
    setTimeout(() => checkContractDeadlines(u), 3000);
  };
  const onLogout=()=>{setUser(null);clrSess();window._vteUser=null;};
  useEffect(()=>{
    /* Expose user cho Firebase auto-sync module */
    window._vteUser=user||null;
    /* Initial pull khi app load với session đã có */
    if(user&&window._fbInitialPull&&!PERMISSIONS[user.role]?.editRateCard){
      window._fbInitialPull();
    }
  },[user]);
  return(
    <>
      <ToastContainer/>
      {user?<MainApp user={user} onLogout={onLogout}/>:<LoginScreen onLogin={onLogin}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
