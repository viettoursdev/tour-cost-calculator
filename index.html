/* ═══ EXPORT EXCEL – Bilingual VN/EN with formulas ════════════ */
function exportExcel(info,items,rates,pax,catEnabled,margin,vat,svcBasis,rounding,user,template){
  if(!window.XLSX){
    alert("Đang tải thư viện Excel. Vui lòng thử lại sau 3 giây.");
    return;
  }
  const XLSX=window.XLSX;
  
  // Build workbook with multiple sheets
  const wb=XLSX.utils.book_new();
  
  // ═══ SHEET 1: Cost Breakdown (bilingual) ═══════════════════
  const costRows=[];
  // Title rows
  costRows.push([`BẢNG TÍNH CHI PHÍ TOUR / TOUR COST BREAKDOWN`]);
  costRows.push([`${info.name||"Tour"}`]);
  costRows.push([`Điểm đến / Destination:`,info.dest||"",`Thời gian / Duration:`,`${info.days} ngày / ${info.days} days, ${info.nights} đêm / ${info.nights} nights`]);
  costRows.push([`Số khách / Pax:`,pax,`Ngày xuất / Date:`,new Date().toLocaleDateString("vi-VN")]);
  costRows.push([`Phụ trách / Sales:`,`${user.name} (${user.role})`,"","Viettours Incentives & Events"]);
  costRows.push([]);
  // Header row
  costRows.push([
    "STT","Hạng mục / Category","Dịch vụ / Service","Chi tiết / Details",
    "Tiền tệ / Cur","Đơn giá / Unit Price","Tỷ giá / Rate","Đơn giá VND",
    "Đơn vị / Unit","Lần / Times","Số lượng / Qty","Thành tiền VND / Total VND","FOC"
  ]);
  
  // Data rows
  let stt=0;
  const startDataRow=8; // Excel row 8 (1-indexed)
  CATS.forEach(cat=>{
    if(!catEnabled[cat.id])return;
    (items[cat.id]||[]).forEach(it=>{
      if(it.enabled===false)return;
      stt++;
      const rowNum=startDataRow+stt-1;
      const qty=it.qtyMode==="per_pax"?pax:it.qtyMode==="per_group"?1:it.customQty;
      const rate=rates[it.cur]||1;
      // Use Excel formulas where possible
      costRows.push([
        stt,
        `${cat.icon} ${cat.label} / ${cat.labelEn}`,
        it.name||"",
        it.note||"",
        it.cur,
        it.price,
        rate,
        {f:`F${rowNum}*G${rowNum}`}, // unit price VND
        it.unit,
        it.times,
        qty,
        it.foc?0:{f:`H${rowNum}*J${rowNum}*K${rowNum}`}, // total VND, 0 if FOC
        it.foc?"FOC":""
      ]);
    });
  });
  
  const lastDataRow=startDataRow+stt-1;
  
  // Subtotal row
  costRows.push([]);
  const subRowIdx=lastDataRow+2;
  costRows.push(["","TỔNG CHI PHÍ GỐC / TOTAL COST","","","","","","","","","",{f:`SUM(L${startDataRow}:L${lastDataRow})`},""]);
  // svcBasis row
  const basisRowIdx=subRowIdx+1;
  costRows.push(["","Service Charge Basis (tuỳ chọn / optional)","","","","","","","","","",svcBasis,""]);
  // Profit margin row
  const profitRowIdx=basisRowIdx+1;
  costRows.push(["",`Lợi nhuận / Profit Margin (${margin}%)`,"","","","","","","","","",{f:`(L${subRowIdx}+L${basisRowIdx})*${margin/100}`},""]);
  // VAT row
  const vatRowIdx=profitRowIdx+1;
  costRows.push(["",`Thuế VAT (${vat}%)`,"","","","","","","","","",{f:`(L${subRowIdx}+L${basisRowIdx}+L${profitRowIdx})*${vat/100}`},""]);
  // Total selling cả đoàn
  const totalSellingRowIdx=vatRowIdx+1;
  costRows.push(["","TỔNG GIÁ BÁN / TOTAL SELLING PRICE","","","","","","","","","",{f:`L${subRowIdx}+L${basisRowIdx}+L${profitRowIdx}+L${vatRowIdx}`},""]);
  // Price per pax
  const ppaxRowIdx=totalSellingRowIdx+1;
  costRows.push(["","Giá / khách (chưa làm tròn) / Per Pax (raw)","","","","","","","","","",{f:`L${totalSellingRowIdx}/${pax}`},""]);
  // Rounded
  const roundedRowIdx=ppaxRowIdx+1;
  costRows.push(["",`Giá / khách (làm tròn ${rounding/1000}K) / Per Pax (rounded)`,"","","","","","","","","",{f:`CEILING(L${ppaxRowIdx},${rounding})`},""]);
  
  const ws1=XLSX.utils.aoa_to_sheet(costRows);
  
  // Set column widths
  ws1["!cols"]=[
    {wch:5},{wch:28},{wch:32},{wch:38},{wch:8},{wch:14},{wch:10},{wch:14},
    {wch:14},{wch:6},{wch:7},{wch:18},{wch:6}
  ];
  
  // Merge title row
  ws1["!merges"]=[
    {s:{r:0,c:0},e:{r:0,c:12}}, // Title
    {s:{r:1,c:0},e:{r:1,c:12}}, // Tour name
  ];
  
  XLSX.utils.book_append_sheet(wb,ws1,"Cost Breakdown");
  
  // ═══ SHEET 2: Quote for Customer (bilingual, summarized) ═══
  const quoteRows=[];
  quoteRows.push([`VIETTOURS INCENTIVES & EVENTS`]);
  quoteRows.push([]);
  quoteRows.push([`QUOTATION / BÁO GIÁ`]);
  quoteRows.push([]);
  quoteRows.push([`Tour Name / Tên tour:`,info.name||""]);
  quoteRows.push([`Destination / Điểm đến:`,info.dest||""]);
  quoteRows.push([`Duration / Thời gian:`,`${info.days} days / ${info.days} ngày, ${info.nights} nights / ${info.nights} đêm`]);
  quoteRows.push([`Number of pax / Số khách:`,pax]);
  quoteRows.push([`Valid until / Có hiệu lực đến:`,new Date(Date.now()+7*24*3600*1000).toLocaleDateString("vi-VN")]);
  quoteRows.push([`Issued by / Phụ trách:`,`${user.name} (${user.role})`]);
  quoteRows.push([]);
  quoteRows.push([`INCLUDED SERVICES / DỊCH VỤ BAO GỒM`]);
  quoteRows.push([]);
  quoteRows.push(["No.","Category / Hạng mục","Service / Dịch vụ","Details / Chi tiết","Status"]);
  
  let qStt=0;
  CATS.forEach(cat=>{
    if(!catEnabled[cat.id])return;
    const catItems=(items[cat.id]||[]).filter(i=>i.enabled!==false&&i.name);
    catItems.forEach(it=>{
      qStt++;
      quoteRows.push([
        qStt,
        `${cat.icon} ${cat.label} / ${cat.labelEn}`,
        it.name,
        it.note||"",
        it.foc?"FOC / Miễn phí":"Included / Bao gồm"
      ]);
    });
  });
  
  quoteRows.push([]);
  quoteRows.push(["","","","TOTAL PER PAX / Giá / khách:",Math.ceil((svcBasis>0?(items?0:0):0)/rounding)*rounding]);
  // Compute final price for display
  let tc=0;
  CATS.forEach(cat=>{
    if(!catEnabled[cat.id])return;
    (items[cat.id]||[]).forEach(it=>{tc+=calcVND(it,rates,pax);});
  });
  const profit=Math.round((tc+svcBasis)*margin/100);
  const vatAmt=Math.round((tc+svcBasis+profit)*vat/100);
  const ppax=pax>0?(tc+svcBasis+profit+vatAmt)/pax:0;
  const rounded=Math.ceil(ppax/rounding)*rounding;
  
  // Re-do the last row
  quoteRows[quoteRows.length-1]=["","","","TOTAL PER PAX / Giá / khách:",rounded];
  quoteRows.push(["","","","TOTAL GROUP / Tổng cả đoàn:",rounded*pax]);
  if(vat>0)quoteRows.push(["","","",`Note: Inclusive of ${vat}% VAT / Đã bao gồm VAT ${vat}%`,""]);
  quoteRows.push([]);
  quoteRows.push(["Terms & Conditions / Điều khoản:"]);
  quoteRows.push(["• Quote valid 7 days from issue date / Báo giá có hiệu lực 7 ngày"]);
  quoteRows.push(["• 30% deposit required to confirm booking / Đặt cọc 30% để xác nhận"]);
  quoteRows.push(["• Price may change based on availability / Giá có thể thay đổi theo tình trạng phòng"]);
  
  const ws2=XLSX.utils.aoa_to_sheet(quoteRows);
  ws2["!cols"]=[{wch:5},{wch:28},{wch:35},{wch:45},{wch:20}];
  ws2["!merges"]=[
    {s:{r:0,c:0},e:{r:0,c:4}},
    {s:{r:1,c:0},e:{r:1,c:4}},
    {s:{r:3,c:0},e:{r:3,c:4}},
    {s:{r:12,c:0},e:{r:12,c:4}},
  ];
  XLSX.utils.book_append_sheet(wb,ws2,"Quote for Customer");
  
  // ═══ SHEET 3: Pricing Config ═══════════════════════════════
  const configRows=[
    ["PRICING CONFIGURATION / CẤU HÌNH GIÁ"],
    [],
    ["Parameter / Tham số","Value / Giá trị","Description / Mô tả"],
    ["Pax / Số khách",pax,"Total number of travelers / Tổng số khách"],
    ["Days / Số ngày",info.days,"Tour duration / Thời gian tour"],
    ["Profit margin %",margin,"Applied on (Cost + SC Basis)"],
    ["Service Charge Basis",svcBasis,"Optional additional cost basis"],
    ["VAT %",vat,"Applied after profit margin"],
    ["Rounding",rounding,"Round-up to nearest VND"],
    [],
    ["EXCHANGE RATES / TỶ GIÁ"],
    ["Currency / Tiền tệ","Rate to VND / Tỷ giá quy đổi VND"],
  ];
  Object.entries(rates).filter(([c])=>c!=="VND").forEach(([c,r])=>{
    configRows.push([c,r]);
  });
  configRows.push([]);
  configRows.push(["FORMULAS USED / CÔNG THỨC TÍNH"]);
  configRows.push(["1. Line VND","= Unit Price × Exchange Rate × Times × Quantity"]);
  configRows.push(["2. Subtotal","= SUM of all enabled lines (FOC = 0)"]);
  configRows.push(["3. Profit","= (Subtotal + SC Basis) × Margin %"]);
  configRows.push(["4. VAT","= (Subtotal + SC Basis + Profit) × VAT %"]);
  configRows.push(["5. Per pax","= (Subtotal + SC Basis + Profit + VAT) / Pax"]);
  configRows.push(["6. Final","= CEILING(Per pax / Rounding) × Rounding"]);
  
  const ws3=XLSX.utils.aoa_to_sheet(configRows);
  ws3["!cols"]=[{wch:25},{wch:18},{wch:50}];
  ws3["!merges"]=[
    {s:{r:0,c:0},e:{r:0,c:2}},
    {s:{r:10,c:0},e:{r:10,c:2}},
    {s:{r:configRows.length-7,c:0},e:{r:configRows.length-7,c:2}},
  ];
  XLSX.utils.book_append_sheet(wb,ws3,"Config & Formulas");
  
  // Save file
  const fileName=`Quote_${(info.name||"Tour").replace(/[^a-zA-Z0-9_\u00C0-\u1EF9]/g,"_")}_${new Date().toLocaleDateString("vi-VN").replace(/\//g,"-")}.xlsx`;
  XLSX.writeFile(wb,fileName);
}


/* ═══ EXPORT PDF – IMAGE (html2canvas, full màu giống web) ═══ */
async function exportPDFImage(quoteRef,info){
  if(!quoteRef.current){alert("Vui lòng vào tab Báo giá khách hàng trước");return;}
  if(!window.html2canvas||!window.jspdf){alert("Đang tải thư viện PDF, vui lòng thử lại sau 3 giây.");return;}
  const btn=document.getElementById("export-pdf-img-btn");
  if(btn){btn.disabled=true;btn.textContent="Đang tạo...";}
  try{
    const el=quoteRef.current;
    const canvas=await html2canvas(el,{scale:2.5,useCORS:true,backgroundColor:"#ffffff",logging:false});
    const imgData=canvas.toDataURL("image/jpeg",0.95);
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const pageW=210,pageH=297;
    const mX=12,mTop=12,mBot=14;
    const cW=pageW-mX*2, cH=pageH-mTop-mBot;
    const imgW=cW, imgH=(canvas.height*imgW)/canvas.width;
    let rendered=0,pageIdx=0;
    while(rendered<imgH){
      if(pageIdx>0)pdf.addPage();
      pdf.addImage(imgData,"JPEG",mX,mTop-rendered,imgW,imgH,undefined,"FAST");
      pdf.setFillColor(255,255,255);
      pdf.rect(0,0,pageW,mTop,"F");
      pdf.rect(0,pageH-mBot,pageW,mBot,"F");
      pdf.rect(0,0,mX,pageH,"F");
      pdf.rect(pageW-mX,0,mX,pageH,"F");
      pdf.setFontSize(8);pdf.setTextColor(20,160,140);
      pdf.text("Viettours Incentives & Events",mX,pageH-7);
      pdf.text(`Trang ${pageIdx+1}`,pageW-mX,pageH-7,{align:"right"});
      pdf.setDrawColor(20,160,140);pdf.setLineWidth(0.4);
      pdf.line(mX,mTop-2,pageW-mX,mTop-2);
      rendered+=cH;pageIdx++;
      if(pageIdx>25)break;
    }
    pdf.save(`BaoGia_${(info.name||"Tour").replace(/[^a-zA-Z0-9_\u00C0-\u1EF9]/g,"_")}_${new Date().toLocaleDateString("vi-VN").replace(/\//g,"-")}.pdf`);
  }catch(e){console.error(e);alert("Lỗi xuất PDF: "+e.message);}
  finally{if(btn){btn.disabled=false;btn.innerHTML="📄 PDF ảnh";}}
}

/* ═══ EXPORT PDF – VECTOR (jsPDF text, sắc nét, nhẹ) ═══════ */
function exportPDFVector(info,pax,items,rates,catEnabled,roundedPPax,vat,user,activeCATS,margin,totalCost,svcBasis){
  if(!window.jspdf){alert("Đang tải thư viện PDF, vui lòng thử lại sau 3 giây.");return;}
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const hasFont=loadVNFont(pdf);
  const FONT=hasFont?"DejaVu":"helvetica";
  const pageW=210,pageH=297,mX=15;
  let y=18;
  const teal=[20,160,140],dark=[15,58,74],gray=[120,130,140],red=[220,50,80],gold=[245,166,35];
  const fmtV=n=>Math.round(n).toLocaleString("vi-VN")+" \u0111";
  
  const checkPage=(need)=>{if(y+need>pageH-18){pdf.addPage();y=18;}};
  
  // Header band
  pdf.setFillColor(...teal);
  pdf.rect(0,0,pageW,8,"F");
  // Logo + Company name
  let headerX=mX;
  try{
    pdf.addImage(VTE_LOGO,"PNG",mX,y-4,38,22,undefined,"FAST");
    headerX=mX+42;
  }catch(e){}
  pdf.setFontSize(16);pdf.setTextColor(...teal);pdf.setFont(FONT,"bold");
  pdf.text("VIETTOURS INCENTIVES & EVENTS",headerX,y+6);
  y+=20;
  
  // Quote title band
  pdf.setFillColor(...teal);
  pdf.roundedRect(mX,y,pageW-mX*2,26,3,3,"F");
  pdf.setTextColor(255,255,255);pdf.setFont(FONT,"bold");pdf.setFontSize(9);
  pdf.text("BÁO GIÁ TOUR / QUOTATION",pageW/2,y+7,{align:"center"});
  pdf.setFontSize(16);
  pdf.text(info.name||"Tour",pageW/2,y+15,{align:"center"});
  pdf.setFontSize(10);pdf.setTextColor(255,224,130);pdf.setFont(FONT,"normal");
  pdf.text(`${info.dest||""} · ${info.days} ngày ${info.nights} đêm · ${pax} khách`,pageW/2,y+22,{align:"center"});
  y+=34;
  if(info.startDate){
    pdf.setFontSize(9);pdf.setTextColor(...dark);
    pdf.setFont(FONT,"normal");
    pdf.text(`Khởi hành: ${fmtDate(info.startDate)}  →  Kết thúc: ${fmtDate(calcEndDate(info.startDate,info.days))}`,pageW/2,y,{align:"center"});
    y+=7;
  }
  
  // Price highlight box
  pdf.setFillColor(255,248,225);
  pdf.roundedRect(mX,y,pageW-mX*2,24,3,3,"F");
  pdf.setDrawColor(...gold);pdf.setLineWidth(0.5);
  pdf.roundedRect(mX,y,pageW-mX*2,24,3,3,"S");
  pdf.setFontSize(9);pdf.setTextColor(...teal);pdf.setFont(FONT,"bold");
  pdf.text("GIÁ TRỌN GÓI / KHÁCH · PACKAGE PRICE / PAX",pageW/2,y+8,{align:"center"});
  pdf.setFontSize(22);pdf.setTextColor(...red);
  pdf.text(fmtV(roundedPPax),pageW/2,y+18,{align:"center"});
  y+=30;
  pdf.setFontSize(9);pdf.setTextColor(...dark);pdf.setFont(FONT,"normal");
  pdf.text(`Tổng đoàn ${pax} khách / Total group: ${fmtV(roundedPPax*pax)}`,pageW/2,y,{align:"center"});
  y+=12;
  
  // Services section
  pdf.setFontSize(11);pdf.setTextColor(...teal);pdf.setFont(FONT,"bold");
  pdf.text("DỊCH VỤ BAO GỒM / INCLUDED SERVICES",mX,y);
  y+=3;
  pdf.setDrawColor(...teal);pdf.setLineWidth(0.5);
  pdf.line(mX,y,pageW-mX,y);
  y+=7;
  
  activeCATS.forEach(cat=>{
    if(!catEnabled[cat.id])return;
    const catItems=(items[cat.id]||[]).filter(i=>i.name&&(calcVND(i,rates,pax)>0||i.foc===true));
    if(catItems.length===0)return;
    const sub=catItems.reduce((s,i)=>s+calcVND(i,rates,pax),0);
    checkPage(10);
    // Category header
    pdf.setFontSize(10);pdf.setTextColor(...dark);pdf.setFont(FONT,"bold");
    pdf.text(`${cat.label} / ${cat.labelEn}`,mX,y);
    pdf.setTextColor(...teal);
    pdf.text(pax>0?fmtV(sub/pax)+"/khách":"",pageW-mX,y,{align:"right"});
    y+=5;
    // Items
    pdf.setFont(FONT,"normal");pdf.setFontSize(9);
    catItems.forEach(it=>{
      checkPage(9);
      const itVnd=calcVND(it,rates,pax);
      const qty=it.qtyMode==="per_pax"?pax:it.qtyMode==="per_group"?1:it.customQty;
      const unitVnd=(rates[it.cur]||1)*it.price;
      const curSym=it.cur==="VND"?"₫":it.cur;
      pdf.setTextColor(...dark);
      pdf.text("• "+it.name,mX+4,y);
      if(it.foc){
        pdf.setTextColor(39,174,96);pdf.setFont(FONT,"bold");
        pdf.text("FOC - Miễn phí",pageW-mX,y,{align:"right"});
        pdf.setFont(FONT,"normal");
      }else{
        pdf.setTextColor(...dark);pdf.setFont(FONT,"bold");
        pdf.text(fmtV(itVnd),pageW-mX,y,{align:"right"});
        pdf.setFont(FONT,"normal");
      }
      y+=4.3;
      // Breakdown line: đơn giá × lần × SL
      if(!it.foc){
        pdf.setTextColor(...gray);pdf.setFontSize(7.5);
        const priceStr=it.cur==="VND"?fmtV(it.price):`${it.price.toLocaleString("vi-VN")} ${curSym} (${fmtV(unitVnd)})`;
        const parts=[priceStr];
        if(it.times>1)parts.push(`${it.times} ${it.unit.includes("đêm")?"đêm":it.unit.includes("ngày")?"ngày":it.unit.includes("bữa")?"bữa":"lần"}`);
        parts.push(`${qty} ${it.qtyMode==="per_pax"?"khách":it.unit.includes("phòng")?"phòng":it.unit.includes("xe")?"xe":"SL"}`);
        pdf.text("  "+parts.join(" × ")+" = "+fmtV(itVnd),mX+6,y);
        pdf.setFontSize(9);
        y+=4;
      }
      if(it.note){
        checkPage(5);
        pdf.setTextColor(...gray);pdf.setFontSize(8);pdf.setFont(FONT,"normal");
        const noteLines=pdf.splitTextToSize("  ↳ "+it.note,pageW-mX*2-8);
        pdf.text(noteLines,mX+6,y);
        y+=noteLines.length*3.5;
        pdf.setFontSize(9);pdf.setFont(FONT,"normal");
      }
    });
    y+=4;
  });
  
  // Footer note
  checkPage(30);
  y+=4;
  pdf.setDrawColor(...teal);pdf.setLineWidth(0.3);
  pdf.line(mX,y,pageW-mX,y);
  y+=6;
  pdf.setFontSize(8);pdf.setTextColor(...gray);pdf.setFont(FONT,"normal");
  const terms=[
    "• Thanh toán 70% sau khi ký hợp đồng / 70% payment after contract signing",
    "• Thanh toán 30% còn lại trước khởi hành / Remaining 30% before departure",
    "• Báo giá có hiệu lực 7 ngày / Quote valid 7 days",
    vat>0?`• Giá đã bao gồm VAT ${vat}% / Inclusive of ${vat}% VAT`:"• Giá chưa bao gồm VAT / Exclusive of VAT",
    `• Phụ trách / Issued by: ${user.name} (${user.role})`,
  ];
  terms.forEach(t=>{pdf.text(t,mX,y);y+=4.5;});
  
  // Footer on all pages
  const total=pdf.internal.getNumberOfPages();
  for(let i=1;i<=total;i++){
    pdf.setPage(i);
    pdf.setFontSize(8);pdf.setTextColor(...teal);pdf.setFont(FONT,"bold");
    pdf.text("Viettours Incentives & Events",mX,pageH-8);
    pdf.setTextColor(...gray);pdf.setFont(FONT,"normal");
    pdf.text(`Trang ${i}/${total}`,pageW-mX,pageH-8,{align:"right"});
  }
  
  if(window.showToast)window.showToast("Đã xuất PDF báo giá","export");
  pdf.save(`BaoGia_${(info.name||"Tour").replace(/[^a-zA-Z0-9_\u00C0-\u1EF9]/g,"_")}_vector_${new Date().toLocaleDateString("vi-VN").replace(/\//g,"-")}.pdf`);

  pdf.setFontSize(9);pdf.setTextColor(...dark);setF("normal");

  pdf.setFontSize(8);pdf.setTextColor(...dark);setF("normal");
  // Use custom terms if provided, else default (70% after contract signing)

    terms=paymentTerms.split("\\n").filter(t=>t.trim());
  }else{
    terms=EN?[

      "4. Chuyển khoản: [Tên ngân hàng] - [Số tài khoản] - [Chủ tài khoản]",

  }
  terms.forEach(t=>{const ls=pdf.splitTextToSize(t,pageW-mX*2);pdf.text(ls,mX,y);y+=ls.length*4+1;});
  y+=8;
  
  // ═══ Signatures ═══
  checkPage(34);

  pdf.setFontSize(9);pdf.setTextColor(...dark);setF("bold");
  pdf.text(T("KHÁCH HÀNG","CUSTOMER"),mX+sigW/2,y,{align:"center"});
  pdf.text(T("ĐẠI DIỆN CÔNG TY","COMPANY REPRESENTATIVE"),mX+sigW+sigW/2,y,{align:"center"});

  pdf.setFontSize(7.5);pdf.setTextColor(...gray);setF("normal");
  pdf.text(T("(Ký, ghi rõ họ tên)","(Signature & full name)"),mX+sigW/2,y,{align:"center"});
  pdf.text(T("(Ký, đóng dấu)","(Signature & stamp)"),mX+sigW+sigW/2,y,{align:"center"});
  y+=20;
  pdf.setTextColor(...dark);setF("bold");pdf.setFontSize(9);
  pdf.text(customer.name||"",mX+sigW/2,y,{align:"center"});
  pdf.text(user.name,mX+sigW+sigW/2,y,{align:"center"});
  
  // Footer all pages

  for(let i=1;i<=totalPg;i++){

  pdf.save(`Invoice_${invNo}_${(customer.name||"Customer").replace(/[^a-zA-Z0-9_]/g,"_")}.pdf`);
}

/* Convert number to Vietnamese words (simplified) */
function numberToVietWords(num){
  if(num===0)return "không";
  const units=["","một","hai","ba","bốn","năm","sáu","bảy","tám","chín"];
  const scales=["","nghìn","triệu","tỷ"];
  num=Math.round(num);
  let groups=[];
  while(num>0){groups.push(num%1000);num=Math.floor(num/1000);}
  const readGroup=(n,full)=>{
    let h=Math.floor(n/100),t=Math.floor((n%100)/10),u=n%10,s="";
    if(full||h>0){s+=units[h]+" trăm ";}
    if(t>1){s+=units[t]+" mươi ";if(u===1)s+="mốt ";else if(u===5)s+="lăm ";else if(u>0)s+=units[u]+" ";}
    else if(t===1){s+="mười ";if(u===5)s+="lăm ";else if(u>0)s+=units[u]+" ";}
    else if(t===0&&u>0){if(full||h>0)s+="lẻ ";s+=units[u]+" ";}
    return s;
  };
  let result="";
  for(let i=groups.length-1;i>=0;i--){
    if(groups[i]>0||i<groups.length-1){
      result+=readGroup(groups[i],i<groups.length-1&&result!=="")+scales[i]+" ";
    }
  }
  result=result.trim();
  return result.charAt(0).toUpperCase()+result.slice(1);
}

/* Convert VND amount to output currency */
function toOutputCurrency(vndAmount,outputCurrency,rates){
  if(outputCurrency==="VND"||!rates[outputCurrency])return vndAmount;
  return vndAmount/rates[outputCurrency];
}
function fmtCurrency(amount,currency){
  if(currency==="VND")return Math.round(amount).toLocaleString("vi-VN")+" ₫";
  if(currency==="JPY"||currency==="KRW")return Math.round(amount).toLocaleString()+" "+currency;
  return amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")+" "+currency;
}

  const {items,catEnabled,pax,rates,showRates,setShowRates,setRates,updItem,addItem,delItem,toggleCat,setRateModal,totalCost,user,curState,loadState,activeCATS,currentQuoteId,setCurrentQuoteId,template,outputCurrency,setOutputCurrency,dmcPrices,setDmcPrices,dmcMargin,setDmcMargin}=props;
  const isDMC=template==="dmc";
  return(
    <div className="fade-in">
      {/* DMC: currency selector + header */}
      {isDMC&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div style={{fontSize:14,fontWeight:700,color:"rgba(15,58,74,0.6)"}}>📋 Breakdown chi phí DMC — nhập giá theo từng hạng mục</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,color:"rgba(15,58,74,0.5)"}}>Hiển thị tổng theo:</span>
            <CurrencySelector value={outputCurrency} onChange={setOutputCurrency}/>
          </div>
        </div>
      )}
      <RatesPanel rates={rates} onChange={(c,v)=>setRates(p=>({...p,[c]:v}))} visible={showRates} onToggle={()=>setShowRates(s=>!s)}/>
      {activeCATS.map(cat=>(
        <CatBlock key={cat.id} cat={cat} items={items[cat.id]||[]} enabled={catEnabled[cat.id]} pax={pax} rates={rates}
          onUpd={it=>updItem(cat.id,it)} onAdd={()=>addItem(cat.id)} onDel={id=>delItem(cat.id,id)}
          onOpenRate={(k)=>setRateModal(k)} onToggleCat={()=>toggleCat(cat.id)} outputCurrency={isDMC?outputCurrency:undefined}/>
      ))}
      {/* DMC: Profit Margin & Service Charge row */}
      {isDMC&&dmcMargin!==undefined&&(()=>{
        const marginVND=dmcMargin.type==="percent"
          ?Math.round(totalCost*(dmcMargin.value||0)/100)
          :Math.round((dmcMargin.value||0)*(outputCurrency&&outputCurrency!=="VND"&&rates[outputCurrency]?rates[outputCurrency]:1));
        const marginDisplay=outputCurrency&&outputCurrency!=="VND"&&rates[outputCurrency]?(marginVND/rates[outputCurrency]):marginVND;
        const totalWithMarginVND=totalCost+marginVND;
        const totalWithMarginDisplay=outputCurrency&&outputCurrency!=="VND"&&rates[outputCurrency]?(totalWithMarginVND/rates[outputCurrency]):totalWithMarginVND;
        return(
          <div style={{background:"#fff",borderRadius:12,border:"1.5px solid rgba(142,68,173,0.25)",padding:"14px 18px",marginTop:10}}>
            <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <div style={{fontWeight:700,fontSize:14,color:"#8e44ad",flex:1,minWidth:180}}>💼 Profit Margin & Service Charge</div>
              {/* Toggle type */}
              <div style={{display:"flex",gap:6}}>
                {[{v:"percent",l:"% tổng chi phí"},{v:"fixed",l:"Số tiền cố định"}].map(opt=>(
                  <button key={opt.v} onClick={()=>setDmcMargin(p=>({...p,type:opt.v,value:0}))}
                    style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                      background:dmcMargin.type===opt.v?"#8e44ad":"rgba(142,68,173,0.08)",
                      color:dmcMargin.type===opt.v?"#fff":"#8e44ad",
                      border:"1.5px solid rgba(142,68,173,0.3)"}}>
                    {opt.l}
                  </button>
                ))}
              </div>
              {/* Value input */}
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="number" min={0} step={dmcMargin.type==="percent"?0.5:1}
                  value={dmcMargin.value||""}
                  onChange={e=>setDmcMargin(p=>({...p,value:+e.target.value}))}
                  placeholder="0"
                  style={{width:90,padding:"6px 10px",border:"1.5px solid rgba(142,68,173,0.3)",borderRadius:8,fontSize:14,fontWeight:700,color:"#8e44ad",fontFamily:"inherit",outline:"none",textAlign:"right"}}/>
                <span style={{fontSize:13,color:"#8e44ad",fontWeight:700}}>
                  {dmcMargin.type==="percent"?"%":outputCurrency}
                </span>
              </div>
              {/* Result */}
              <div style={{textAlign:"right",minWidth:140}}>
                <div style={{fontSize:12,color:"rgba(15,58,74,0.5)"}}>Margin: <strong style={{color:"#8e44ad"}}>{fmtCurrency(marginDisplay,outputCurrency||"VND")}</strong></div>
                <div style={{fontSize:13,fontWeight:800,color:"#0f3a4a",marginTop:2}}>Tổng + margin: <span style={{color:"#8e44ad"}}>{fmtCurrency(totalWithMarginDisplay,outputCurrency||"VND")}</span></div>
              </div>
            </div>
          </div>
        );
      })()}
      {/* DMC: compare panel */}
      {isDMC&&setDmcPrices&&(()=>{
        const marginVND2=dmcMargin?.type==="percent"
          ?Math.round(totalCost*(dmcMargin?.value||0)/100)
          :Math.round((dmcMargin?.value||0)*(outputCurrency&&outputCurrency!=="VND"&&rates[outputCurrency]?rates[outputCurrency]:1));
        return <DMCComparePanel totalCostVND={totalCost+marginVND2} pax={pax} rates={rates} outputCurrency={outputCurrency} dmcPrices={dmcPrices} setDmcPrices={setDmcPrices}/>;
      })()}
      <div className="glass-strong" style={{borderRadius:14,padding:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div style={{color:"rgba(15,58,74,0.55)",fontSize:13}}>
          {isDMC?`${activeCATS.reduce((s,c)=>s+(items[c.id]||[]).length,0)} dòng · Tổng: ${fmtCurrency(toOutputCurrency(totalCost,outputCurrency,rates),outputCurrency)}`:`Tổng ${activeCATS.reduce((s,c)=>s+(items[c.id]||[]).length,0)} dòng chi phí`}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"rgba(15,58,74,0.5)",fontSize:12}}>Tổng chi phí gốc cả đoàn</div>
          <div style={{color:"#0d7a6a",fontWeight:800,fontSize:22}}>{fmt(totalCost)}</div>
          <div style={{color:"rgba(15,58,74,0.45)",fontSize:12}}>{pax>0?fmt(totalCost/pax):""}/khách</div>
        </div>
      </div>
      {hasPerm(user,"viewHistory")&&<HistPanel user={user} cur={curState} onLoad={loadState} currentQuoteId={currentQuoteId} onSetQuoteId={setCurrentQuoteId} template={template}/>}
    </div>
  );
}

                  const priceStr=it.cur==="VND"?fmt(it.price):`${it.price.toLocaleString("vi-VN")} ${curSym} (${fmt(unitVnd)})`;

                  if(it.times>1)parts.push(`${it.times} ${it.unit.includes("đêm")?"đêm":it.unit.includes("ngày")?"ngày":it.unit.includes("bữa")?"bữa":"lần"}`);
                  parts.push(`${qty} ${it.qtyMode==="per_pax"?"khách":it.unit.includes("phòng")?"phòng":it.unit.includes("xe")?"xe":"SL"}`);

                    {it.note&&<div style={{color:"rgba(15,58,74,0.45)",fontSize:11,marginLeft:12,marginTop:1,fontStyle:"italic"}}>↳ {it.note}</div>}
                  </div>
                  );
                })}
              </div>
            );
          })}
        </div>
        <div style={{background:"rgba(255,255,255,0.6)",border:"1px solid rgba(20,150,140,0.15)",borderRadius:12,padding:16,fontSize:12,color:"rgba(15,58,74,0.55)",textAlign:"center",lineHeight:1.7}}>

    </div>
  );
}

/* ═══ PAYMENT MANAGEMENT VIEW – Quản lý thanh toán & công nợ ═══ */
function PaymentView(props){
  const {items,catEnabled,pax,rates,activeCATS,info,user}=props;
  
  // Storage keys based on tour
  const tourKey=(info.name||"tour").replace(/[^a-zA-Z0-9]/g,"_");
  const STORAGE_KEY="vte_payments_"+tourKey;
  const STORAGE_CUSTOM="vte_pay_custom_"+tourKey;
  
  // Build cost items from bảng chi phí (giá vốn đầu vào)
  const sourceItems=React.useMemo(()=>{
    const list=[];
    activeCATS.forEach(cat=>{
      if(!catEnabled[cat.id])return;
      (items[cat.id]||[]).forEach(it=>{
        if(it.enabled===false||it.foc===true)return;
        const vnd=calcVND(it,rates,pax);
        if(vnd<=0)return;
        list.push({
          key:cat.id+"_"+it.id,
          catId:cat.id,catLabel:cat.label,catIcon:cat.icon,catColor:cat.color,
          name:it.name,sourceAmount:vnd,custom:false,
        });
      });
    });
    return list;
  },[items,catEnabled,rates,pax,activeCATS]);
  
  // Payment state: {[costKey]: {supplier, tracked, customAmount, installments:[...], note}}
  const [payments,setPayments]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch(e){return {};}
  });
  // Custom items (chi phí tự tạo ngoài bảng chi phí)
  const [customItems,setCustomItems]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(STORAGE_CUSTOM)||"[]");}catch(e){return [];}
  });
  // Reload when tour changes
  useEffect(()=>{
    try{setPayments(JSON.parse(localStorage.getItem("vte_payments_"+tourKey)||"{}"));}catch(e){setPayments({});}
    try{setCustomItems(JSON.parse(localStorage.getItem("vte_pay_custom_"+tourKey)||"[]"));}catch(e){setCustomItems([]);}
  },[tourKey]);
  
  const [syncTimeout,setSyncTimeout]=useState(null);
  const syncToCloud=(nextPay,nextCustom)=>{
    /* Debounce 1s để tránh ghi quá nhiều */
    if(syncTimeout)clearTimeout(syncTimeout);
    setSyncTimeout(setTimeout(()=>{
      if(window.fbSaveTourPayments)window.fbSaveTourPayments(tourKey,nextPay,nextCustom).catch(()=>{});
    },1000));
  };
  const savePayments=(next)=>{
    setPayments(next);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(next));}catch(e){}
    syncToCloud(next,customItems);
  };
  const saveCustom=(next)=>{
    setCustomItems(next);
    try{localStorage.setItem(STORAGE_CUSTOM,JSON.stringify(next));}catch(e){}
    syncToCloud(payments,next);
  };
  
  const [expanded,setExpanded]=useState(null);
  const [reqModal,setReqModal]=useState(null);
  const [trackModal,setTrackModal]=useState(false);
  const [showAddCustom,setShowAddCustom]=useState(false);
  const [approvals,setApprovals]=useState({});
  const [fbSyncing,setFbSyncing]=useState(false);

  /* Real-time sync từ Firestore cho collaborators */
  useEffect(()=>{
    if(!window.fbOnTourPayments||!tourKey)return;
    const trySubscribe=()=>{
      if(window.fbOnTourPayments){
        const unsub=window.fbOnTourPayments(tourKey,(data)=>{
          if(!data)return;
          /* Cập nhật payments từ cloud */
          if(data.payments){
            setPayments(data.payments);
            try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data.payments));}catch(e){}
          }
          if(data.customItems){
            setCustomItems(data.customItems);
            try{localStorage.setItem(STORAGE_CUSTOM,JSON.stringify(data.customItems));}catch(e){}
          }
        });
        return()=>unsub&&unsub();
      }else{setTimeout(trySubscribe,300);}
    };
    return trySubscribe();
  },[tourKey]);

  useEffect(()=>{
    if(!window.fbOnPaymentApprovals)return;
    const trySubscribe=()=>{
      if(window.fbOnPaymentApprovals){
        const unsub=window.fbOnPaymentApprovals(setApprovals);
        return()=>unsub&&unsub();
      }else{setTimeout(trySubscribe,300);}
    };
    return trySubscribe();
  },[]);
  
  // Combine source items + custom items into full list
  const allItems=React.useMemo(()=>{
    const out=sourceItems.map(si=>{
      const rec=payments[si.key]||{};
      return {
        ...si,
        tracked:rec.tracked!==false, // default true
        amount:rec.customAmount!=null?+rec.customAmount:si.sourceAmount,
        isOverridden:rec.customAmount!=null&&+rec.customAmount!==si.sourceAmount,
      };
    });
    // Add custom items
    customItems.forEach(ct=>{
      const rec=payments[ct.key]||{};
      out.push({
        ...ct,
        tracked:rec.tracked!==false,
        amount:+ct.amount||0,
        sourceAmount:+ct.amount||0,
        custom:true,
        isOverridden:false,
      });
    });
    return out;
  },[sourceItems,payments,customItems]);
  
  // Only tracked items are shown in main list & summary
  const trackedItems=allItems.filter(i=>i.tracked);
  
  const getPayRec=(ci)=>({supplier:"",installments:[],note:"",...(payments[ci.key]||{})});
  const updatePayRec=(key,rec)=>savePayments({...payments,[key]:rec});
  
  const toggleTrack=(key)=>{
    const rec=payments[key]||{};
    updatePayRec(key,{...rec,tracked:rec.tracked===false?true:false});
  };
  const setCustomAmount=(key,val)=>{
    const rec=payments[key]||{};
    updatePayRec(key,{...rec,customAmount:val});
  };
  const resetAmount=(key)=>{
    const rec=payments[key]||{};
    const{customAmount,...rest}=rec;
    updatePayRec(key,rest);
  };
  
  const addInstallment=(ci)=>{
    const rec=getPayRec(ci);
    const paidSum=rec.installments.reduce((s,i)=>s+(+i.amount||0),0);
    const remaining=Math.max(0,ci.amount-paidSum);
    const newInst={label:`Đợt ${rec.installments.length+1}`,amount:remaining,status:"unpaid",paidDate:""};
    updatePayRec(ci.key,{...rec,installments:[...rec.installments,newInst]});
  };
  const updInstallment=(key,idx,field,val)=>{
    const rec=payments[key];if(!rec)return;
    const insts=[...(rec.installments||[])];
    insts[idx]={...insts[idx],[field]:val};
    updatePayRec(key,{...rec,installments:insts});
  };
  const delInstallment=(key,idx)=>{
    const rec=payments[key];if(!rec||!rec.installments)return;
    updatePayRec(key,{...rec,installments:rec.installments.filter((_,i)=>i!==idx)});
  };
  
  // Custom item handlers
  const handleAddCustom=(form)=>{
    const newItem={
      key:"custom_"+Date.now(),
      catId:form.catId,catLabel:form.catLabel,catIcon:form.catIcon,catColor:form.catColor,
      name:form.name,amount:form.amount,
    };
    saveCustom([...customItems,newItem]);
    setShowAddCustom(false);
  };
  const handleDelCustom=(key)=>{
    if(!confirm("Xoá khoản chi phí tự tạo này?"))return;
    saveCustom(customItems.filter(c=>c.key!==key));
    // Also clean its payment record
    const{[key]:_,...rest}=payments;
    savePayments(rest);
  };
  const handleEditCustomAmount=(key,val)=>{
    saveCustom(customItems.map(c=>c.key===key?{...c,amount:val}:c));
  };
  
  // Totals (only tracked items)
  const totalCost=trackedItems.reduce((s,ci)=>s+ci.amount,0);
  let totalPaid=0,totalScheduled=0;
  trackedItems.forEach(ci=>{
    const rec=getPayRec(ci);
    rec.installments.forEach(inst=>{
      const amt=+inst.amount||0;
      totalScheduled+=amt;
      if(inst.status==="paid")totalPaid+=amt;
    });
  });
  const totalRemaining=totalCost-totalPaid;
  const untracked=allItems.filter(i=>!i.tracked).length;
  
  // Group tracked items by category
  const byCategory={};
  trackedItems.forEach(ci=>{
    if(!byCategory[ci.catId])byCategory[ci.catId]={label:ci.catLabel,icon:ci.catIcon,color:ci.catColor,items:[]};
    byCategory[ci.catId].items.push(ci);
  });

  return(
    <div className="fade-in">
      {/* Action buttons */}
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <button onClick={()=>setTrackModal(true)} className="btn" style={{background:"rgba(20,150,140,0.1)",border:"1px solid rgba(20,150,140,0.3)",color:"#0d7a6a"}}>
          ⚙️ Quản lý hạng mục {untracked>0?`(${untracked} đang ẩn)`:""}
        </button>
        <button onClick={()=>setShowAddCustom(true)} className="btn" style={{background:"linear-gradient(135deg,#f5a623,#e67e22)",border:"none",color:"#fff"}}>
          ➕ Thêm chi phí tự tạo
        </button>
      </div>
      
      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:24}}>
        <div style={{background:"linear-gradient(135deg,#0f1c2d,#16314a)",borderRadius:14,padding:"18px 20px",color:"#fff"}}>
          <div style={{fontSize:12,opacity:0.7,marginBottom:6}}>💰 Tổng chi phí quản lý</div>
          <div style={{fontSize:22,fontWeight:800}}>{fmt(totalCost)}</div>
          <div style={{fontSize:11,opacity:0.6,marginTop:4}}>{trackedItems.length} khoản đang theo dõi</div>
        </div>
        <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",borderRadius:14,padding:"18px 20px",color:"#fff"}}>
          <div style={{fontSize:12,opacity:0.85,marginBottom:6}}>✅ Đã thanh toán</div>
          <div style={{fontSize:22,fontWeight:800}}>{fmt(totalPaid)}</div>
          <div style={{fontSize:11,opacity:0.75,marginTop:4}}>{totalCost>0?Math.round(totalPaid/totalCost*100):0}% tổng chi phí</div>
        </div>
        <div style={{background:"linear-gradient(135deg,#dc3250,#c0392b)",borderRadius:14,padding:"18px 20px",color:"#fff"}}>
          <div style={{fontSize:12,opacity:0.85,marginBottom:6}}>⚠️ Công nợ còn thiếu</div>
          <div style={{fontSize:22,fontWeight:800}}>{fmt(totalRemaining)}</div>
          <div style={{fontSize:11,opacity:0.75,marginTop:4}}>{totalCost>0?Math.round(totalRemaining/totalCost*100):0}% chưa trả</div>
        </div>
        <div style={{background:"linear-gradient(135deg,#f5a623,#e67e22)",borderRadius:14,padding:"18px 20px",color:"#fff"}}>
          <div style={{fontSize:12,opacity:0.85,marginBottom:6}}>📅 Đã lên lịch TT</div>
          <div style={{fontSize:22,fontWeight:800}}>{fmt(totalScheduled)}</div>
          <div style={{fontSize:11,opacity:0.75,marginTop:4}}>Tổng các đợt đã tạo</div>
        </div>
      </div>
      
      {trackedItems.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"rgba(15,58,74,0.4)"}}>
          <div style={{fontSize:40,marginBottom:12}}>📋</div>
          <div style={{fontSize:15,fontWeight:600}}>Chưa có khoản nào được theo dõi</div>
          <div style={{fontSize:13,marginTop:6}}>Bấm "⚙️ Quản lý hạng mục" để chọn khoản cần quản lý, hoặc "➕ Thêm chi phí tự tạo"</div>
        </div>
      )}
      
      {/* Cost items grouped by category */}
      {Object.entries(byCategory).map(([catId,grp])=>(
        <div key={catId} style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:18}}>{grp.icon}</span>
            <span style={{color:grp.color,fontWeight:800,fontSize:15}}>{grp.label}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {grp.items.map(ci=>{
              const rec=getPayRec(ci);
              const paidSum=rec.installments.filter(i=>i.status==="paid").reduce((s,i)=>s+(+i.amount||0),0);
              const remaining=ci.amount-paidSum;
              const isOpen=expanded===ci.key;
              const pct=ci.amount>0?Math.round(paidSum/ci.amount*100):0;
              return(
                <div key={ci.key} style={{background:"#fff",border:`1px solid ${isOpen?grp.color:"rgba(20,150,140,0.15)"}`,borderRadius:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                  {/* Item header */}
                  <div style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}} onClick={()=>setExpanded(isOpen?null:ci.key)}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{color:"#0f3a4a",fontWeight:700,fontSize:14}}>{ci.name}</span>
                        {ci.custom&&<span style={{background:"rgba(245,166,35,0.15)",color:"#d18a13",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:4}}>Tự tạo</span>}
                        {ci.isOverridden&&<span style={{background:"rgba(155,89,182,0.15)",color:"#8e44ad",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:4}}>Đã chỉnh giá</span>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                        <input placeholder="+ Tên nhà cung cấp..." value={rec.supplier} onClick={e=>e.stopPropagation()}
                          onChange={e=>updatePayRec(ci.key,{...rec,supplier:e.target.value})}
                          style={{background:"rgba(20,150,140,0.06)",border:"1px solid rgba(20,150,140,0.15)",borderRadius:6,padding:"3px 9px",fontSize:12,outline:"none",fontFamily:"inherit",color:"#0d7a6a",width:200,maxWidth:"40vw"}}/>
                      </div>
                    </div>
                    <div style={{textAlign:"right",minWidth:140}} onClick={e=>e.stopPropagation()}>
                      {/* Editable amount */}
                      {ci.custom?(
                        <EN value={ci.amount} onChange={v=>handleEditCustomAmount(ci.key,v)} min={0} width={140} style={{color:"#0f3a4a",fontWeight:800,fontSize:15,textAlign:"right"}} suffix=" ₫"/>
                      ):(
                        <EN value={ci.amount} onChange={v=>setCustomAmount(ci.key,v)} min={0} width={140} style={{color:ci.isOverridden?"#8e44ad":"#0f3a4a",fontWeight:800,fontSize:15,textAlign:"right"}} suffix=" ₫"/>
                      )}
                      <div style={{fontSize:11,marginTop:2,color:remaining<=0?"#27ae60":paidSum>0?"#f5a623":"rgba(15,58,74,0.4)"}}>
                        {remaining<=0?"✅ Đã trả đủ":paidSum>0?`Còn thiếu ${fmt(remaining)}`:"Chưa thanh toán"}
                      </div>
                      {ci.isOverridden&&<button onClick={()=>resetAmount(ci.key)} style={{background:"none",border:"none",color:"#8e44ad",fontSize:10,cursor:"pointer",marginTop:2,fontFamily:"inherit",textDecoration:"underline"}}>↺ Về giá vốn ({fmt(ci.sourceAmount)})</button>}
                    </div>
                    {/* Progress ring */}
                    <div style={{width:42,height:42,borderRadius:"50%",background:`conic-gradient(${grp.color} ${pct*3.6}deg, rgba(20,150,140,0.1) 0deg)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <div style={{width:32,height:32,borderRadius:"50%",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:grp.color}}>{pct}%</div>
                    </div>
                    {ci.custom&&<button onClick={e=>{e.stopPropagation();handleDelCustom(ci.key);}} style={{background:"rgba(220,50,80,0.08)",border:"1px solid rgba(220,50,80,0.2)",color:"#dc3250",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✕</button>}
                    <span style={{color:grp.color,fontSize:16}}>{isOpen?"▴":"▾"}</span>
                  </div>
                  
                  {/* Expanded: installments */}
                  {isOpen&&(
                    <div style={{padding:"0 16px 16px",borderTop:"1px solid rgba(20,150,140,0.1)"}}>
                      {rec.installments.length>0&&(
                        <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
                          {rec.installments.map((inst,idx)=>{
                          const _apKey=`${(info.name||"tour").replace(/[^a-zA-Z0-9]/g,"_")}_${ci.key}_${idx}`;
                          const _ap=approvals[_apKey];
                          return(
                            <div key={idx} style={{background:inst.status==="paid"?"rgba(39,174,96,0.07)":(_ap?.finalStatus||_ap?.status)==="approved"?"rgba(39,174,96,0.05)":(_ap?.finalStatus||_ap?.status)==="rejected"?"rgba(220,50,80,0.05)":"rgba(245,166,35,0.06)",border:`1px solid ${inst.status==="paid"?"rgba(39,174,96,0.25)":(_ap?.finalStatus||_ap?.status)==="approved"?"rgba(39,174,96,0.2)":(_ap?.finalStatus||_ap?.status)==="rejected"?"rgba(220,50,80,0.2)":"rgba(245,166,35,0.25)"}`,borderRadius:9,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                              {/* Approval status badge - 3 states */}
                              {inst.status!=="paid"&&(()=>{
                                const fs=_ap?.finalStatus||_ap?.status||"";
                                const isDone=fs==="approved";
                                const isRejected=fs==="rejected";
                                const rejectBy=_ap?.stage1?.status==="rejected"?_ap.stage1.approverName?.split("(")[0].trim():_ap?.stage2?.status==="rejected"?_ap.stage2.approverName?.split("(")[0].trim():_ap?.approverName?.split("(")[0].trim()||"";
                                return isDone?(
                                  <span style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,background:"rgba(39,174,96,0.12)",color:"#27ae60",border:"1px solid rgba(39,174,96,0.3)",whiteSpace:"nowrap",flexShrink:0}}>✅ Đã duyệt</span>
                                ):isRejected?(
                                  <span style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,background:"rgba(220,50,80,0.1)",color:"#dc3250",border:"1px solid rgba(220,50,80,0.25)",whiteSpace:"nowrap",flexShrink:0}}>❌ Từ chối{rejectBy?` · ${rejectBy}`:""}</span>
                                ):(
                                  <span style={{fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"rgba(245,166,35,0.1)",color:"#d18a13",border:"1px dashed rgba(245,166,35,0.4)",whiteSpace:"nowrap",flexShrink:0}}>⏳ Chờ duyệt</span>
                                );
                              })()}
                              <input value={inst.label} onChange={e=>updInstallment(ci.key,idx,"label",e.target.value)}
                                style={{background:"#fff",border:"1px solid rgba(20,150,140,0.2)",borderRadius:6,padding:"5px 9px",fontSize:12,outline:"none",fontFamily:"inherit",color:"#0f3a4a",width:110}}/>
                              <EN value={inst.amount} onChange={v=>updInstallment(ci.key,idx,"amount",v)} min={0} width={110} style={{color:"#0f3a4a",fontWeight:700,fontSize:13}} suffix=" ₫"/>
                              <button onClick={()=>updInstallment(ci.key,idx,"status",inst.status==="paid"?"unpaid":"paid")}
                                style={{background:inst.status==="paid"?"#27ae60":"rgba(15,58,74,0.08)",color:inst.status==="paid"?"#fff":"rgba(15,58,74,0.6)",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
                                {inst.status==="paid"?"✅ Đã TT":"⏳ Chưa TT"}
                              </button>
                              {inst.status==="paid"&&(
                                <input type="date" value={inst.paidDate||""} onChange={e=>updInstallment(ci.key,idx,"paidDate",e.target.value)}
                                  style={{background:"#fff",border:"1px solid rgba(20,150,140,0.2)",borderRadius:6,padding:"4px 8px",fontSize:12,outline:"none",fontFamily:"inherit",color:"#0d7a6a"}}/>
                              )}
                              <div style={{flex:1}}/>
                              {hasPerm(user,"exportQuote")&&<button onClick={()=>setReqModal({ci,inst,idx,approvalStatus:approvals[`${(info.name||"tour").replace(/[^a-zA-Z0-9]/g,"_")}_${ci.key}_${idx}`]})} title="Xuất phiếu đề nghị thanh toán"
                                style={{background:"rgba(20,150,140,0.1)",border:"1px solid rgba(20,150,140,0.3)",color:"#0d7a6a",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>📄 Phiếu ĐN</button>}
                              <button onClick={()=>delInstallment(ci.key,idx)} style={{background:"none",border:"none",color:"rgba(220,50,80,0.5)",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>✕</button>
                            </div>
                          );
                        })}
                        </div>
                      )}
                      <button onClick={()=>addInstallment(ci)} style={{marginTop:10,width:"100%",background:"rgba(20,150,140,0.06)",border:`1px dashed ${grp.color}`,borderRadius:8,padding:"9px",cursor:"pointer",color:grp.color,fontWeight:700,fontSize:13,fontFamily:"inherit"}}>
                        ➕ Thêm đợt thanh toán {rec.installments.length===0?"(cọc / toàn bộ)":""}
                      </button>
                      <input placeholder="Ghi chú (số TK, điều kiện...)" value={rec.note} onChange={e=>updatePayRec(ci.key,{...rec,note:e.target.value})}
                        style={{marginTop:8,width:"100%",background:"rgba(20,150,140,0.04)",border:"1px solid rgba(20,150,140,0.12)",borderRadius:7,padding:"7px 11px",fontSize:12,outline:"none",fontFamily:"inherit",color:"#0f3a4a",boxSizing:"border-box"}}/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
      
      {trackModal&&<TrackItemsModal allItems={allItems} onToggle={toggleTrack} onClose={()=>setTrackModal(false)}/>}
      {showAddCustom&&<AddCustomCostModal activeCATS={activeCATS} onAdd={handleAddCustom} onClose={()=>setShowAddCustom(false)}/>}
      {reqModal&&<PaymentRequestModal data={reqModal} info={info} user={user} onClose={()=>setReqModal(null)}/>}
    </div>
  );
}

/* ═══ TRACK ITEMS MODAL – Chọn hạng mục theo dõi ═══ */
function TrackItemsModal({allItems,onToggle,onClose}){
  // Group by category
  const byCat={};
  allItems.forEach(it=>{
    if(!byCat[it.catId])byCat[it.catId]={label:it.catLabel,icon:it.catIcon,color:it.catColor,items:[]};
    byCat[it.catId].items.push(it);
  });
  const trackedCount=allItems.filter(i=>i.tracked).length;
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:700}}>
        <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",padding:"20px 26px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>⚙️ Quản lý hạng mục theo dõi</div>
            <div style={{fontSize:12,opacity:0.75,marginTop:2}}>Chọn các khoản chi phí cần quản lý thanh toán · {trackedCount}/{allItems.length} đang theo dõi</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
        </div>
        <div style={{padding:"18px 22px",maxHeight:"60vh",overflowY:"auto"}}>
          {allItems.length===0&&<div style={{textAlign:"center",padding:30,color:"rgba(15,58,74,0.4)"}}>Chưa có chi phí nào. Hãy nhập trong tab "Bảng chi phí" trước.</div>}
          {Object.entries(byCat).map(([catId,grp])=>{
            const catTracked=grp.items.filter(i=>i.tracked).length;
            const allOn=catTracked===grp.items.length;
            return(
              <div key={catId} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:16}}>{grp.icon}</span>
                  <span style={{color:grp.color,fontWeight:800,fontSize:14,flex:1}}>{grp.label}</span>
                  <span style={{color:"rgba(15,58,74,0.5)",fontSize:11}}>{catTracked}/{grp.items.length}</span>
                  <button onClick={()=>{grp.items.forEach(i=>{if(allOn?i.tracked:!i.tracked)onToggle(i.key);});}} style={{background:allOn?"rgba(220,50,80,0.08)":"rgba(20,150,140,0.08)",border:`1px solid ${allOn?"rgba(220,50,80,0.3)":"rgba(20,150,140,0.3)"}`,color:allOn?"#dc3250":"#0d7a6a",borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{allOn?"Bỏ tất cả":"Chọn tất cả"}</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {grp.items.map(it=>(
                    <label key={it.key} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:it.tracked?"rgba(168,230,221,0.18)":"rgba(15,58,74,0.03)",border:`1px solid ${it.tracked?"rgba(20,150,140,0.2)":"rgba(15,58,74,0.06)"}`,borderRadius:8,cursor:"pointer",transition:"all .15s"}}>
                      <input type="checkbox" checked={it.tracked} onChange={()=>onToggle(it.key)}
                        style={{width:18,height:18,accentColor:grp.color,cursor:"pointer"}}/>
                      <span style={{flex:1,color:it.tracked?"#0f3a4a":"rgba(15,58,74,0.5)",fontSize:13,fontWeight:it.tracked?600:400}}>
                        {it.name}{it.custom&&<span style={{marginLeft:8,background:"rgba(245,166,35,0.15)",color:"#d18a13",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:4}}>Tự tạo</span>}
                      </span>
                      <span style={{color:it.tracked?grp.color:"rgba(15,58,74,0.4)",fontWeight:700,fontSize:13}}>{fmt(it.amount)}</span>
                    </label>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:"14px 22px",borderTop:"1px solid rgba(20,150,140,0.1)",textAlign:"center"}}>
          <button onClick={onClose} style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:10,padding:"10px 28px",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:"inherit"}}>Xong</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ ADD CUSTOM COST MODAL – Thêm chi phí tự tạo ═══ */
function AddCustomCostModal({activeCATS,onAdd,onClose}){
  const [form,setForm]=useState({
    catId:activeCATS[0]?.id||"hotel",
    name:"",amount:0,
  });
  const cat=activeCATS.find(c=>c.id===form.catId)||activeCATS[0];
  
  const handleSubmit=()=>{
    if(!form.name.trim()){alert("Vui lòng nhập tên khoản chi phí");return;}
    if(!form.amount||form.amount<=0){alert("Vui lòng nhập số tiền > 0");return;}
    onAdd({
      catId:cat.id,catLabel:cat.label,catIcon:cat.icon,catColor:cat.color,
      name:form.name.trim(),amount:+form.amount,
    });
  };
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:500}}>
        <div style={{background:"linear-gradient(135deg,#f5a623,#e67e22)",color:"#fff",padding:"20px 26px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>➕ Thêm chi phí tự tạo</div>
            <div style={{fontSize:12,opacity:0.85,marginTop:2}}>Khoản chi ngoài bảng giá vốn (chỉ hiện trong tab Thanh toán)</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
        </div>
        <div style={{padding:"22px 26px",display:"grid",gap:14}}>
          <div>
            <div style={{color:"rgba(15,58,74,0.6)",fontSize:12,fontWeight:600,marginBottom:6}}>HẠNG MỤC / CATEGORY</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {activeCATS.map(c=>(
                <button key={c.id} onClick={()=>setForm(p=>({...p,catId:c.id}))} style={{
                  background:form.catId===c.id?c.color:"#fff",
                  border:`1.5px solid ${form.catId===c.id?"transparent":"rgba(20,150,140,0.2)"}`,
                  color:form.catId===c.id?"#fff":"rgba(15,58,74,0.6)",
                  borderRadius:8,padding:"6px 11px",cursor:"pointer",fontSize:12,fontWeight:form.catId===c.id?700:500,fontFamily:"inherit"
                }}>{c.icon} {c.label}</button>
              ))}
            </div>
          </div>
          <div>

/* ═══ EXPORT PAYMENT REQUEST PDF ═══ */
function exportPaymentRequest(form,ci,info,user,approvalStatus){
  if(!window.jspdf){alert("Đang tải thư viện PDF, thử lại sau 3 giây.");return;}
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const hasFont=loadVNFont(pdf);
  const FONT=hasFont?"DejaVu":"helvetica";
  const pageW=210,pageH=297,mX=18;
  let y=18;
  const teal=[20,160,140],dark=[15,58,74],gray=[120,130,140],red=[220,50,80];
  const fmtV=n=>Math.round(n).toLocaleString("vi-VN");
  const setFont=(s)=>pdf.setFont(FONT,s);
  
  const now=new Date();
  const reqNo=`PTT-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}-${String(now.getHours())}${String(now.getMinutes()).padStart(2,"0")}`;
  
  pdf.setFillColor(...teal);pdf.rect(0,0,pageW,4,"F");
  // Logo
  try{pdf.addImage(VTE_LOGO,"PNG",mX,y,36,21,undefined,"FAST");}catch(e){}
  pdf.setFontSize(13);pdf.setTextColor(...teal);setFont("bold");
  pdf.text("VIETTOURS INCENTIVES & EVENTS",mX+40,y+8);
  pdf.setFontSize(8);pdf.setTextColor(...gray);setFont("normal");
  pdf.text("Công ty TNHH Du lịch và Sự kiện Việt · MST: 0302650371",mX+40,y+13);
  y+=28;
  
  // Title
  pdf.setFontSize(18);pdf.setTextColor(...dark);setFont("bold");
  pdf.text("PHIẾU ĐỀ NGHỊ THANH TOÁN",pageW/2,y,{align:"center"});
  y+=6;
  pdf.setFontSize(10);pdf.setTextColor(...gray);setFont("normal");
  pdf.text("PAYMENT REQUEST",pageW/2,y,{align:"center"});
  y+=6;
  pdf.setFontSize(9);pdf.setTextColor(...dark);
  pdf.text(`Số / No: ${reqNo}`,pageW/2,y,{align:"center"});
  pdf.text(`Ngày / Date: ${now.toLocaleDateString("vi-VN")}`,pageW/2,y+5,{align:"center"});
  y+=14;
  
  pdf.setDrawColor(...teal);pdf.setLineWidth(0.5);pdf.line(mX,y,pageW-mX,y);y+=10;
  
  // Body fields
  const field=(label,val,big)=>{
    pdf.setFontSize(9);pdf.setTextColor(...teal);setFont("bold");
    pdf.text(label,mX,y);y+=5;
    pdf.setFontSize(big?13:10);pdf.setTextColor(...(big?red:dark));setFont(big?"bold":"normal");
    const lines=pdf.splitTextToSize(val||"-",pageW-mX*2);
    pdf.text(lines,mX,y);y+=lines.length*(big?7:5)+5;
  };
  
  /* Requester name */
  pdf.setFontSize(9);pdf.setTextColor(...teal);setFont("bold");
  pdf.text("NGƯỜI ĐỀ NGHỊ / REQUESTER:",mX,y);y+=5;
  pdf.setFontSize(10);pdf.setTextColor(...dark);setFont("bold");
  pdf.text(form.requester||user.name,mX,y);y+=8;
  pdf.setDrawColor(230,230,230);pdf.setLineWidth(0.2);pdf.line(mX,y,pageW-mX,y);y+=6;
  field("DỰ ÁN / TOUR:",`${info.name||""}${info.dest?" – "+info.dest:""}`);
  field("NHÀ CUNG CẤP / NGƯỜI NHẬN:",form.supplier);
  field("NỘI DUNG ĐỀ NGHỊ / CONTENT:",form.content);
  field("HẠNG MỤC CHI PHÍ / CATEGORY:",`${ci.catLabel} · ${ci.name}`);
  field("SỐ TIỀN ĐỀ NGHỊ / AMOUNT:",fmtV(form.amount)+" ₫",true);
  pdf.setFontSize(9);pdf.setTextColor(...gray);setFont("normal");
  pdf.text(`Bằng chữ: ${numberToVietWords(form.amount)} đồng.`,mX,y);y+=8;
  if(form.note){field("GHI CHÚ / NOTE:",form.note);}
  
  y+=8;

  /* ── Approval Status Section ── */
  /* Người duyệt tương ứng: stage1 → approver1, stage2 → approver2 */
  const _apv1ForStage=approvalStatus?.stage1?.approverName||form.approver1||"";
  const _apv2ForStage=approvalStatus?.stage2?.approverName||form.approver2||"";
  const renderStage=(stage,stageData,label)=>{
    if(!stageData)return;
    const isOk=stageData.status==="approved";
    const stC=isOk?[39,174,96]:[220,50,80];
    const stBg=isOk?[236,252,243]:[254,242,242];
    const h=stageData.note?26:18;
    pdf.setFillColor(...stBg);pdf.roundedRect(mX,y,pageW-mX*2,h,3,3,"F");
    pdf.setDrawColor(...stC);pdf.setLineWidth(0.4);pdf.roundedRect(mX,y,pageW-mX*2,h,3,3,"S");
    pdf.setFontSize(8);pdf.setTextColor(...stC);setFont("bold");
    const icon=isOk?"✓ ĐÃ DUYỆT":"✗ TỪ CHỐI";
    /* Intended approver from Firestore > form > actual approver */
    const intendedFromDB=(stage===1?approvalStatus?.intendedApprover1Name:approvalStatus?.intendedApprover2Name)||"";
    const intendedFromForm=(stage===1?form.approver1:form.approver2)||"";
    const actualName=(stageData.approverName||"").split("(")[0].trim();
    const personName=intendedFromDB.split("(")[0].trim()||intendedFromForm.split("(")[0].trim()||actualName;
    pdf.text(`${label}: ${icon}`,mX+4,y+6);
    setFont("normal");
    const at=stageData.updatedAt?new Date(stageData.updatedAt).toLocaleDateString("vi-VN"):"";
    pdf.text(`${personName}${at?" · "+at:""}`,pageW-mX-2,y+6,{align:"right"});
    if(stageData.note){
      pdf.setFontSize(7.5);pdf.setTextColor(100,100,100);setFont("italic");
      const noteLines=pdf.splitTextToSize(`Ghi chú: ${stageData.note}`,pageW-mX*2-8);
      pdf.text(noteLines,mX+4,y+14);
    }
    y+=h+4;
  };
  if(approvalStatus){
    const finalOk=approvalStatus.finalStatus==="approved";
    const isPending=approvalStatus.finalStatus==="pending_stage2";
    if(approvalStatus.stage1)renderStage(1,approvalStatus.stage1,"Duyệt 1");
    if(approvalStatus.stage2)renderStage(2,approvalStatus.stage2,"Duyệt 2");
    if(isPending){
      pdf.setFillColor(255,251,235);pdf.roundedRect(mX,y,pageW-mX*2,12,3,3,"F");
      pdf.setDrawColor(245,166,35);pdf.setLineWidth(0.4);pdf.roundedRect(mX,y,pageW-mX*2,12,3,3,"S");
      pdf.setFontSize(8);pdf.setTextColor(180,120,0);setFont("bold");
      pdf.text("⏳ CHỜ DUYỆT 2 / PENDING STAGE 2",pageW/2,y+7,{align:"center"});
      y+=16;
    }
    if(!approvalStatus.stage1&&!isPending){
      /* Legacy single-stage */
      const stC=finalOk?[39,174,96]:[220,50,80];
      const stBg=finalOk?[236,252,243]:[254,242,242];
      pdf.setFillColor(...stBg);pdf.roundedRect(mX,y,pageW-mX*2,18,3,3,"F");
      pdf.setDrawColor(...stC);pdf.setLineWidth(0.5);pdf.roundedRect(mX,y,pageW-mX*2,18,3,3,"S");
      pdf.setFontSize(11);pdf.setTextColor(...stC);setFont("bold");
      pdf.text(finalOk?"✓ ĐÃ DUYỆT / APPROVED":"✗ TỪ CHỐI / REJECTED",pageW/2,y+8,{align:"center"});
      pdf.setFontSize(8);setFont("normal");
      const an=approvalStatus.approverName||"";const at=approvalStatus.updatedAt?new Date(approvalStatus.updatedAt).toLocaleDateString("vi-VN"):"";
      pdf.text(`${an}${at?" · "+at:""}`,pageW/2,y+14,{align:"center"});
      y+=22;
    }
  } else {
    pdf.setFillColor(255,251,235);pdf.roundedRect(mX,y,pageW-mX*2,14,3,3,"F");
    pdf.setDrawColor(245,166,35);pdf.setLineWidth(0.5);pdf.roundedRect(mX,y,pageW-mX*2,14,3,3,"S");
    pdf.setFontSize(9);pdf.setTextColor(180,120,0);setFont("bold");
    pdf.text("⏳ CHỜ DUYỆT / PENDING APPROVAL",pageW/2,y+8,{align:"center"});
    y+=20;
  }

  pdf.setDrawColor(...gray);pdf.setLineWidth(0.2);pdf.line(mX,y,pageW-mX,y);y+=14;
  
  // Signatures - 3 columns: Người đề nghị | Người duyệt 1 | Người duyệt 2
  const sigW=(pageW-mX*2)/3;
  /* Priority: Firestore intended > form selection > actual stage approver */
  const _apv1Name=(approvalStatus?.intendedApprover1Name||form.approver1||approvalStatus?.stage1?.approverName||"").split("(")[0].trim();
  const _apv2Name=(approvalStatus?.intendedApprover2Name||form.approver2||approvalStatus?.stage2?.approverName||"").split("(")[0].trim();
  pdf.setFontSize(9);pdf.setTextColor(...dark);setFont("bold");
  pdf.text("NGƯỜI ĐỀ NGHỊ",mX+sigW/2,y,{align:"center"});
  pdf.text("NGƯỜI DUYỆT 1",mX+sigW+sigW/2,y,{align:"center"});
  pdf.text("NGƯỜI DUYỆT 2",mX+sigW*2+sigW/2,y,{align:"center"});
  y+=4;
  pdf.setFontSize(7.5);pdf.setTextColor(...gray);setFont("normal");
  pdf.text("(Requester)",mX+sigW/2,y,{align:"center"});
  pdf.text("(Approver 1)",mX+sigW+sigW/2,y,{align:"center"});
  pdf.text("(Approver 2)",mX+sigW*2+sigW/2,y,{align:"center"});
  y+=22;
  pdf.setFontSize(9);pdf.setTextColor(...dark);setFont("bold");
  pdf.text(form.requester||user.name,mX+sigW/2,y,{align:"center"});
  pdf.text(_apv1Name.split("(")[0].trim(),mX+sigW+sigW/2,y,{align:"center"});
  pdf.text(_apv2Name.split("(")[0].trim(),mX+sigW*2+sigW/2,y,{align:"center"});
  
  // Footer
  pdf.setFillColor(...teal);pdf.rect(0,pageH-4,pageW,4,"F");
  pdf.setFontSize(7.5);pdf.setTextColor(...teal);setFont("bold");
  pdf.text("Viettours Incentives & Events",mX,pageH-8);
  pdf.setTextColor(...gray);setFont("normal");
  pdf.text(reqNo,pageW-mX,pageH-8,{align:"right"});
  
  pdf.save(`PhieuDeNghiTT_${reqNo}.pdf`);
}

/* ═══ RATE CARD SYNC MODAL – Đồng bộ master rate card cross-device ═══ */
function RateCardSyncModal({user,onClose}){
  const [tab,setTab]=useState("cloud");
  const fileRef=useRef(null);
  const [importPreview,setImportPreview]=useState(null);
  const [cloudData,setCloudData]=useState(null);
  const [cloudLoading,setCloudLoading]=useState(true);
  const [cloudStatus,setCloudStatus]=useState(null); // {type:"success"|"error", msg}
  const [pushing,setPushing]=useState(false);
  const [pulling,setPulling]=useState(false);

  // Collect ALL rate card data from localStorage
  const collectMasterData=()=>{
    const hotels={};
    const otherRates={};
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i);
      if(!key)continue;
      if(key.startsWith("vte_hotels_v2_")){
        const city=key.replace("vte_hotels_v2_","");
        try{hotels[city]=JSON.parse(localStorage.getItem(key));}catch(e){}
      } else if(key.startsWith("vte_rate_")||key==="vte_visa_rates"){
        try{otherRates[key]=JSON.parse(localStorage.getItem(key));}catch(e){}
      }
    }
    let visaRates={};
    try{visaRates=JSON.parse(localStorage.getItem("vte_visa_rates")||"{}");}catch(e){}
    return {hotels,visaRates,otherRates};
  };

  const applyData=(data)=>{
    Object.entries(data.hotels||{}).forEach(([city,arr])=>{
      try{localStorage.setItem("vte_hotels_v2_"+city,JSON.stringify(arr));}catch(e){}
    });
    try{localStorage.setItem("vte_visa_rates",JSON.stringify(data.visaRates||{}));}catch(e){}
    Object.entries(data.otherRates||{}).forEach(([key,val])=>{
      try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}
    });
  };

  // Load cloud data on mount
  useEffect(()=>{
    setCloudLoading(true);
    fbPullMasterRC().then(d=>{setCloudData(d);setCloudLoading(false);}).catch(()=>setCloudLoading(false));
    const unsub=fbOnMasterRC(d=>{setCloudData(d);});
    return ()=>unsub();
  },[]);

  const handlePushCloud=async()=>{
    if(!confirm("Đẩy rate card hiện tại lên cloud?\n\n⚠ Dữ liệu cloud sẽ bị ghi đè. Tất cả tài khoản kéo về sẽ nhận bản mới này."))return;
    setPushing(true);setCloudStatus(null);
    try{
      const d=collectMasterData();
      const payload={
        _meta:{
          version:"2.0",
          type:"viettours_ratecard_master",
          pushedAt:new Date().toISOString(),
          pushedBy:user.name+" ("+user.role+")",
          app:"Viettours Tour Cost Calculator",
        },
        hotels:d.hotels,
        visaRates:d.visaRates,
        otherRates:d.otherRates,
      };
      await fbPushMasterRC(payload);
      setCloudStatus({type:"success",msg:"✅ Đẩy lên cloud thành công! Tất cả tài khoản có thể kéo về ngay."});
    }catch(err){
      setCloudStatus({type:"error",msg:"❌ Lỗi: "+err.message});
    }finally{setPushing(false);}
  };

  const handlePullCloud=async()=>{
    if(!cloudData)return;
    if(!confirm("Kéo rate card từ cloud về máy này?\n\n⚠ Rate card hiện tại trên máy sẽ bị ghi đè!"))return;
    setPulling(true);setCloudStatus(null);
    try{
      applyData(cloudData);
      setCloudStatus({type:"success",msg:"✅ Đồng bộ thành công! Đang tải lại..."});
      setTimeout(()=>window.location.reload(),1200);
    }catch(err){
      setCloudStatus({type:"error",msg:"❌ Lỗi: "+err.message});
      setPulling(false);
    }
  };

  // File export/import helpers (keep old workflow)
  const handleExport=()=>{
    const d=collectMasterData();
    const payload={
      _meta:{version:"2.0",type:"viettours_ratecard_master",exportedAt:new Date().toISOString(),exportedBy:user.name+" ("+user.role+")",app:"Viettours Tour Cost Calculator"},
      hotels:d.hotels,visaRates:d.visaRates,otherRates:d.otherRates,
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download=`Viettours_RateCard_Master_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  };
  const handleFileSelect=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data._meta||data._meta.type!=="viettours_ratecard_master"){alert("⚠ File không phải Master Rate Card hợp lệ");return;}
        const hotelCities=Object.keys(data.hotels||{}).length;
        const hotelCount=Object.values(data.hotels||{}).reduce((s,arr)=>s+(Array.isArray(arr)?arr.length:0),0);
        const visaCountries=Object.keys(data.visaRates||{}).length;
        setImportPreview({data,hotelCities,hotelCount,visaCountries});
      }catch(err){alert("⚠ Lỗi đọc file: "+err.message);}
    };
    reader.readAsText(file);e.target.value="";
  };
  const handleApplyImport=()=>{
    if(!importPreview)return;
    if(!confirm("Áp dụng master rate card này?\n\n⚠ Toàn bộ rate card hiện tại trên máy này sẽ bị ghi đè!"))return;
    applyData(importPreview.data);
    alert("✅ Đồng bộ thành công! Tải lại trang để áp dụng đầy đủ.");
    setImportPreview(null);onClose();
    setTimeout(()=>window.location.reload(),500);
  };

  const stats=collectMasterData();
  const localHotelCities=Object.keys(stats.hotels).length;

              {importPreview&&(

                    <div style={{color:"#0d7a6a",fontSize:12,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>✓ File hợp lệ – Xem trước</div>

  {when:"Trong vòng 15 ngày trước khởi hành",penalty:50},

/* ═══ CONTRACT STORAGE HELPERS ═══ */
const contractStorageKey=(info)=>`vte_contracts_${(info.name||"tour").replace(/[^a-zA-Z0-9]/g,"_")}`;
const ldContracts=(info)=>{try{return JSON.parse(localStorage.getItem(contractStorageKey(info))||"[]");}catch(e){return [];}};
const svContracts=(info,list)=>{
  try{localStorage.setItem(contractStorageKey(info),JSON.stringify(list));}catch(e){}
  if(window._fbSyncContracts)window._fbSyncContracts(contractStorageKey(info),list,info);
};

function ContractModal({info,pax,roundedPPax,user,onClose,existingContract,onSaved}){
  const today=new Date();
  const startD=info.startDate?new Date(info.startDate):today;
  const endD=info.startDate?new Date(startD.getTime()+(info.days-1)*86400000):today;
  const fmtD=d=>`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
  
  // Build form initial state - prefer existing contract, fallback to draft, fallback to defaults
  const [form,setForm]=useState(()=>{
    if(existingContract)return {...existingContract};
    return {
      id:"hd_"+Date.now(),
      createdAt:new Date().toISOString(),
      contractNo:"",
      contractDate:fmtD(today),
      partyB:{name:"",address:"",tel:"",rep:"",title:"Giám đốc",taxCode:"",email:""},
      departure:"TP. Hồ Chí Minh",
      contractPax:pax,
      pricePerPax:roundedPPax||0,
      includes:[...DEFAULT_INCLUDES],
      excludes:[...DEFAULT_EXCLUDES],
      payments:[...DEFAULT_PAYMENTS],
      cancels:[...DEFAULT_CANCELS],
      bondPercent:8,
    };
  });
  
  const totalAmount=Math.round((form.pricePerPax||0)*(form.contractPax||0));
  
  // Update partyB / nested fields
  const updPartyB=(k,v)=>setForm(p=>({...p,partyB:{...p.partyB,[k]:v}}));
  
  // Includes / Excludes
  const updListItem=(field,idx,val)=>setForm(p=>({...p,[field]:p[field].map((x,i)=>i===idx?val:x)}));
  const delListItem=(field,idx)=>setForm(p=>({...p,[field]:p[field].filter((_,i)=>i!==idx)}));
  const addListItem=(field)=>setForm(p=>({...p,[field]:[...p[field],""]}));
  
  // Payments — supports both percent mode and fixed-amount mode
  const updPayment=(idx,k,v)=>setForm(p=>({...p,payments:p.payments.map((x,i)=>i===idx?{...x,[k]:v}:x)}));
  const delPayment=(idx)=>setForm(p=>({...p,payments:p.payments.filter((_,i)=>i!==idx)}));
  const addPayment=()=>setForm(p=>({...p,payments:[...p.payments,{label:`Đợt ${p.payments.length+1}`,mode:"percent",percent:0,amount:0,note:""}]}));
  const togglePaymentMode=(idx)=>setForm(p=>({...p,payments:p.payments.map((x,i)=>{
    if(i!==idx)return x;
    if(x.mode==="amount"){
      // Convert amount → percent
      const pct=totalAmount>0?+(((x.amount||0)/totalAmount)*100).toFixed(2):0;
      return {...x,mode:"percent",percent:pct};
    }else{
      // Convert percent → amount
      const amt=Math.round(totalAmount*(x.percent||0)/100);
      return {...x,mode:"amount",amount:amt};
    }
  })}));
  
  // Cancels
  const updCancel=(idx,k,v)=>setForm(p=>({...p,cancels:p.cancels.map((x,i)=>i===idx?{...x,[k]:v}:x)}));
  const delCancel=(idx)=>setForm(p=>({...p,cancels:p.cancels.filter((_,i)=>i!==idx)}));
  const addCancel=()=>setForm(p=>({...p,cancels:[...p.cancels,{when:"",penalty:0}]}));
  
  // Compute each payment's actual amount based on mode
  const getPaymentAmount=(p)=>p.mode==="amount"?(+p.amount||0):Math.round(totalAmount*(+p.percent||0)/100);
  const getPaymentPercent=(p)=>p.mode==="amount"?(totalAmount>0?+(((p.amount||0)/totalAmount)*100).toFixed(2):0):(+p.percent||0);
  const sumPaymentAmount=form.payments.reduce((s,p)=>s+getPaymentAmount(p),0);
  const sumPaymentPercent=totalAmount>0?+((sumPaymentAmount/totalAmount)*100).toFixed(2):0;
  
  // Auto contract number suggestion
  const autoContractNo=()=>{
    const existing=ldContracts(info);
    const seq=existing.length+1;
    const yyyy=today.getFullYear();
    setForm(p=>({...p,contractNo:`${String(seq).padStart(3,"0")}/${yyyy}/HĐ-VTE`}));
  };
  
  const validateAndSave=()=>{
    if(!form.partyB.name.trim()){alert("Vui lòng nhập tên Bên B (Khách hàng)");return null;}
    if(Math.abs(sumPaymentPercent-100)>0.5){
      if(!confirm(`Tổng các đợt thanh toán = ${sumPaymentPercent}% (${sumPaymentAmount.toLocaleString("vi-VN")} ₫), không bằng 100% (${totalAmount.toLocaleString("vi-VN")} ₫). Vẫn lưu & xuất?`))return null;
    }
    // Save to contracts list
    const list=ldContracts(info);
    const updatedForm={...form,updatedAt:new Date().toISOString(),lastExportedBy:user.name+" ("+user.role+")"};
    const existingIdx=list.findIndex(c=>c.id===form.id);
    if(existingIdx>=0){list[existingIdx]=updatedForm;}
    else{list.push(updatedForm);}
    svContracts(info,list);
    if(onSaved)onSaved(updatedForm);
    return updatedForm;
  };
  
  const handleExportPDF=()=>{
    const saved=validateAndSave();
    if(saved)exportContract(saved,info,startD,endD,"pdf");
  };
  const handleExportDocx=()=>{
    const saved=validateAndSave();
    if(saved)exportContract(saved,info,startD,endD,"docx");
  };
  const handleJustSave=()=>{
    const saved=validateAndSave();
    if(saved){alert("✅ Đã lưu hợp đồng vào danh sách quản lý.");onClose();}
  };
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:980}}>
        <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",padding:"22px 28px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

/* ═══ EXPORT CONTRACT (dispatcher) ═══ */
function exportContract(form,info,startD,endD,format){
  const totalAmount=Math.round((form.pricePerPax||0)*(form.contractPax||0));
  if(format==="docx")exportContractDocx(form,info,startD,endD,totalAmount);
  else exportContractPDF(form,info,startD,endD,totalAmount);
}

function exportContractPDF(form,info,startD,endD,totalAmount){
  if(!window.jspdf){alert("Đang tải thư viện PDF...");return;}
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const hasFont=loadVNFont(pdf);
  const FONT=hasFont?"DejaVu":"helvetica";
  const setFont=(s="normal")=>pdf.setFont(FONT,s);
  const pageW=210,pageH=297,mX=20;
  const contentW=pageW-mX*2;
  const teal=[20,160,140],dark=[15,58,74],gray=[120,130,140],red=[220,50,80];
  let y=18;
  const fmtV=n=>Math.round(n).toLocaleString("vi-VN");
  const fmtD=d=>`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
  const checkPage=(needed=15)=>{if(y+needed>pageH-20){pdf.addPage();y=20;}};
  const writeLine=(text,opts={})=>{
    const {size=10,style="normal",color=dark,align="left",x=mX,indent=0,spaceAfter=4,maxW=contentW-indent}=opts;
    pdf.setFontSize(size);pdf.setTextColor(...color);setFont(style);
    const lines=pdf.splitTextToSize(text,maxW);
    checkPage(lines.length*(size*0.42)+spaceAfter);
    if(align==="center")pdf.text(lines,pageW/2,y,{align:"center"});
    else if(align==="right")pdf.text(lines,pageW-mX,y,{align:"right"});
    else pdf.text(lines,x+indent,y);
    y+=lines.length*(size*0.42)+spaceAfter;
  };
  
  setFont("bold");pdf.setFontSize(11);pdf.setTextColor(...dark);
  pdf.text("CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM",pageW/2,y,{align:"center"});y+=5;
  pdf.text("Độc lập – Tự do – Hạnh phúc",pageW/2,y,{align:"center"});y+=2;
  pdf.setDrawColor(...dark);pdf.setLineWidth(0.3);pdf.line(pageW/2-25,y+1,pageW/2+25,y+1);y+=10;
  
  setFont("bold");pdf.setFontSize(17);pdf.setTextColor(...teal);
  pdf.text("HỢP ĐỒNG CUNG CẤP DỊCH VỤ",pageW/2,y,{align:"center"});y+=6;
  setFont("normal");pdf.setFontSize(10);pdf.setTextColor(...gray);
  pdf.text(`(HĐ Số: ${form.contractNo||"_______/HĐ-VTE"})`,pageW/2,y,{align:"center"});y+=10;

  // Điều 6
  children.push(Heading("ĐIỀU 6: CÁC ĐIỀU KHOẢN CHUNG"));
  [
    "Bên A sẽ không chịu trách nhiệm cho các chuyến bay bị đình hoãn do thời tiết, chiến tranh, khủng bố, đình công, thiên tai, hỏa hoạn. Trong trường hợp này Bên A sẽ cố gắng sắp xếp cho khách đi chuyến bay sớm nhất và Bên B sẽ thanh toán các chi phí vượt trội ngoài chương trình như tiền ăn, tiền khách sạn trong thời gian lưu lại tại nước ngoài.",

    "Trong quá trình thực hiện thỏa thuận, hai Bên có thể tiến hành sửa đổi và bổ sung một số điều khoản trong thỏa thuận này với điều kiện là việc sửa đổi phải lập thành văn bản, có chữ ký xác nhận của đại diện có thẩm quyền của cả hai Bên.",
    "Các Bên cam kết nghiêm túc tuân thủ và thực hiện theo đúng quy định Hợp đồng, và không được phép chuyển nhượng Hợp đồng này cho bên thứ ba trừ khi được sự đồng ý bằng văn bản của Bên kia.",
    "Hợp đồng này được lập thành 02 (hai) bản bằng tiếng Việt, mỗi Bên giữ 01 (một) bản có giá trị ngang nhau và có hiệu lực kể từ ngày ký.",
  ].forEach(g=>children.push(Bullet(g)));
  
  // Signatures - using table for layout
  children.push(P(" ",{before:400}));
  const sigTable=new Table({
    width:{size:9026,type:WidthType.DXA},
    columnWidths:[4513,4513],
    rows:[
      new TableRow({children:[
        new TableCell({
          width:{size:4513,type:WidthType.DXA},
          borders:{top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE}},
          children:[
            new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"ĐẠI DIỆN BÊN B",bold:true,size:24})]}),
            new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"(Ký và đóng dấu)",italics:true,size:18,color:"707880"})]}),
            new Paragraph({children:[new TextRun({text:" ",size:24})]}),
            new Paragraph({children:[new TextRun({text:" ",size:24})]}),
            new Paragraph({children:[new TextRun({text:" ",size:24})]}),
