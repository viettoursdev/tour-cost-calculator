const _RC_EDIT_ROLES=["CEO","Trưởng Phòng","Sales","Operations","Marketing"];
const _canAutoSync=()=>{const u=window._vteUser;return u&&_RC_EDIT_ROLES.includes(u.role);};

/* ── Collect tất cả rate card từ localStorage ── */
function _collectRC(){
  const hotels={},otherRates={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);if(!k)continue;
    if(k.startsWith("vte_hotels_v2_")){try{hotels[k.replace("vte_hotels_v2_","")]=JSON.parse(localStorage.getItem(k));}catch(e){}}
    else if(k.startsWith("vte_rate_")||k==="vte_visa_rates"){try{otherRates[k]=JSON.parse(localStorage.getItem(k));}catch(e){}}
  }
  let visaRates={};try{visaRates=JSON.parse(localStorage.getItem("vte_visa_rates")||"{}");}catch(e){}
  return{hotels,visaRates,otherRates};
}

/* ── Apply cloud data vào localStorage (không trigger push) ── */
let _applyingFromCloud=false;
function _applyRC(data){
  _applyingFromCloud=true;
  try{
    Object.entries(data.hotels||{}).forEach(([city,arr])=>{try{localStorage.setItem("vte_hotels_v2_"+city,JSON.stringify(arr));}catch(e){}});
    try{localStorage.setItem("vte_visa_rates",JSON.stringify(data.visaRates||{}));}catch(e){}
    Object.entries(data.otherRates||{}).forEach(([k,v])=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}});
  }finally{_applyingFromCloud=false;}
}

/* ── Auto-push lên Firestore (debounce 2s) ── */
let _syncTimer=null;
async function _autoSync(){
  if(!_canAutoSync())return;
  const u=window._vteUser;
  try{
    const d=_collectRC();
    await setDoc(_RC_DOC,{
      _meta:{version:"2.0",type:"viettours_ratecard_master",pushedAt:new Date().toISOString(),
             pushedBy:u.name+" ("+u.role+")",app:"Viettours Tour Cost Calculator",autoSync:true},
      hotels:d.hotels,visaRates:d.visaRates,otherRates:d.otherRates
    });
    console.log("☁️ Auto-synced rate card →",u.name);
    /* Hiện toast thông báo */
    const toast=document.createElement("div");
    toast.textContent="☁️ Đã đồng bộ Rate Card lên Cloud";
    Object.assign(toast.style,{position:"fixed",bottom:"24px",right:"24px",background:"#0d7a6a",color:"#fff",
      padding:"10px 18px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",zIndex:"9999",
      fontFamily:"DM Sans,Segoe UI,sans-serif",boxShadow:"0 4px 16px rgba(0,0,0,0.18)"});
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),3000);
  }catch(err){console.warn("⚠️ Auto-sync lỗi:",err.message);}
}

/* ── Intercept localStorage.setItem cho rate card keys ── */
const _origSetItem=localStorage.setItem.bind(localStorage);
localStorage.setItem=function(key,value){
  _origSetItem(key,value);
  if(!_applyingFromCloud&&(key.startsWith("vte_hotels_v2_")||key.startsWith("vte_rate_")||key==="vte_visa_rates")){
    if(_syncTimer)clearTimeout(_syncTimer);
    _syncTimer=setTimeout(_autoSync,2000);
  }
};

/* ── Real-time listener: nhận cập nhật từ user khác ── */
let _lastCloudPush="";
onSnapshot(_RC_DOC,snap=>{
  if(!snap.exists())return;
  const data=snap.data();
  const pushedAt=data._meta?.pushedAt||"";
  if(pushedAt===_lastCloudPush)return; // bỏ qua nếu không có thay đổi
  _lastCloudPush=pushedAt;
  const u=window._vteUser;
  /* Nếu chính user này vừa push thì không apply lại */
  if(u&&data._meta?.pushedBy?.startsWith(u.name))return;
  _applyRC(data);
  console.log("🔄 Rate card đã được cập nhật từ cloud bởi:",data._meta?.pushedBy);
  /* Thông báo cho user */
  const toast=document.createElement("div");
  toast.textContent="🔄 Rate Card đã được cập nhật từ "+( data._meta?.pushedBy||"Cloud");
  Object.assign(toast.style,{position:"fixed",bottom:"24px",right:"24px",background:"#8e44ad",color:"#fff",
    padding:"10px 18px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",zIndex:"9999",

  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),4000);
});

/* ── Quote Code Generator: NĐ/NN-seq-DD-MM-YY ── */
function generateQuoteCode(template, existingQuotes){
  const prefix=template==="intl"?"NN":template==="dmc"?"DMC":"NĐ";
  const now=new Date();
  const dd=String(now.getDate()).padStart(2,"0");
  const mm=String(now.getMonth()+1).padStart(2,"0");
  const yy=String(now.getFullYear()).slice(-2);
  const dateStr=`${dd}.${mm}.${yy}`;
  /* Count existing codes for same prefix + same date */
  const todaySameType=(existingQuotes||[]).filter(q=>
    q.quoteCode&&q.quoteCode.startsWith(prefix+".")&&q.quoteCode.endsWith("."+dateStr)
  ).length;
  const seq=String(todaySameType+1).padStart(2,"0");
  return `${prefix}.${seq}.${dateStr}`;
}

/* Migrate existing quotes to add quoteCode */
window.fbMigrateQuoteCodes=async function(){
  if(!window.fbPullMasterRC)return; // Firebase not ready
  try{
    /* Migrate regular quotes */
    const histSnap=await getDoc(_HIST_DOC);
    if(histSnap.exists()){
      const quotes=histSnap.data().quotes||[];
      const missing=quotes.filter(q=>!q.quoteCode);
      if(missing.length>0){
        /* Sort by createdAt to assign codes chronologically */
        const sorted=[...quotes].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));
        /* Group by prefix+date to assign sequential numbers */
        const dayCount={};
        const updated=sorted.map(q=>{
          if(q.quoteCode)return q;
          const prefix=(q.template==="intl"?"NN":q.template==="dmc"?"DMC":"NĐ");
          const d=new Date(q.createdAt||q.updatedAt||Date.now());
          const dd=String(d.getDate()).padStart(2,"0");
          const mm=String(d.getMonth()+1).padStart(2,"0");
          const yy=String(d.getFullYear()).slice(-2);
          const dateStr=`${dd}.${mm}.${yy}`;
          const key=`${prefix}.${dateStr}`;
          dayCount[key]=(dayCount[key]||0)+1;
          const seq=String(dayCount[key]).padStart(2,"0");
          return{...q,quoteCode:`${prefix}.${seq}.${dateStr}`};
        });
        await setDoc(_HIST_DOC,{quotes:updated.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))});
        console.log(`✅ Migrated ${missing.length} quote codes`);
      }
    }
    /* Migrate DMC quotes */
    const dmcSnap=await getDoc(_DMC_HIST_DOC);
    if(dmcSnap.exists()){
      const dquotes=dmcSnap.data().quotes||[];
      const dmissing=dquotes.filter(q=>!q.quoteCode);
      if(dmissing.length>0){
        const dsorted=[...dquotes].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));
        const ddayCount={};
        const dupdated=dsorted.map(q=>{
          if(q.quoteCode)return q;
          const d=new Date(q.createdAt||q.updatedAt||Date.now());
          const dd=String(d.getDate()).padStart(2,"0");
          const mm=String(d.getMonth()+1).padStart(2,"0");
          const yy=String(d.getFullYear()).slice(-2);
          const dateStr=`${dd}.${mm}.${yy}`;
          const key=`DMC.${dateStr}`;
          ddayCount[key]=(ddayCount[key]||0)+1;
          return{...q,quoteCode:`DMC.${String(ddayCount[key]).padStart(2,"0")}.${dateStr}`};
        });
        await setDoc(_DMC_HIST_DOC,{quotes:dupdated.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))});
        console.log(`✅ Migrated ${dmissing.length} DMC quote codes`);
      }
    }
  }catch(e){console.warn("Quote code migration failed:",e.message);}
};

window.fbSaveQuote=async function(entry){
  const snap=await getDoc(_HIST_DOC);
  const quotes=snap.exists()?(snap.data().quotes||[]):[];
  const u=window._vteUser;
  const idx=quotes.findIndex(q=>q.id===entry.id);
  if(idx>=0){
    /* Update: preserve createdBy + collaborators, only update content */
    quotes[idx]={...quotes[idx],...entry,
      createdByUsername:quotes[idx].createdByUsername||u?.u||"",
      createdByName:quotes[idx].createdByName||u?.name||"",
      collaborators:quotes[idx].collaborators||[],
      updatedAt:new Date().toISOString(),
      updatedBy:u?(u.name+" ("+u.role+")"):"unknown",
    };
  }else{
    /* Create: set creator info + generate quoteCode */
    const qCode=entry.quoteCode||generateQuoteCode(entry.template||"domestic",quotes);
    quotes.unshift({...entry,
      quoteCode:qCode,
      createdByUsername:u?.u||"",
      createdByName:u?.name||"",
      collaborators:[],
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(),
      updatedBy:u?(u.name+" ("+u.role+")"):"unknown",
    });
  }
  await setDoc(_HIST_DOC,{quotes:quotes.slice(0,500)});
};

/* ══ Notifications Firestore sync ══ */
const _notifDoc = (username) => doc(_db, "user_notifications", username);

window.fbSendNotification = async (targetUsername, notif) => {
  const d = _notifDoc(targetUsername);
  const snap = await getDoc(d);
  const existing = snap.exists() ? (snap.data().notifications || []) : [];
  /* Strip undefined values — Firestore rejects them */
  const sanitize = (obj) => JSON.parse(JSON.stringify(obj, (k, v) => v === undefined ? null : v));
  const newNotif = sanitize({ ...notif, id: Date.now().toString(36) + Math.random().toString(36).slice(2,5), read: false, createdAt: new Date().toISOString() });
  await setDoc(d, { notifications: [newNotif, ...existing].slice(0, 100) });
};

window.fbOnNotifications = (username, cb) => onSnapshot(_notifDoc(username), s => cb(s.exists() ? (s.data().notifications || []) : []));

window.fbMarkAllRead = async (username) => {
  const snap = await getDoc(_notifDoc(username));
  if (!snap.exists()) return;
  const notifs = (snap.data().notifications || []).map(n => ({ ...n, read: true }));
  await setDoc(_notifDoc(username), { notifications: notifs });
};

window.fbMarkOneRead = async (username, id) => {
  const snap = await getDoc(_notifDoc(username));
  if (!snap.exists()) return;
  const notifs = (snap.data().notifications || []).map(n => n.id === id ? { ...n, read: true } : n);
  await setDoc(_notifDoc(username), { notifications: notifs });
};

window.fbDeleteNotification = async (username, id) => {
  const snap = await getDoc(_notifDoc(username));
  if (!snap.exists()) return;
  const notifs = (snap.data().notifications || []).filter(n => n.id !== id);
  await setDoc(_notifDoc(username), { notifications: notifs });
};

/* ══ Itineraries Firestore sync (index doc + per-itin doc) ══ */
const _ITIN_INDEX=doc(_db,"viettours","itinerary_index");
const _itinDoc=(id)=>doc(_db,"tour_itineraries",id);
window.fbSaveItinerary=async(itin)=>{
  const u=window._vteUser;const now=new Date().toISOString();
  await setDoc(_itinDoc(itin.id),{...itin,updatedAt:now,updatedBy:u?u.name:""});
  const snap=await getDoc(_ITIN_INDEX);const list=snap.exists()?(snap.data().items||[]):[];
  const idx=list.findIndex(x=>x.id===itin.id);
  const meta={id:itin.id,code:itin.code||"",title:itin.title||"",destination:itin.destination||"",days:itin.days||0,nights:itin.nights||0,updatedAt:now,updatedBy:u?u.name:"",linkedQuoteName:itin.linkedQuoteName||""};
  if(idx>=0)list[idx]={...list[idx],...meta};else list.unshift({...meta,createdAt:now,createdBy:u?u.name:""});
  await setDoc(_ITIN_INDEX,{items:list.slice(0,500)});
};
window.fbOnItineraries=(cb)=>onSnapshot(_ITIN_INDEX,s=>cb(s.exists()?(s.data().items||[]):[]));
window.fbGetItinerary=async(id)=>{const s=await getDoc(_itinDoc(id));return s.exists()?s.data():null;};
window.fbDeleteItinerary=async(id)=>{
  const snap=await getDoc(_ITIN_INDEX);
  if(snap.exists())await setDoc(_ITIN_INDEX,{items:(snap.data().items||[]).filter(x=>x.id!==id)});
  try{await deleteDoc(_itinDoc(id));}catch(e){}
};

/* ══ Restaurant Library + Menu docs Firestore ══ */
const _REST_DOC=doc(_db,"viettours","restaurant_list");
window.fbOnRestaurants=(cb)=>onSnapshot(_REST_DOC,s=>cb(s.exists()?(s.data().restaurants||[]):[]));

const _MENU_INDEX=doc(_db,"viettours","menu_index");
const _menuDoc=(id)=>doc(_db,"tour_menus",id);
window.fbSaveMenu=async(m)=>{
  const u=window._vteUser;const now=new Date().toISOString();

  const snap=await getDoc(_MENU_INDEX);const list=snap.exists()?(snap.data().items||[]):[];
  const idx=list.findIndex(x=>x.id===m.id);
  const meta={id:m.id,code:m.code||"",title:m.title||"",destination:m.destination||"",days:m.days||0,updatedAt:now,updatedBy:u?u.name:"",linkedItineraryName:m.linkedItineraryName||"",linkedQuoteName:m.linkedQuoteName||""};
  if(idx>=0)list[idx]={...list[idx],...meta};else list.unshift({...meta,createdAt:now,createdBy:u?u.name:""});

};
window.fbOnMenus=(cb)=>onSnapshot(_MENU_INDEX,s=>cb(s.exists()?(s.data().items||[]):[]));
window.fbGetMenu=async(id)=>{const s=await getDoc(_menuDoc(id));return s.exists()?s.data():null;};
window.fbDeleteMenu=async(id)=>{const snap=await getDoc(_MENU_INDEX);if(snap.exists())await setDoc(_MENU_INDEX,{items:(snap.data().items||[]).filter(x=>x.id!==id)});try{await deleteDoc(_menuDoc(id));}catch(e){}};

/* ══ Toast Sound System ══ */
function playToastSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type="sine";o.frequency.value=660;
    g.gain.setValueAtTime(0.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.22);
  }catch(e){}
}

/* ══ User Cloud Sync – tự động cho tất cả tài khoản ══ */

/* Đợi Firebase sẵn sàng (retry tối đa 5s) */
function waitForFirebase(ms=5000){
  return new Promise(resolve=>{
    if(window._fbReady)return resolve(true);
    const t=Date.now();
    const id=setInterval(()=>{
      if(window._fbReady){clearInterval(id);return resolve(true);}
      if(Date.now()-t>ms){clearInterval(id);return resolve(false);}
    },150);
  });
}

/* Pull & merge users từ cloud */
async function syncUsersFromCloud(){
  const ready=await waitForFirebase();
  if(!ready||!window.fbPullUsers||!window.fbPushUsers)return;
  try{
    const cloudUsers=await window.fbPullUsers();
    const local=ldUsers();
    if(!cloudUsers||cloudUsers.length===0){
      /* Cloud trống → push localStorage lên (migration lần đầu) */
      if(local&&local.length>0){
        await window.fbPushUsers(local);
        console.log("✅ Migrated",local.length,"users to Firestore");
      }
      return local;
    }
    /* Merge: ưu tiên cloud, giữ lại user local chưa có trên cloud */
    const cloudIds=new Set(cloudUsers.map(u=>u.u));
    const localOnly=local.filter(u=>!cloudIds.has(u.u)&&u.u!==DEFAULT_USERS[0]?.u);
    const merged=[...cloudUsers,...localOnly];
    /* Nếu có user local mới → push merged lên cloud */
    if(localOnly.length>0)await window.fbPushUsers(merged);
    try{localStorage.setItem("vte_users",JSON.stringify(merged));}catch(e){}
    return merged;
  }catch(e){console.warn("User cloud sync failed:",e.message);}
}

/* Đồng bộ 1 user mới hoặc user đã sửa lên cloud */
async function pushSingleUser(updatedUsers){
  const ready=await waitForFirebase();
  if(!ready||!window.fbPushUsers)return;
  try{await window.fbPushUsers(updatedUsers);}
  catch(e){console.warn("Push user failed:",e.message);}
}
const svUsers=(users)=>{
  try{localStorage.setItem("vte_users",JSON.stringify(users));}catch(e){}

function generateMenuCode(type,continent,country,seq){return `TD-${type||"NN"}-${continent||"CA"}-${country||"TQ"}-${String(seq||1).padStart(3,"0")}`;}

const ITIN_TYPE={NN:"Nước ngoài",ND:"Nội địa"};

  CA:{TQ:"Trung Quốc",NB:"Nhật Bản",HQ:"Hàn Quốc",TL:"Thái Lan",SG:"Singapore",ML:"Malaysia",ID:"Indonesia",CPC:"Campuchia",LA:"Lào",AD:"Ấn Độ",DB:"Dubai/UAE",DL:"Đài Loan",HK:"Hồng Kông"},
  AU:{PH:"Pháp",AN:"Anh",DC:"Đức",YL:"Ý",TBN:"Tây Ban Nha",TS:"Thụy Sĩ",HL:"Hà Lan",NGA:"Nga"},

  VN:{MB:"Miền Bắc",MT:"Miền Trung",MN:"Miền Nam"},
};
function generateItinCode(type,continent,country,seq){
  const t=type||"NN",c=continent||"CA",ct=country||"TQ";
  return `${t}-${c}-${ct}-${String(seq||1).padStart(3,"0")}`;
}

/* ═══ HELPERS ═══════════════════════════════════════════ */
function calcVND(item,rates,pax){
  if(item.enabled===false) return 0;
  if(item.foc===true) return 0;
  const r=rates[item.cur]||1;
  const qty=item.qtyMode==="per_pax"?pax:item.qtyMode==="per_group"?1:item.customQty;
  return item.price*r*item.times*qty;
}
const fmt=n=>Math.round(n).toLocaleString("vi-VN")+" ₫";
const fmtRange=(a,b)=>a.toLocaleString("vi-VN")+" – "+b.toLocaleString("vi-VN")+" ₫";
const calcEndDate=(startDate,days)=>{
  if(!startDate)return null;
  const d=new Date(startDate);
  d.setDate(d.getDate()+Math.max(0,days-1));
  return d;
};
const fmtDate=(d,en)=>d?(typeof d==="string"?new Date(d):d).toLocaleDateString(en?"en-GB":"vi-VN"):"";

/* ═══ INLINE EDIT NUMBER ═══════════════════════════════ */
function EN({value,onChange,min=0,step=1,suffix="",width=80,style={}}){
  const[ed,setEd]=useState(false);
  const[d,setD]=useState(value);
  const commit=()=>{
    const n=parseFloat(d);
    if(!isNaN(n)&&n>=min){onChange(n);setEd(false);}else{setD(value);setEd(false);}
  };
  if(ed){
    return <input autoFocus type="number" value={d} step={step}
      onChange={e=>setD(e.target.value)} onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setD(value);setEd(false);}}}
      className="ii" style={{width,fontSize:"inherit",fontWeight:"inherit",...style}}/>;
  }
  return <span className="ec" onClick={()=>{setD(value);setEd(true);}} style={style}>
    {value.toLocaleString("vi-VN")}{suffix}
  </span>;
}

/* ═══ INLINE EDIT TEXT ═════════════════════════════════ */
function ET({value,onChange,placeholder="",style={}}){
  const[ed,setEd]=useState(false);
  const[d,setD]=useState(value);
  const commit=()=>{onChange(d.trim()||value);setEd(false);};
  if(ed){
    return <input autoFocus value={d} onChange={e=>setD(e.target.value)} onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setD(value);setEd(false);}}}
      className="ii" style={{fontSize:"inherit",fontWeight:"inherit",width:"100%",...style,color:"#0f3a4a",background:"rgba(255,255,255,0.92)"}}/>;
  }
  return <span className="ec" onClick={()=>{setD(value);setEd(true);}} title="Nhấp để sửa"
    style={{color:value?"inherit":"rgba(15,58,74,0.35)",...style}}>
    {value||placeholder}
  </span>;
}


/* ═══ HOTEL MODAL – Multi-option per hotel (room type / season) ═══ */
function HotelModal({onClose,onPick,template,canEdit=true}){
  const isIntl=template==="intl";
  const[city,setCity]=useState(()=>{
    try{return localStorage.getItem("vte_hotel_city")||"hcm";}catch(e){return "hcm";}
  });
  const[search,setSearch]=useState("");
  const[starFilter,setStarFilter]=useState(0);
  const[showAddHotel,setShowAddHotel]=useState(false);
  const[expandedHotel,setExpandedHotel]=useState(null); // hotel name being expanded for option selection
  const[addOptionFor,setAddOptionFor]=useState(null); // hotel name where adding option
  
  // Storage keys per city
  const STORAGE_HOTELS="vte_hotels_v2_"+city; // user's full hotel list (mix DB + custom)
  
  // Initialize: load user's saved hotels, or seed from DB if empty
  const[hotels,setHotels]=useState(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem(STORAGE_HOTELS)||"null");
      if(saved&&Array.isArray(saved))return saved;
    }catch(e){}
    // Seed from DB: each hotel has empty options array (user fills in)
    return (HOTEL_DB[city]||[]).map(h=>({
      name:h.name,stars:h.stars,note:h.note,
      options:[] // user will add options like "Superior - Low season", "Deluxe - High season"
    }));
  });

  // Reload when city changes
  useEffect(()=>{
    try{localStorage.setItem("vte_hotel_city",city);}catch(e){}
    try{
      const saved=JSON.parse(localStorage.getItem("vte_hotels_v2_"+city)||"null");
      if(saved&&Array.isArray(saved)){setHotels(saved);return;}
    }catch(e){}
    setHotels((HOTEL_DB[city]||[]).map(h=>({
      name:h.name,stars:h.stars,note:h.note,options:[]
    })));
    setExpandedHotel(null);
    setAddOptionFor(null);
  },[city]);
  
  const saveHotels=(list)=>{
    setHotels(list);
    try{localStorage.setItem("vte_hotels_v2_"+city,JSON.stringify(list));}catch(e){}
  };
  
  // New hotel form
  const[newH,setNewH]=useState({name:"",stars:4,note:""});
  const handleAddHotel=()=>{
    if(!newH.name.trim()){alert("Vui lòng nhập tên khách sạn");return;}
    const next=[...hotels,{name:newH.name.trim(),stars:newH.stars,note:newH.note,options:[],custom:true}];
    saveHotels(next);
    setNewH({name:"",stars:4,note:""});
    setShowAddHotel(false);
  };
  const handleDeleteHotel=(idx)=>{
    if(!confirm(`Xoá khách sạn "${hotels[idx].name}" khỏi danh sách?`))return;
    saveHotels(hotels.filter((_,i)=>i!==idx));
    if(expandedHotel===hotels[idx].name)setExpandedHotel(null);
  };
  
  // New option form (per hotel)
  const[newOpt,setNewOpt]=useState({label:"",price:0,note:""});
  const handleAddOption=(hotelName)=>{
    if(!newOpt.label.trim()){alert("Vui lòng nhập tên phương án (VD: Deluxe - Mùa cao điểm)");return;}
    if(newOpt.price<=0){alert("Vui lòng nhập giá");return;}
    const next=hotels.map(h=>h.name===hotelName?{...h,options:[...h.options,{...newOpt,label:newOpt.label.trim()}]}:h);
    saveHotels(next);
    setNewOpt({label:"",price:0,note:""});
    setAddOptionFor(null);
  };
  const handleDeleteOption=(hotelName,optIdx)=>{
    const next=hotels.map(h=>h.name===hotelName?{...h,options:h.options.filter((_,i)=>i!==optIdx)}:h);
    saveHotels(next);
  };
  const handleEditOption=(hotelName,optIdx,field,val)=>{
    const next=hotels.map(h=>{
      if(h.name!==hotelName)return h;
      const opts=[...h.options];
      opts[optIdx]={...opts[optIdx],[field]:val};
      return {...h,options:opts};
    });
    saveHotels(next);
  };
  
  // Filter
  const filtered=hotels.filter(h=>{
    if(starFilter>0&&h.stars!==starFilter)return false;
    if(search.trim()){
      const q=search.toLowerCase().trim();
      return h.name.toLowerCase().includes(q)||(h.note||"").toLowerCase().includes(q);
    }
    return true;
  });
  
  const cityLabel=(HOTEL_CITIES.find(c=>c.id===city)||{}).label||"";

  if(isIntl){

            <div>
              <div style={{fontSize:18,fontWeight:800}}>🏨 Khách sạn quốc tế</div>
              <div style={{fontSize:12,opacity:0.75,marginTop:2}}>Tour outbound: dùng DMC hoặc nhập thủ công</div>
            </div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
          </div>
          <div style={{padding:24,color:"rgba(15,58,74,0.6)",fontSize:13,lineHeight:1.6}}>
            <p style={{marginBottom:12}}>💡 <strong>Tour quốc tế:</strong> Giá khách sạn outbound thường đã bao gồm trong gói DMC. Vui lòng dùng rate card <strong>📋 DMC</strong> hoặc nhập trực tiếp vào dòng "Khách sạn" với tiền tệ địa phương.</p>
          </div>
        </div>
      </div>
    );
  }
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:920}}>
        <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",padding:"20px 26px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>

              {filtered.length}/{hotels.length} khách sạn · Click ▾ để xem/thêm phương án giá (hạng phòng / mùa)
            </div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
        </div>
        
        {/* City selector */}
        <div style={{padding:"12px 26px",borderBottom:"1px solid rgba(20,150,140,0.1)",background:"rgba(168,230,221,0.15)"}}>
          <div style={{color:"#0d7a6a",fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>📍 Chọn thành phố</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {HOTEL_CITIES.map(c=>(
              <button key={c.id} onClick={()=>{setCity(c.id);setSearch("");setExpandedHotel(null);setAddOptionFor(null);}} style={{
                background:city===c.id?"linear-gradient(135deg,#14a08c,#0d7a6a)":"#fff",
                border:`1.5px solid ${city===c.id?"transparent":"rgba(20,150,140,0.3)"}`,
                color:city===c.id?"#fff":"#0d7a6a",
                borderRadius:8,padding:"5px 11px",cursor:"pointer",
                fontSize:12,fontWeight:city===c.id?700:600,
                fontFamily:"inherit"
              }}>
                {c.label}
              </button>
            ))}
          </div>
        </div>
        
        {/* Search + filters + add hotel */}
        <div style={{padding:"14px 26px",borderBottom:"1px solid rgba(20,150,140,0.1)",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Tìm khách sạn..."
            style={{flex:1,minWidth:200,background:"#fff",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:9,padding:"8px 13px",fontSize:13,outline:"none",fontFamily:"inherit",color:"#0f3a4a"}}/>

                            <input type="number" value={newOpt.price||""} onChange={e=>setNewOpt(p=>({...p,price:+e.target.value}))} placeholder="Giá VND"

                            <input value={newOpt.note} onChange={e=>setNewOpt(p=>({...p,note:e.target.value}))} placeholder="Ghi chú (vd: 2024-2025, gồm BF...)"
                              style={{background:"#fff",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:7,padding:"6px 10px",fontSize:12,outline:"none",fontFamily:"inherit",color:"#0f3a4a"}}/>
                            <div style={{display:"flex",gap:5}}>
                              <button onClick={()=>handleAddOption(h.name)} style={{background:"linear-gradient(135deg,#14a08c,#0d7a6a)",color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>✓</button>
                              <button onClick={()=>{setAddOptionFor(null);setNewOpt({label:"",price:0,note:""});}} style={{background:"rgba(220,50,80,0.1)",border:"1px solid rgba(220,50,80,0.3)",color:"#dc3250",borderRadius:6,padding:"6px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✕</button>
                            </div>
                          </div>

                            💡 Gợi ý: <strong>Loại phòng</strong> (Superior/Deluxe/Suite) · <strong>Mùa</strong> (Thấp/Cao/Lễ tết) · <strong>Package</strong> (BB/HB/FB) · <strong>View</strong> (City/Sea/Mountain)
                          </div>
                        </div>
                      ):(
                        <button onClick={()=>setAddOptionFor(h.name)} style={{marginTop:10,width:"100%",background:"rgba(20,150,140,0.06)",border:"1px dashed #14a08c",borderRadius:8,padding:"8px",cursor:"pointer",color:"#0d7a6a",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>
                          ➕ Thêm phương án giá (hạng phòng / mùa / package)
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

          💡 Mỗi KS có thể có nhiều phương án giá khác nhau (theo hạng phòng / mùa / package) · Click giá để sửa · Tất cả lưu local theo thành phố
        </div>
      </div>
    </div>
  );
}

/* ═══ VISA MODAL – Bảng giá visa theo quốc gia × loại × hạng mục chi phí ═══ */
function VisaModal({onClose,onPick,canEdit=true}){
  const STORAGE_KEY="vte_visa_rates";
  const [country,setCountry]=useState("jp");
  const [visaType,setVisaType]=useState("tourist_single");
  // Load custom prices override from localStorage (merged with defaults)
  const [overrides,setOverrides]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch(e){return {};}
  });
  // Selected cost types (to bulk add)
  const [selected,setSelected]=useState(()=>VISA_COST_TYPES.reduce((o,c)=>({...o,[c.id]:true}),{}));

  const ct=VISA_COUNTRIES.find(c=>c.id===country);
  const vt=VISA_TYPES.find(v=>v.id===visaType);
  // Effective price (override > default > 0)
  const getPrice=(costId)=>{
    const ov=overrides[country]?.[visaType]?.[costId];
    if(ov!=null)return +ov;
    return RATE_VISA[country]?.[visaType]?.[costId]||0;
  };
  const setPrice=(costId,val)=>{
    const next={...overrides};
    if(!next[country])next[country]={};
    if(!next[country][visaType])next[country][visaType]={...(RATE_VISA[country]?.[visaType]||{})};
    next[country][visaType][costId]=+val;
    setOverrides(next);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(next));}catch(e){}
  };
  const resetPrice=(costId)=>{
    const next={...overrides};
    if(next[country]?.[visaType]?.[costId]!=null){
      delete next[country][visaType][costId];
      if(Object.keys(next[country][visaType]).length===0)delete next[country][visaType];
      if(Object.keys(next[country]||{}).length===0)delete next[country];
      setOverrides(next);
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(next));}catch(e){}
    }
  };
  const isOverridden=(costId)=>overrides[country]?.[visaType]?.[costId]!=null;

  const addOne=(costId)=>{
    const cost=VISA_COST_TYPES.find(c=>c.id===costId);
    const price=getPrice(costId);
    if(price<=0){alert("Giá đang là 0₫. Nhấp vào giá để chỉnh trước.");return;}
    onPick({
      label:`${ct.flag} ${ct.label} · ${vt.short} · ${cost.label}`,
      min:price,max:price,unit:"/người",note:`Visa ${ct.label} - ${vt.label}`,
      cur:"VND",
    });
  };

  const totalSelected=VISA_COST_TYPES.filter(c=>selected[c.id]).reduce((s,c)=>s+getPrice(c.id),0);
  const countSelected=VISA_COST_TYPES.filter(c=>selected[c.id]&&getPrice(c.id)>0).length;

  const addBulk=()=>{
    if(countSelected===0){alert("Chọn ít nhất 1 hạng mục có giá > 0");return;}
    // Single combined line representing the full visa package
    onPick({
      label:`${ct.flag} ${ct.label} · ${vt.label} (Trọn gói)`,
      min:totalSelected,max:totalSelected,unit:"/người",
      note:`Gồm ${countSelected} hạng mục: `+VISA_COST_TYPES.filter(c=>selected[c.id]&&getPrice(c.id)>0).map(c=>c.label).join(", "),
      cur:"VND",
    });
  };

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:920}}>
        <div style={{background:"linear-gradient(135deg,#16a085,#1abc9c)",color:"#fff",padding:"22px 28px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:19,fontWeight:800,display:"flex",alignItems:"center",gap:10}}>🛂 Bảng giá Visa quốc tế</div>
            <div style={{fontSize:12,opacity:0.85,marginTop:3}}>{VISA_COUNTRIES.length} quốc gia · 4 loại visa · 9 hạng mục chi phí · Đơn giá VND/người</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:8,color:"#fff",width:34,height:34,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
        </div>

        <div style={{padding:"20px 24px",maxHeight:"72vh",overflowY:"auto"}}>
          {!canEdit&&<div style={{background:"rgba(245,166,35,0.1)",border:"1px solid rgba(245,166,35,0.4)",borderRadius:9,padding:"8px 14px",marginBottom:16,fontSize:12,color:"#d18a13",fontWeight:600}}>🔒 Chế độ chỉ xem · Tài khoản hiện tại không có quyền chỉnh sửa rate card</div>}

          {/* Country picker */}
          <div style={{marginBottom:18}}>
            <div style={{color:"rgba(15,58,74,0.6)",fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>1. Chọn quốc gia</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {VISA_COUNTRIES.map(c=>(
                <button key={c.id} onClick={()=>setCountry(c.id)} style={{
                  background:country===c.id?"linear-gradient(135deg,#16a085,#1abc9c)":"#fff",
                  border:`1.5px solid ${country===c.id?"transparent":"rgba(20,150,140,0.2)"}`,
                  color:country===c.id?"#fff":"rgba(15,58,74,0.7)",
                  borderRadius:9,padding:"7px 13px",cursor:"pointer",fontSize:13,fontWeight:country===c.id?700:500,fontFamily:"inherit",
                  display:"flex",alignItems:"center",gap:6,
                  boxShadow:country===c.id?"0 3px 10px rgba(20,150,140,0.3)":"none",
                }}>
                  <span style={{fontSize:16}}>{c.flag}</span>
                  <span>{c.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Visa type tabs */}
          <div style={{marginBottom:18}}>
            <div style={{color:"rgba(15,58,74,0.6)",fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>2. Chọn loại visa</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8}}>
              {VISA_TYPES.map(v=>(
                <button key={v.id} onClick={()=>setVisaType(v.id)} style={{
                  background:visaType===v.id?"#0f3a4a":"rgba(20,150,140,0.06)",
                  border:`1.5px solid ${visaType===v.id?"#0f3a4a":"rgba(20,150,140,0.2)"}`,
                  color:visaType===v.id?"#fff":"rgba(15,58,74,0.7)",
                  borderRadius:10,padding:"10px 14px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",
                  display:"flex",alignItems:"center",gap:8,
                }}>
                  <span style={{fontSize:18}}>{v.icon}</span>
                  <span>{v.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Cost types table */}
          <div style={{background:"#fff",border:"1.5px solid rgba(20,150,140,0.15)",borderRadius:12,overflow:"hidden"}}>
            <div style={{background:"rgba(20,150,140,0.06)",padding:"10px 16px",borderBottom:"1.5px solid rgba(20,150,140,0.15)",display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1,fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#0d7a6a"}}>3. Các hạng mục chi phí · {ct.flag} {ct.label} · {vt.label}</div>
              <button onClick={()=>{
                const allOn=VISA_COST_TYPES.every(c=>selected[c.id]);
                setSelected(VISA_COST_TYPES.reduce((o,c)=>({...o,[c.id]:!allOn}),{}));
              }} style={{background:"rgba(20,150,140,0.1)",border:"1px solid rgba(20,150,140,0.3)",color:"#0d7a6a",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                {VISA_COST_TYPES.every(c=>selected[c.id])?"Bỏ chọn":"Chọn tất cả"}
              </button>
            </div>
            {VISA_COST_TYPES.map((cost,i)=>{
              const price=getPrice(cost.id);
              const overridden=isOverridden(cost.id);
              return(
                <div key={cost.id} style={{
                  padding:"11px 16px",
                  borderTop:i>0?"1px solid rgba(20,150,140,0.08)":"none",
                  display:"flex",alignItems:"center",gap:12,
                  background:selected[cost.id]?(overridden?"rgba(155,89,182,0.05)":"transparent"):"rgba(15,58,74,0.025)",
                }}>
                  <input type="checkbox" checked={selected[cost.id]} onChange={()=>setSelected(s=>({...s,[cost.id]:!s[cost.id]}))}
                    style={{width:17,height:17,accentColor:"#16a085",cursor:"pointer",flexShrink:0}}/>
                  <span style={{fontSize:18,width:24,textAlign:"center",flexShrink:0}}>{cost.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:selected[cost.id]?"#0f3a4a":"rgba(15,58,74,0.5)",fontWeight:600,fontSize:13}}>{cost.label}{overridden&&<span style={{marginLeft:6,background:"rgba(155,89,182,0.15)",color:"#8e44ad",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:4}}>Đã chỉnh</span>}</div>
                    <div style={{color:"rgba(15,58,74,0.4)",fontSize:11,marginTop:1}}>{cost.labelEn}</div>
                  </div>
                  <div style={{textAlign:"right",minWidth:130}}>
                    {canEdit?<EN value={price} onChange={v=>setPrice(cost.id,v)} min={0} width={120} suffix=" ₫" style={{color:overridden?"#8e44ad":(price>0?"#0d7a6a":"rgba(15,58,74,0.3)"),fontWeight:700,fontSize:14,textAlign:"right"}}/>:<div style={{color:price>0?"#0d7a6a":"rgba(15,58,74,0.3)",fontWeight:700,fontSize:14,textAlign:"right",padding:"4px 8px"}}>{Math.round(price).toLocaleString("vi-VN")} ₫</div>}
                    {canEdit&&overridden&&<div><button onClick={()=>resetPrice(cost.id)} style={{background:"none",border:"none",color:"#8e44ad",fontSize:10,cursor:"pointer",fontFamily:"inherit",textDecoration:"underline",marginTop:1}}>↺ Mặc định</button></div>}
                  </div>
                  <button onClick={()=>addOne(cost.id)} disabled={price<=0} style={{
                    background:price>0?"linear-gradient(135deg,#16a085,#1abc9c)":"rgba(15,58,74,0.08)",
                    border:"none",color:price>0?"#fff":"rgba(15,58,74,0.3)",
                    borderRadius:7,padding:"6px 12px",cursor:price>0?"pointer":"not-allowed",fontSize:12,fontWeight:700,fontFamily:"inherit",
                    flexShrink:0,
                  }}>+ Thêm</button>
                </div>
              );
            })}
          </div>

          {/* Bulk add footer */}
          <div style={{marginTop:18,background:"linear-gradient(135deg,rgba(20,150,140,0.08),rgba(26,188,156,0.05))",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
            <div style={{flex:1}}>
              <div style={{color:"rgba(15,58,74,0.6)",fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Trọn gói visa đã chọn</div>
              <div style={{color:"#0d7a6a",fontWeight:800,fontSize:20}}>{Math.round(totalSelected).toLocaleString("vi-VN")} ₫<span style={{fontSize:12,fontWeight:500,color:"rgba(15,58,74,0.5)",marginLeft:6}}>/người · {countSelected} hạng mục</span></div>
            </div>
            <button onClick={addBulk} disabled={countSelected===0} style={{
              background:countSelected>0?"linear-gradient(135deg,#0d7a6a,#14a08c)":"rgba(15,58,74,0.08)",
              border:"none",color:countSelected>0?"#fff":"rgba(15,58,74,0.3)",
              borderRadius:10,padding:"11px 22px",cursor:countSelected>0?"pointer":"not-allowed",fontWeight:800,fontSize:14,fontFamily:"inherit",
            }}>➕ Thêm trọn gói vào báo giá</button>
          </div>

          <div style={{textAlign:"center",color:"rgba(15,58,74,0.4)",fontSize:11,marginTop:14,padding:"0 12px"}}>
            💡 Click giá để chỉnh thủ công · Giá tự lưu localStorage · "+ Thêm" để add từng dòng riêng · "Trọn gói" để gộp các hạng mục đã tick vào 1 dòng báo giá
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ RATE CARD MODAL (template-aware: domestic=city, intl=country) ═══ */
function RateCardModal({type,template,onClose,onPick}){
  const isIntl=template==="intl";
  // For domestic template: transport uses city selector; staff/dmc are flat list
  // For intl template: transport/staff/dmc all use country selector
  const usesSelector=isIntl?(type==="transport"||type==="staff"||type==="dmc"):(type==="transport");
  const selectorList=isIntl?INTL_COUNTRIES:TRANSPORT_CITIES;
  const selectorDefault=isIntl?"th":"hcm";
  const SELECTOR_KEY=isIntl?"vte_intl_country":"vte_transport_city";
  
  const[selectorId,setSelectorId]=useState(()=>{
    try{return localStorage.getItem(SELECTOR_KEY)||selectorDefault;}catch(e){return selectorDefault;}
  });
  
  // Pick data source based on type + template
  const getDefaultData=(sid)=>{
    if(isIntl){
      if(type==="transport")return RATE_TRANSPORT_INTL[sid]||[];
      if(type==="staff")return RATE_STAFF_INTL[sid]||[];
      if(type==="dmc")return RATE_DMC_INTL[sid]||[];
      if(type==="logistics")return RATE_LOGISTICS;
      if(type==="gala")return RATE_GALA;
      return RATE_INSURANCE;
    }
    if(type==="transport")return RATE_TRANSPORT[sid]||[];
    if(type==="staff")return RATE_STAFF;
    if(type==="insurance")return RATE_INSURANCE;
    if(type==="logistics")return RATE_LOGISTICS;
    if(type==="gala")return RATE_GALA;
    if(type==="teambuild")return RATE_TEAMBUILD;
    if(type==="meeting")return RATE_MEETING;
    return RATE_DMC;
  };
  
  const STORAGE_KEY=usesSelector?`vte_rate_${template||"dom"}_${type}_${selectorId}`:`vte_rate_${type}`;
  const defaultData=getDefaultData(selectorId);
  
  const[data,setData]=useState(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");
      if(saved&&Array.isArray(saved)&&saved.length===defaultData.length)return saved;
    }catch(e){}
    return clone(defaultData);
  });
  const[editMode,setEditMode]=useState(false);
  
  // Reload data when selector changes
  useEffect(()=>{
    if(!usesSelector) return;
    try{localStorage.setItem(SELECTOR_KEY,selectorId);}catch(e){}
    const newKey=`vte_rate_${template||"dom"}_${type}_${selectorId}`;
    const newDefault=getDefaultData(selectorId);
    try{
      const saved=JSON.parse(localStorage.getItem(newKey)||"null");
      if(saved&&Array.isArray(saved)&&saved.length===newDefault.length){
        setData(saved);
        return;
      }
    }catch(e){}
    setData(clone(newDefault));
  },[selectorId,usesSelector,type,template]);
  
  const titles={transport:"🚌 Xe vận chuyển",staff:"👥 Nhân sự (HDV / Trưởng đoàn)",insurance:"🛡️ Bảo hiểm du lịch",dmc:"🌐 DMC Package – Đối tác địa phương",logistics:"📦 Logistics & Sản xuất",gala:"🎆 Gala Dinner",teambuild:"🎯 Team Building",meeting:"📊 Meeting / Hội nghị"};
  const currentLoc=(selectorList.find(c=>c.id===selectorId)||{}).label||"";
  
  const saveData=(newData)=>{
    setData(newData);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(newData));}catch(e){}
  };
  const updRate=(i,field,val)=>{
    const next=clone(data);
    next[i][field]=val;
    saveData(next);
  };
  const addRate=()=>{
    const next=[...data,{label:"Hạng mục mới",min:1000000,max:1500000,unit:type==="staff"?"/người/ngày":(type==="dmc"?"/người":"/xe/ngày"),note:"Mô tả..."}];
    saveData(next);
  };
  const delRate=(i)=>{
    if(!confirm("Xoá hạng mục này khỏi rate card?"))return;
    const next=data.filter((_,idx)=>idx!==i);
    saveData(next);
  };
  const resetDefaults=()=>{
    if(!confirm("Khôi phục rate card về giá mặc định? Mọi chỉnh sửa sẽ bị mất."))return;
    saveData(clone(defaultData));
  };
  
  // Auto-detect currency for intl picker
  const pickedCur=isIntl&&(type==="transport"||type==="staff"||type==="dmc")
    ?((INTL_COUNTRIES.find(c=>c.id===selectorId)||{}).cur||"VND")
    :"VND";
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",padding:"20px 26px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:18,fontWeight:800}}>{titles[type]}</div>
            <div style={{fontSize:12,opacity:0.75,marginTop:2}}>{editMode?"✏️ Chế độ chỉnh sửa – Click số để sửa":(usesSelector?`Tại ${currentLoc} · Click dòng để thêm`:"Click vào dòng để thêm vào bảng tính")}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setEditMode(m=>!m)} style={{background:editMode?"#ffe082":"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,color:editMode?"#0d7a6a":"#fff",padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>{editMode?"✓ Xong":"✏️ Sửa"}</button>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
          </div>
        </div>
        
        {/* LOCATION SELECTOR (city for domestic, country for intl) */}
        {usesSelector&&(
          <div style={{padding:"14px 26px",borderBottom:"1px solid rgba(20,150,140,0.1)",background:"rgba(168,230,221,0.15)"}}>
            <div style={{color:"#0d7a6a",fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>
              📍 {isIntl?"Chọn quốc gia":"Chọn tỉnh thành"}
              {isIntl&&<span style={{color:"rgba(15,58,74,0.5)",marginLeft:8,fontWeight:500,letterSpacing:0,textTransform:"none"}}>Giá hiển thị theo tiền tệ địa phương</span>}
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {selectorList.map(c=>(
                <button key={c.id} onClick={()=>setSelectorId(c.id)} style={{
                  background:selectorId===c.id?"linear-gradient(135deg,#14a08c,#0d7a6a)":"#fff",
                  border:`1.5px solid ${selectorId===c.id?"transparent":"rgba(20,150,140,0.3)"}`,
                  color:selectorId===c.id?"#fff":"#0d7a6a",
                  borderRadius:9,padding:"6px 13px",cursor:"pointer",
                  fontSize:12,fontWeight:selectorId===c.id?700:600,
                  fontFamily:"inherit",transition:"all .15s",
                  display:"flex",alignItems:"center",gap:5
                }}>
                  <span>{c.icon}</span><span>{c.label}</span>
                  {isIntl&&<span style={{opacity:0.6,fontSize:10,marginLeft:2}}>{c.cur}</span>}
                </button>
              ))}
            </div>
          </div>

                    <EN value={r.max} onChange={v=>updRate(i,"max",v)} min={0} width={100} style={{color:"#0d7a6a",fontWeight:700,fontSize:13}}/>
                    <span style={{color:"rgba(15,58,74,0.5)",fontSize:11}}>{pickedCur} (TB: {avg.toLocaleString("vi-VN")})</span>
                  </div>
                  <div style={{display:"flex",gap:10,fontSize:12,alignItems:"center"}}>
                    <span style={{color:"rgba(15,58,74,0.55)"}}>Đơn vị:</span>

                  </div>
                </div>
              );
            }
            // Detect currency from note text (VND override) or use pickedCur
            const isVNDOverride=(r.note||"").toLowerCase().includes("giá vnd")||(r.note||"").toLowerCase().includes("vnd ·");
            const itemCur=isVNDOverride?"VND":pickedCur;
            // Section divider row (label wrapped in ── ──, price 0)
            const isDivider=r.label.startsWith("──")&&r.min===0&&r.max===0;
            if(isDivider){
              return(
                <div key={i} style={{padding:"10px 14px 4px",marginTop:i>0?6:0}}>

                  <div style={{color:"rgba(15,58,74,0.45)",fontSize:11,marginTop:3,fontStyle:"italic"}}>{r.note}</div>
                </div>
              );
            }
            return(
              <div key={i} className="rate-card" onClick={()=>onPick({
                name:usesSelector?`${r.label} (${currentLoc})`:r.label,
                price:avg,unit:r.unit,cur:itemCur,note:r.note,
                qtyMode:r.unit.includes("xe")||r.unit.includes("chuyến")||r.unit.includes("phòng")?"custom":"per_pax"
              })}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#0f3a4a",fontWeight:700,fontSize:14}}>{r.label}</div>
                  <div style={{color:"rgba(15,58,74,0.55)",fontSize:12,marginTop:2}}>{r.note}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{color:"#0d7a6a",fontWeight:800,fontSize:14,whiteSpace:"nowrap"}}>{r.min.toLocaleString("vi-VN")} – {r.max.toLocaleString("vi-VN")} {itemCur==="VND"?"₫":itemCur}</div>
                  <div style={{color:"rgba(15,58,74,0.4)",fontSize:11,marginTop:2}}>{r.unit} · TB {avg.toLocaleString("vi-VN")}</div>
                </div>
              </div>
            );
          })}
          {editMode&&(
            <button onClick={addRate} style={{background:"rgba(20,150,140,0.08)",border:"1px dashed #14a08c",borderRadius:10,padding:"12px",cursor:"pointer",color:"#0d7a6a",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>＋ Thêm hạng mục mới</button>
          )}

        <div style={{padding:"14px 26px 20px",borderTop:"1px solid rgba(20,150,140,0.1)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div style={{fontSize:11,color:"rgba(15,58,74,0.5)",flex:1}}>
            {editMode?"💾 Tự động lưu vào trình duyệt":"📌 Giá tham khảo · Click dòng để thêm vào bảng"}
            {usesSelector&&!editMode&&<span style={{marginLeft:8}}>· Đang xem giá tại <strong style={{color:"#0d7a6a"}}>{currentLoc}</strong>{isIntl&&` (${pickedCur})`}</span>}
          </div>
          {editMode&&(
            <button onClick={resetDefaults} style={{background:"rgba(245,166,35,0.1)",border:"1px solid rgba(245,166,35,0.4)",color:"#d18a13",borderRadius:8,padding:"5px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>↺ Reset mặc định</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══ LOGIN SCREEN ═════════════════════════════════════ */
function LoginScreen({onLogin}){
  const[u,setU]=useState("");
  const[p,setP]=useState("");
  const[err,setErr]=useState("");
  const[syncing,setSyncing]=useState(false);
  const doLogin=async()=>{
    /* Sync cloud trước khi kiểm tra credentials */
    if(!syncing){
      setSyncing(true);
      await syncUsersFromCloud().catch(()=>{});
      setSyncing(false);
    }
    const found=ldUsers().find(x=>x.u===u.trim().toLowerCase()&&x.p===p);
    if(found){onLogin(found);}
    else{setErr("Sai tài khoản hoặc mật khẩu");setTimeout(()=>setErr(""),3000);}
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div className="glass-strong fade-in" style={{borderRadius:24,padding:"36px 44px 40px",width:"100%",maxWidth:440}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <img src={VTE_LOGO} style={{height:90,marginBottom:18}} alt="Viettours"/>
          <div style={{fontSize:22,fontWeight:800,color:"#0f3a4a",marginBottom:4}}>Đăng nhập hệ thống</div>
          <div style={{color:"rgba(15,58,74,0.55)",fontSize:13}}>Bảng tính chi phí tour</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{color:"rgba(15,58,74,0.6)",fontSize:12,fontWeight:600,marginBottom:6}}>TÊN ĐĂNG NHẬP</div>
          <input className="login-input" value={u} onChange={e=>setU(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")doLogin();}} placeholder="ceo / sale1 / manager1..."/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{color:"rgba(15,58,74,0.6)",fontSize:12,fontWeight:600,marginBottom:6}}>MẬT KHẨU</div>
          <input className="login-input" type="password" value={p} onChange={e=>setP(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")doLogin();}} placeholder="••••••"/>
        </div>
        {err&&<div style={{background:"rgba(220,50,80,0.1)",border:"1px solid rgba(220,50,80,0.3)",borderRadius:10,padding:"10px 14px",color:"#dc3250",fontSize:13,marginBottom:14,textAlign:"center"}}>⚠ {err}</div>}
        <button onClick={doLogin} style={{width:"100%",background:"linear-gradient(135deg,#14a08c,#0d7a6a)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontWeight:800,fontSize:15,letterSpacing:0.5}}>
          ĐĂNG NHẬP →
        </button>
        <div style={{marginTop:24,padding:"16px 18px",background:"rgba(168,230,221,0.25)",borderRadius:12,fontSize:12,color:"rgba(15,58,74,0.65)",lineHeight:1.8}}>
          <div style={{fontWeight:700,color:"#0d7a6a",marginBottom:6,fontSize:11,letterSpacing:1.5,textTransform:"uppercase"}}>Tài khoản demo</div>
          <div><strong>ceo</strong> / ceo123 — Tony</div>
          <div><strong>manager1</strong> / mgr123 — Trưởng Phòng</div>
          <div><strong>sale1, sale2, sale3</strong> / sale123 — Sales</div>
          <div><strong>op1</strong> / op123 — Operations</div>
        </div>
      </div>
    </div>
  );
}

/* ═══ LINE ROW ═════════════════════════════════════════ */
function LineRow({item,pax,rates,onUpd,onDel,catColor,outputCurrency}){
  const vnd=calcVND(item,rates,pax);
  const off=item.enabled===false;
  const u=p=>onUpd({...item,...p});
  /* DMC: display in output currency */
  const displayAmt=outputCurrency&&outputCurrency!=="VND"&&rates[outputCurrency]
    ?(vnd/rates[outputCurrency]):vnd;
  const fmtDisplay=outputCurrency&&outputCurrency!=="VND"
    ?n=>fmtCurrency(n,outputCurrency)
    :fmt;
  return(
    <tr style={{borderBottom:"1px solid rgba(20,150,140,0.08)",opacity:off?0.4:1}}>
      <td style={{padding:"8px 10px",textAlign:"center",width:46}}>
        <button className="toggle" onClick={()=>u({enabled:!off?false:true})}
          style={{background:off?"rgba(15,58,74,0.15)":"#14a08c"}} title={off?"Tắt – click để bật":"Bật – click để tắt"}>
          <div className="toggle-knob" style={{left:off?2:19}}/>
        </button>
      </td>
      <td style={{padding:"9px 12px",minWidth:140}}>
        <ET value={item.name} onChange={v=>u({name:v})} placeholder="Mô tả..." style={{fontSize:13,fontWeight:600}}/>
      </td>
      <td style={{padding:"9px 12px",minWidth:180,maxWidth:260}}>
        <ET value={item.note} onChange={v=>u({note:v})} placeholder="Chi tiết / ghi chú..." style={{fontSize:12,fontStyle:item.note?"normal":"italic",color:"rgba(15,58,74,0.7)"}}/>
      </td>
      <td style={{padding:"9px 10px",whiteSpace:"nowrap"}}>
        <select className="sel" value={item.cur} onChange={e=>u({cur:e.target.value})}>
          {Object.keys(rates).map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <EN value={item.price} onChange={v=>u({price:v})} min={0} step={0.01} width={86} style={{fontWeight:700,marginLeft:6,fontSize:14}}/>
      </td>
      <td style={{padding:"9px 8px"}}>
        <select className="sel" value={item.unit} onChange={e=>u({unit:e.target.value})}>
          {UNITS.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      </td>
      <td style={{padding:"9px 10px",textAlign:"center"}}>
        <EN value={item.times} onChange={v=>u({times:v})} min={1} width={48} style={{fontSize:14}}/>
      </td>
      <td style={{padding:"9px 8px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
          <select className="sel" value={item.qtyMode} onChange={e=>u({qtyMode:e.target.value})} style={{fontSize:11}}>
            <option value="per_pax">×pax</option>
            <option value="per_group">đoàn</option>
            <option value="custom">tuỳ</option>
          </select>
          {item.qtyMode==="custom"
            ?<EN value={item.customQty} onChange={v=>u({customQty:v})} min={1} width={44} style={{fontSize:14}}/>
            :<span style={{color:"rgba(15,58,74,0.4)",fontSize:12}}>{item.qtyMode==="per_pax"?`=${pax}`:"=1"}</span>}
        </div>
      </td>
      <td style={{padding:"9px 12px",textAlign:"right",fontWeight:700,color:off?"rgba(15,58,74,0.3)":(item.foc?"#27ae60":catColor),whiteSpace:"nowrap",fontSize:14}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
          {item.foc?<span style={{background:"#27ae60",color:"#fff",fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:5,letterSpacing:0.5}}>FOC</span>:<span>{fmtDisplay(displayAmt)}</span>}
          <button onClick={()=>u({foc:!item.foc})} title={item.foc?"Bỏ FOC – tính phí lại":"Đánh dấu Free of Charge"}
            style={{background:item.foc?"rgba(39,174,96,0.15)":"rgba(15,58,74,0.05)",border:`1px solid ${item.foc?"#27ae60":"rgba(15,58,74,0.15)"}`,color:item.foc?"#27ae60":"rgba(15,58,74,0.5)",borderRadius:6,padding:"1px 7px",fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.3}}>
            {item.foc?"✓ FOC":"FOC?"}

        </div>
      </td>
      <td style={{padding:"9px 7px",textAlign:"center"}}>

  const fmtSub=outputCurrency&&outputCurrency!=="VND"?n=>fmtCurrency(n,outputCurrency):fmt;

    <div className="glass" style={{borderRadius:14,marginBottom:14,overflow:"hidden",opacity:enabled?1:0.55}}>

        )}
        <span style={{color:"rgba(15,58,74,0.4)",fontSize:12}}>{items.length} dòng</span>

                  <th style={{padding:"8px 10px",textAlign:"left",fontSize:11,color:"rgba(15,58,74,0.55)",fontWeight:700}}>Hạng mục</th>
                  <th style={{padding:"8px 10px",textAlign:"left",fontSize:11,color:"rgba(15,58,74,0.55)",fontWeight:700}}>Chi tiết / Ghi chú</th>

                  <th style={{padding:"8px 10px",textAlign:"left",fontSize:11,color:"rgba(15,58,74,0.55)",fontWeight:700}}>Đơn vị</th>
                  <th style={{padding:"8px 10px",textAlign:"center",fontSize:11,color:"rgba(15,58,74,0.55)",fontWeight:700}}>Lần</th>
                  <th style={{padding:"8px 10px",textAlign:"center",fontSize:11,color:"rgba(15,58,74,0.55)",fontWeight:700}}>SL</th>
                  <th style={{padding:"8px 10px",textAlign:"right",fontSize:11,color:"rgba(15,58,74,0.55)",fontWeight:700}}>Thành tiền</th>
                  <th></th>
                </tr>
              </thead>

                {items.map(item=>(
                  <LineRow key={item.id} item={item} pax={pax} rates={rates}
                    onUpd={onUpd} onDel={()=>onDel(item.id)} catColor={cat.color} outputCurrency={outputCurrency}/>
                ))}
              </tbody>
            </table>
          </div>
          <button onClick={onAdd} style={{width:"100%",background:"rgba(20,150,140,0.04)",border:"none",borderTop:"1px dashed rgba(20,150,140,0.25)",color:"rgba(20,150,140,0.7)",padding:10,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>＋ Thêm dòng</button>

  );

/* ═══ HISTORY PANEL ════════════════════════════════════ */
function HistPanel({user,cur,onLoad,currentQuoteId,onSetQuoteId,template}){
  const[all,setAll]=useState(ldQuotes);
  const my=all[user.u]||[];
  const[saving,setSaving]=useState(false);
  const[name,setName]=useState("");
  const doSave=async()=>{
    if(!name.trim())return;
    /* Dùng cloudId hiện tại (nếu có) hoặc tạo mới */
    const cloudId=currentQuoteId||Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    const e={id:Date.now(),cloudId,name:name.trim(),date:new Date().toLocaleString("vi-VN"),savedBy:user.name,state:clone(cur)};
    const next={...all,[user.u]:[e,...my].slice(0,50)};
    setAll(next);svQuotes(next);setName("");setSaving(false);
    /* Sync to Firestore cloud — dùng DMC functions nếu template là dmc */
    const _saveQ=template==="dmc"?window.fbSaveDMCQuote:window.fbSaveQuote;
    const _saveS=template==="dmc"?window.fbSaveDMCQuoteState:window.fbSaveQuoteState;
    if(_saveQ&&_saveS){
      try{
        if(!currentQuoteId){
          await _saveQ({
            id:cloudId,name:name.trim(),customer:"",
            template:cur?.template||template||"domestic",dest:cur?.info?.dest||"",
            pax:cur?.pax||1,days:cur?.info?.days||1,nights:cur?.info?.nights||0,
            totalCost:0,savedBy:user.name+" ("+user.role+")",
          });
          if(onSetQuoteId)onSetQuoteId(cloudId);
        }
        await _saveS(cloudId,cur,name.trim()+" · "+new Date().toLocaleString("vi-VN"));
      }catch(err){console.warn("Cloud sync from HistPanel failed:",err.message);}
    }
  };
  const doDel=(id)=>{
    const next={...all,[user.u]:my.filter(h=>h.id!==id)};
    setAll(next);svQuotes(next);
  };
  return(
    <div className="glass-strong" style={{borderRadius:16,padding:22,marginTop:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🗂️</span>
          <span style={{color:"#0f3a4a",fontWeight:700,fontSize:15}}>Lịch sử báo giá</span>
          <span style={{background:"rgba(255,255,255,0.6)",border:"1px solid rgba(20,150,140,0.25)",borderRadius:10,padding:"4px 10px",fontSize:12,color:"#0f3a4a",fontWeight:600}}>👤 {user.name}</span>
          <span style={{color:"rgba(15,58,74,0.4)",fontSize:12}}>{my.length} báo giá</span>
        </div>
        <button onClick={()=>setSaving(s=>!s)} className="btn"
          style={{background:saving?"rgba(220,50,80,0.1)":"linear-gradient(135deg,#14a08c,#0d7a6a)",borderColor:saving?"rgba(220,50,80,0.4)":"transparent",color:saving?"#dc3250":"#fff"}}>
          {saving?"✕ Huỷ":"💾 Lưu báo giá hiện tại"}
        </button>
      </div>
      {saving&&(
        <div style={{marginTop:14,display:"flex",gap:8}}>
          <input autoFocus value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")doSave();}}
            placeholder="Tên báo giá (VD: Nhật 5N4Đ 20pax)..."
            className="login-input" style={{padding:"10px 14px",fontSize:14}}/>
          <button onClick={doSave} style={{background:"linear-gradient(135deg,#14a08c,#0d7a6a)",color:"#fff",border:"none",borderRadius:11,padding:"10px 22px",cursor:"pointer",fontWeight:800,fontSize:14,fontFamily:"inherit"}}>Lưu</button>
        </div>
      )}
      <div style={{marginTop:16}}>
        {my.length===0
          ?<div style={{color:"rgba(15,58,74,0.4)",fontSize:13,textAlign:"center",padding:"22px 0"}}>Chưa lưu báo giá nào</div>
          :<div style={{display:"flex",flexDirection:"column",gap:8}}>
            {my.map(h=>(
              <div key={h.id} className="hist-card" onClick={()=>onLoad(h.state,h.cloudId)}>
                <div>
                  <div style={{color:"#0f3a4a",fontWeight:700,fontSize:14}}>{h.name}</div>
                  <div style={{color:"rgba(15,58,74,0.45)",fontSize:12,marginTop:2}}>{h.date} · bởi {h.savedBy}{h.cloudId&&<span style={{marginLeft:6,color:"#14a08c",fontSize:10}}>☁️</span>}</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{color:"#14a08c",fontSize:12,background:"rgba(20,150,140,0.1)",border:"1px solid rgba(20,150,140,0.3)",borderRadius:8,padding:"4px 10px",fontWeight:600}}>Tải lại</span>
                  <button onClick={e=>{e.stopPropagation();doDel(h.id);}} style={{background:"none",border:"none",color:"rgba(220,50,80,0.45)",cursor:"pointer",fontSize:15,padding:"2px 6px",fontFamily:"inherit"}}>✕</button>
                </div>
              </div>
            ))}
          </div>}
      </div>
    </div>
  );
}

/* ═══ EXPORT EXCEL PRO – Template Viettours (ExcelJS, font Aptos) ═══ */
async function exportExcelPro(info,items,rates,pax,catEnabled,margin,vat,svcBasis,user,template){
  if(!window.ExcelJS){alert("Đang tải thư viện Excel, thử lại sau 3 giây.");return;}
  const foreign = template==="intl";
  const FONT="Aptos";
  const NAVY="FF0F3A4A",TEAL="FF14A08C",INK="FF2B3640",MUTE="FF8A9099",WHITE="FFFFFFFF";
  const ZEBRA="FFF7F9FA",LINE="FFE4E8EB",SUBT="FFEEF2F4",HILITE="FFF4FAF8",YEL="FFFFFBE6";
  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet(foreign?"Báo giá Nước Ngoài":"Báo giá Nội Địa",{views:[{showGridLines:false}]});
  const ncol=foreign?11:9;
  const COLW=foreign?[6,20,38,30,8,13,14,8,7,11,16]:[6,20,40,34,16,9,8,12,17];
  COLW.forEach((w,i)=>{ws.getColumn(i+1).width=w;});
  const col=(n)=>String.fromCharCode(64+n);
  const LAST=col(ncol);
  const fnt=(o={})=>({name:FONT,size:10,color:{argb:INK},...o});
  const fill=(c)=>({type:"pattern",pattern:"solid",fgColor:{argb:c}});
  const hair={style:"thin",color:{argb:LINE}};
  const cen={horizontal:"center",vertical:"middle",wrapText:true};
  const cv={horizontal:"center",vertical:"middle"};
  const rt={horizontal:"right",vertical:"middle"};
  const lf={horizontal:"left",vertical:"middle",wrapText:true};

  // ── Logo ──
  try{
    const b64=VTE_LOGO.includes(",")?VTE_LOGO.split(",")[1]:VTE_LOGO;
    const imgId=wb.addImage({base64:b64,extension:"png"});
    ws.addImage(imgId,{tl:{col:0.1,row:0.12},ext:{width:81,height:46}});
  }catch(e){console.warn("logo embed failed",e);}
  ws.getRow(1).height=44;
  ws.mergeCells(`C1:${LAST}1`);
  const t=ws.getCell("C1");t.value="BẢNG BÁO GIÁ DỊCH VỤ DU LỊCH";
  t.font=fnt({size:16,bold:true,color:{argb:NAVY}});t.alignment={horizontal:"left",vertical:"middle"};
  ws.mergeCells(`C2:${LAST}2`);
  const sub=ws.getCell("C2");sub.value="VIETTOURS INCENTIVES & EVENTS   ·   Hotline 1900 1839   ·   www.viettours.com.vn";
  sub.font=fnt({size:8.5,color:{argb:TEAL}});sub.alignment={horizontal:"left"};
  for(let c=1;c<=ncol;c++)ws.getCell(3,c).border={bottom:{style:"medium",color:{argb:NAVY}}};

  // ── Rate block (foreign) ──
  const rateCell={};
  if(foreign){
    const used=[];
    getCATSlocal().forEach(cat=>{(items[cat.id]||[]).forEach(it=>{if(it.enabled!==false&&!it.foc&&it.cur!=="VND"&&!used.includes(it.cur))used.push(it.cur);});});
    const j3=ws.getCell("J3");j3.value="TỶ GIÁ → VND";j3.font=fnt({size:8,bold:true,color:{argb:MUTE}});j3.alignment=rt;
    let rb=4;
    used.forEach(cur=>{
      const jc=ws.getCell(`J${rb}`);jc.value=cur;jc.font=fnt({size:9});jc.alignment=rt;
      const kc=ws.getCell(`K${rb}`);kc.value=rates[cur]||0;kc.numFmt="#,##0";kc.font=fnt({size:9,bold:true});kc.alignment=rt;kc.fill=fill(YEL);
      rateCell[cur]=`$K$${rb}`;rb++;
    });
  }

  // ── Info block ──
  const b4=ws.getCell("B4");b4.value=info.name||(foreign?"Tour":"Tour");b4.font=fnt({size:13,bold:true,color:{argb:NAVY}});
  ws.mergeCells(foreign?"C5:E5":"C5:D5");
  const infoRows=[["Điểm đến:",info.dest||""],["Số khách:",pax],
    ["Thời gian:",`${info.days}N${info.nights}Đ`],["Phụ trách:",`${user.name} (${user.role})`],
    ["Ngày xuất:",new Date().toLocaleDateString("vi-VN")]];
  let rr=5;
  infoRows.forEach(([lab,val])=>{
    const lc=ws.getCell(rr,2);lc.value=lab;lc.font=fnt({size:10,color:{argb:MUTE}});
    const vc=ws.getCell(rr,3);vc.value=val;vc.font=fnt({size:10,bold:true});rr++;
  });

  // ── Table header ──
  const H=11;
  const heads=foreign
    ?["STT","Hạng mục","Chi tiết dịch vụ","Ghi chú","NT","Đơn giá (NT)","Đơn giá (VNĐ)","SL","Lần","ĐVT","Thành tiền (VNĐ)"]
    :["STT","Hạng mục","Chi tiết dịch vụ","Ghi chú","Đơn giá (VNĐ)","SL","Lần","ĐVT","Thành tiền (VNĐ)"];
  heads.forEach((h,i)=>{
    const c=ws.getCell(H,i+1);c.value=h;c.font=fnt({size:9.5,bold:true,color:{argb:WHITE}});
    c.fill=fill(NAVY);c.alignment=cen;
    c.border={top:{style:"thin",color:{argb:NAVY}},bottom:{style:"thin",color:{argb:NAVY}},left:{style:"thin",color:{argb:NAVY}},right:{style:"thin",color:{argb:NAVY}}};
  });
  ws.getRow(H).height=28;

  // ── Items ──
  function getCATSlocal(){return getCATS(template);}
  function qtyOf(it){return it.qtyMode==="per_pax"?pax:it.qtyMode==="per_group"?1:(+it.customQty||1);}
  let r=H+1;const first=r;let idx=0;
  getCATSlocal().forEach(cat=>{
    if(catEnabled[cat.id]===false)return;
    const rows=(items[cat.id]||[]).filter(it=>it.enabled!==false&&!it.foc);
    if(rows.length===0)return;
    rows.forEach((it,j)=>{
      const zebra = idx%2 ? ZEBRA : WHITE;
      ws.getCell(r,1).value = (r===first)?(idx+1):{formula:`A${r-1}+1`};
      ws.getCell(r,2).value = j===0?cat.label:"";
      ws.getCell(r,3).value = it.name||"";
      ws.getCell(r,4).value = it.note||"";
      if(foreign){
        ws.getCell(r,5).value=it.cur;
        ws.getCell(r,6).value=+it.price||0; ws.getCell(r,6).numFmt="#,##0.##";
        ws.getCell(r,7).value=it.cur==="VND"?{formula:`F${r}`}:{formula:`F${r}*${rateCell[it.cur]||1}`}; ws.getCell(r,7).numFmt="#,##0";
        ws.getCell(r,8).value=qtyOf(it);
        ws.getCell(r,9).value=+it.times||1;
        ws.getCell(r,10).value=(it.unit||"").replace(/^\//,"");
        ws.getCell(r,11).value={formula:`G${r}*H${r}*I${r}`}; ws.getCell(r,11).numFmt="#,##0";
      }else{
        const vndPrice=Math.round((+it.price||0)*(rates[it.cur]||1));
        ws.getCell(r,5).value=vndPrice; ws.getCell(r,5).numFmt="#,##0";
        ws.getCell(r,6).value=qtyOf(it);
        ws.getCell(r,7).value=+it.times||1;
        ws.getCell(r,8).value=(it.unit||"").replace(/^\//,"");
        ws.getCell(r,9).value={formula:`E${r}*F${r}*G${r}`}; ws.getCell(r,9).numFmt="#,##0";
      }
      for(let c=1;c<=ncol;c++){
        const cc=ws.getCell(r,c);cc.fill=fill(zebra);cc.border={bottom:hair};
        cc.font=fnt({size:9.5});
        if(c===1)cc.alignment=cv;
        else if(c===3||c===4)cc.alignment=lf;
        else if(c===ncol)cc.alignment=rt;
        else cc.alignment=cv;
        if(c===2&&j===0)cc.font=fnt({size:9.5,bold:true,color:{argb:TEAL}});
      }
      ws.getRow(r).height = String(it.name||"").includes("\n")?28:19;
      r++;idx++;
    });
  });
  const last=r-1;
  const KC=LAST;

  // ── Totals ──
  function trow(rw,lab,val,emphasis){
    ws.mergeCells(`B${rw}:${col(ncol-1)}${rw}`);
    const lc=ws.getCell(rw,2);lc.value=lab;lc.alignment=rt;
    const kc=ws.getCell(rw,ncol);kc.value=val;kc.alignment=rt;
    if(typeof val==="object"&&val.formula)kc.numFmt="#,##0";
    if(emphasis==="sub"){for(let c=2;c<=ncol;c++)ws.getCell(rw,c).fill=fill(SUBT);
      lc.font=fnt({bold:true});kc.font=fnt({bold:true});kc.numFmt="#,##0";}
    else if(emphasis==="grand"){for(let c=2;c<=ncol;c++)ws.getCell(rw,c).fill=fill(NAVY);
      lc.font=fnt({size:12,bold:true,color:{argb:WHITE}});kc.font=fnt({size:12,bold:true,color:{argb:WHITE}});kc.numFmt="#,##0";}
    else if(emphasis==="ppax"){for(let c=2;c<=ncol;c++)ws.getCell(rw,c).fill=fill(HILITE);
      lc.font=fnt({size:11,bold:true,color:{argb:TEAL}});kc.font=fnt({size:11,bold:true,color:{argb:TEAL}});kc.numFmt="#,##0";}
    else{lc.font=fnt();kc.font=fnt();}
    return rw;
  }
  const sumf={formula:`SUM(${KC}${first}:${KC}${last})`};
  const subR=trow(r,"Tổng chi phí (chưa gồm phí QL & VAT)",sumf,"sub");r++;
  const mgR=trow(r,`Phí quản lý (${margin}%)`,{formula:`${KC}${subR}*${(margin/100)}`});r++;
  let grandF,vtR;
  if(foreign){
    vtR=trow(r,"Thuế VAT","Đã bao gồm");ws.getCell(r,ncol).font=fnt({italic:true,color:{argb:MUTE}});r++;
    grandF={formula:`SUM(${KC}${subR}:${KC}${mgR})`};
  }else{
    vtR=trow(r,`Thuế VAT (${vat}%)`,{formula:`SUM(${KC}${subR}:${KC}${mgR})*${(vat/100)}`});r++;
    grandF={formula:`SUM(${KC}${subR}:${KC}${vtR})`};
  }
  const grR=trow(r,"TỔNG CỘNG",grandF,"grand");r++;
  trow(r,"GIÁ / KHÁCH",{formula:`${KC}${grR}/${pax}`},"ppax");r+=2;

  // ── Service sections ──
  const INC=["Vé máy bay khứ hồi hạng phổ thông theo hành trình, gồm hành lý ký gửi.","Thuế sân bay Việt Nam & nước ngoài và lệ phí an ninh hàng không.","Khách sạn tiêu chuẩn 4* hoặc tương đương: 2 khách 1 phòng.","Xe di chuyển và vé tham quan các nơi theo chương trình.","Hướng dẫn viên địa phương theo chương trình.","Bảo hiểm du lịch mức bồi thường tối đa 50.000 USD/trường hợp.","Visa nhập cảnh (nếu có trong chương trình)."];
  const EXC=["Chi phí làm hộ chiếu (còn hạn trên 6 tháng).","Bữa ăn ngoài chương trình.","Tiền điện thoại, Internet, Mini bar, Giặt ủi.","Hành lý quá cước và chi phí cá nhân.","Phụ thu phòng đơn."];
  const PAY=["Đợt 1: Cọc 50% trong 07 ngày sau khi ký hợp đồng.","Đợt 2: 50% còn lại, chậm nhất 03 ngày trước khởi hành."];
  function section(rw,title,lines,marker){
    const c=ws.getCell(rw,2);c.value=title;c.font=fnt({size:10.5,bold:true,color:{argb:NAVY}});
    ws.mergeCells(`B${rw}:${LAST}${rw}`);c.border={bottom:{style:"thin",color:{argb:TEAL}}};rw++;
    lines.forEach(ln=>{
      const cc=ws.getCell(rw,2);cc.value=`${marker}  ${ln}`;cc.font=fnt({size:9});cc.alignment={wrapText:true,vertical:"top"};
      ws.mergeCells(`B${rw}:${LAST}${rw}`);ws.getRow(rw).height=14;rw++;
    });
    return rw+1;
  }
  r=section(r,"GIÁ BAO GỒM / INCLUSIONS",INC,"✓");
  r=section(r,"KHÔNG BAO GỒM / EXCLUSIONS",EXC,"✕");
  r=section(r,"ĐIỀU KHOẢN THANH TOÁN / PAYMENT TERMS",PAY,"•");r++;
  const fc=ws.getCell(r,2);
  fc.value=foreign?"Báo giá có hiệu lực 07 ngày kể từ ngày xuất. Giá có thể thay đổi theo tỷ giá tại thời điểm xuất vé.":"Báo giá có hiệu lực 07 ngày kể từ ngày xuất.";
  fc.font=fnt({size:8,italic:true,color:{argb:MUTE}});ws.mergeCells(`B${r}:${LAST}${r}`);

  // ── Hidden metadata sheet for perfect round-trip import ──
  try{
    const meta=wb.addWorksheet("_vtemeta",{state:"veryHidden"});
    meta.getCell("A1").value="VTE_QUOTE_V1";
    meta.getCell("A2").value=JSON.stringify({template,info,pax,rates,margin,vat,svcBasis:svcBasis||0,rounding:(typeof rounding!=="undefined"?rounding:100000),catEnabled,items});
  }catch(e){}

  // ── Save ──
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;
  a.download=`BaoGia_${(info.name||"Tour").replace(/[^a-zA-Z0-9_À-ỹ]/g,"_")}_${new Date().toLocaleDateString("vi-VN").replace(/\//g,"-")}.xlsx`;
  a.click();URL.revokeObjectURL(url);
  if(window.showToast)window.showToast("Đã xuất Excel báo giá","export",info.name||"");
}


/* ═══ IMPORT EXCEL → tái tạo báo giá (parse bảng = chính, metadata = config) ═══ */
async function importExcelPro(file,onLoad){
  if(!window.ExcelJS){alert("Đang tải thư viện Excel, thử lại sau 3 giây.");return;}
  try{
    const buf=await file.arrayBuffer();
    const wb=new ExcelJS.Workbook();
    await wb.xlsx.load(buf);

    /* Đọc metadata (nếu có) để lấy config header chính xác — KHÔNG dùng cho line items */
    let meta=null;
    const ms=wb.getWorksheet("_vtemeta");
    if(ms && String(ms.getCell("A1").value)==="VTE_QUOTE_V1"){
      try{
        const raw=ms.getCell("A2").value;
        meta=JSON.parse(typeof raw==="object"&&raw.richText?raw.richText.map(t=>t.text).join(""):raw);
      }catch(e){}
    }

    /* PARSE BẢNG HIỂN THỊ (luôn ưu tiên — chứa chỉnh sửa của user) */
    const ws=wb.worksheets.find(w=>w.name!=="_vtemeta")||wb.worksheets[0];
    const getV=(r,c)=>{const v=ws.getCell(r,c).value;if(v==null)return"";if(typeof v==="object"){if(v.result!=null)return v.result;if(v.richText)return v.richText.map(t=>t.text).join("");if(v.text!=null)return v.text;return "";}return v;};
    let H=0;
    for(let r=1;r<=20;r++){if(String(getV(r,1)).trim().toUpperCase()==="STT"){H=r;break;}}
    if(!H){
      /* Không parse được bảng → fallback hoàn toàn về metadata */
      if(meta){onLoad({template:meta.template,info:meta.info,pax:meta.pax,rates:meta.rates,margin:meta.margin,vat:meta.vat,svcBasis:meta.svcBasis||0,rounding:meta.rounding||100000,items:meta.items,catEnabled:meta.catEnabled});
        if(window.showToast)window.showToast("Đã nhập báo giá từ Excel","success",meta.info?.name||"");return;}
      alert("❌ Không nhận diện được bảng báo giá. Vui lòng dùng file xuất từ hệ thống.");return;
    }
    const foreign=String(getV(H,5)).trim().toUpperCase()==="NT";

    /* Info từ block trên */
    const info={name:String(getV(4,2))||"Nhập từ Excel",dest:String(getV(5,3))||"",days:1,nights:0};
    const mD=String(getV(7,3)).match(/(\d+)\s*N\s*(\d+)/i);
    if(mD){info.days=+mD[1];info.nights=+mD[2];}
    let pax=+String(getV(6,3)).replace(/[^\d]/g,"")||20;

    /* Map nhãn category → catId */
    const catByLabel={};getCATS("intl").concat(getCATS("domestic")).forEach(c=>{catByLabel[c.label]=c.id;});
    const items={};let curCat=null;
    for(let r=H+1;r<400;r++){
      const a=getV(r,1),b=String(getV(r,2)).trim(),c=String(getV(r,3)).trim();
      const isTotal=String(b).startsWith("Tổng chi phí")||String(b).startsWith("TỔNG");
      if(isTotal||(String(a).trim()===""&&b===""&&c===""))break;
      if(b&&catByLabel[b])curCat=catByLabel[b];
      if(!c)continue;
      const cid=curCat||"flight";
      if(!items[cid])items[cid]=[];
      let it;
      if(foreign){
        it={id:Date.now()+Math.random(),name:c,note:String(getV(r,4)),cur:String(getV(r,5)).trim()||"VND",
            price:+getV(r,6)||0,times:+getV(r,9)||1,qtyMode:"custom",customQty:+getV(r,8)||1,
            unit:"/"+String(getV(r,10)).replace(/^\//,""),enabled:true,foc:false};
      }else{
        it={id:Date.now()+Math.random(),name:c,note:String(getV(r,4)),cur:"VND",
            price:+getV(r,5)||0,times:+getV(r,7)||1,qtyMode:"custom",customQty:+getV(r,6)||1,
            unit:"/"+String(getV(r,8)).replace(/^\//,""),enabled:true,foc:false};
      }
      items[cid].push(it);
    }

    /* Config header: ưu tiên metadata (tỷ giá/margin/vat/rounding chính xác), fallback mặc định */
    const tmpl=foreign?"intl":"domestic";
    const rates=(meta&&meta.rates)?meta.rates:{VND:1,USD:26500,GBP:36300,EUR:31500,JPY:170,SGD:19200,THB:720,CNY:3500,KRW:18.5,AUD:16800};
    const margin=(meta&&meta.margin!=null)?meta.margin:5;
    const vat=(meta&&meta.vat!=null)?meta.vat:(foreign?0:8);
    const rounding=(meta&&meta.rounding)?meta.rounding:100000;
    const catEnabled={};getCATS(tmpl).forEach(c=>{catEnabled[c.id]=true;});

    onLoad({template:tmpl,info,pax,rates,margin,vat,svcBasis:0,rounding,items,catEnabled});
    if(window.showToast)window.showToast("Đã nhập báo giá từ Excel (theo nội dung file)","success",info.name);
  }catch(e){alert("❌ Lỗi đọc file Excel: "+e.message);}
}
