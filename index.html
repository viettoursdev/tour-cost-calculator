<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon nhúng (data URI) — tránh 404 /favicon.ico do app chạy ở subpath /tour-cost-calculator/. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230d7a6a'/%3E%3Ctext x='16' y='23' font-family='Arial,Helvetica,sans-serif' font-size='20' font-weight='bold' fill='%23ffffff' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E"
    />
    <title>Bảng Tính Chi Phí Tour – Viettours</title>
    <!-- Set theme TRƯỚC khi React mount để không chớp nền sáng khi user dùng chế độ tối.
         (Trang công khai ?share/?visa/?wf luôn sáng — App.tsx sẽ chỉnh lại ngay.) -->
    <script>
      try {
        if (localStorage.getItem('vte_theme_last') === 'dark' && !/[?&](share|visa|wf)=/.test(location.search))
          document.documentElement.dataset.theme = 'dark';
      } catch (e) { /* private mode */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
