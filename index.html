/* ═══ QUOTE HISTORY ════════════════════════════════════ */
function SaveQuoteModal({info,template,pax,totalCost,user,existingId,curState,currentQuoteId,onSave,onClose}){
  const [qName,setQName]=useState(info?.name||"");
  const [customer,setCustomer]=useState("");
  const [saving,setSaving]=useState(false);
  const [customerList,setCustomerList]=useState([]);
  const [cusSearch,setCusSearch]=useState("");
  const [showDrop,setShowDrop]=useState(false);
  const cusRef=useRef(null);

  /* Load danh sách khách hàng từ Firestore */
  useEffect(()=>{
    if(!window.fbOnCustomers)return;
    const unsub=window.fbOnCustomers(list=>{setCustomerList(list||[]);});
    return()=>unsub&&unsub();
  },[]);

  /* Click outside để đóng dropdown */
  useEffect(()=>{
    const handler=(e)=>{if(cusRef.current&&!cusRef.current.contains(e.target))setShowDrop(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const suggestions=cusSearch
    ?customerList.filter(c=>c.name?.toLowerCase().includes(cusSearch.toLowerCase()))
    :customerList;

  const selectCustomer=(c)=>{setCustomer(c.name);setCusSearch(c.name);setShowDrop(false);};

  const inp={background:"#fff",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:8,padding:"9px 13px",fontSize:13,color:"#0f3a4a",fontFamily:"inherit",outline:"none",width:"100%"};

  const handleSave=async()=>{
    if(!qName.trim()){alert("Vui lòng nhập tên báo giá");return;}
    setSaving(true);
    const trimmedCustomer=customer.trim();
    try{
      /* Lưu báo giá */
      const entry={
        id:existingId||Date.now().toString(36)+Math.random().toString(36).slice(2,5),
        name:qName.trim(),
        customer:trimmedCustomer,
        template:template||"domestic",
        dest:info?.dest||"",
        pax:pax||1,
        days:info?.days||1,
        nights:info?.nights||0,
        totalCost:totalCost||0,
        savedBy:user.name+" ("+user.role+")",
      };
      /* Dùng currentQuoteId nếu đang cập nhật project hiện tại */
      const resolvedId=currentQuoteId||entry.id;
      const finalEntry={...entry,id:resolvedId};
      /* Dùng DMC functions nếu template là dmc */
      const isDMCTemplate=currentQuoteId?false:(template==="dmc");
      const saveQuoteFn=template==="dmc"?window.fbSaveDMCQuote:window.fbSaveQuote;
      const saveStateFn=template==="dmc"?window.fbSaveDMCQuoteState:window.fbSaveQuoteState;
      await saveQuoteFn(finalEntry);
      if(saveStateFn&&curState){
        await saveStateFn(resolvedId,curState,qName.trim()+" · "+new Date().toLocaleString("vi-VN"));
      }
      if(window.showToast)window.showToast("Đã lưu báo giá lên Cloud","sync",qName.trim());

      /* Tự động thêm vào danh sách khách hàng nếu chưa có */
      if(trimmedCustomer&&window.fbPushCustomers){
        const exists=customerList.some(c=>c.name?.toLowerCase()===trimmedCustomer.toLowerCase());
        if(!exists){
          const newCustomer={
            id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
            name:trimmedCustomer,
            type:"company",
            contacts:[{name:"",phone:"",email:"",position:""}],
            note:"",
            createdAt:new Date().toISOString(),
            createdBy:user.name,
          };
          await window.fbPushCustomers([...customerList,newCustomer]);
        }
      }
      onSave(finalEntry);
    }catch(e){alert("❌ Lỗi lưu: "+e.message);}
    finally{setSaving(false);}
  };

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}>
        <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",padding:"20px 26px",borderRadius:"18px 18px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:17,fontWeight:800}}>💾 {existingId?"Cập nhật":"Lưu"} báo giá vào lịch sử</div>
            <div style={{fontSize:12,opacity:0.85,marginTop:2}}>Lưu trữ cloud · đồng bộ toàn bộ tài khoản</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:8,color:"#fff",width:34,height:34,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>✕</button>
        </div>
        <div style={{padding:"22px 26px",display:"flex",flexDirection:"column",gap:14}}>
          {/* Tên báo giá */}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"rgba(15,58,74,0.55)",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:6}}>Tên báo giá *</label>
            <input style={inp} value={qName} onChange={e=>setQName(e.target.value)} placeholder="VD: Đà Lạt 3N2Đ – 40pax..."/>
          </div>
          {/* Tên khách hàng – linked dropdown */}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"rgba(15,58,74,0.55)",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:6}}>
              Tên khách hàng
              {customerList.length>0&&<span style={{fontWeight:400,textTransform:"none",letterSpacing:0,color:"rgba(15,58,74,0.4)",marginLeft:6}}>({customerList.length} trong danh sách)</span>}
            </label>
            <div ref={cusRef} style={{position:"relative"}}>
              <input
                style={{...inp,paddingRight:32}}
                value={cusSearch}
                onChange={e=>{setCusSearch(e.target.value);setCustomer(e.target.value);setShowDrop(true);}}
                onFocus={()=>setShowDrop(true)}
                placeholder={customerList.length>0?"Chọn hoặc nhập tên khách hàng...":"Nhập tên công ty hoặc cá nhân..."}
              />
              {cusSearch&&<button onClick={()=>{setCusSearch("");setCustomer("");}} style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14,color:"rgba(15,58,74,0.35)",padding:2}}>✕</button>}
              {/* Dropdown */}
              {showDrop&&customerList.length>0&&(
                <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#fff",border:"1.5px solid rgba(20,150,140,0.2)",borderRadius:10,boxShadow:"0 8px 24px rgba(15,58,74,0.12)",zIndex:300,maxHeight:200,overflowY:"auto"}}>
                  {suggestions.length===0
                    ?<div style={{padding:"10px 14px",fontSize:12,color:"rgba(15,58,74,0.4)",fontStyle:"italic"}}>Không tìm thấy trong danh sách — sẽ lưu dạng nhập tay</div>
                    :suggestions.map(c=>(
                      <div key={c.id} onMouseDown={()=>selectCustomer(c)}
                        style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid rgba(20,150,140,0.07)",transition:"background .1s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(168,230,221,0.18)"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <div style={{fontWeight:700,fontSize:13,color:"#0f3a4a",display:"flex",alignItems:"center",gap:6}}>
                          <span>{c.type==="company"?"🏢":"👤"}</span>{c.name}
                        </div>
                        {c.contacts?.[0]?.phone&&<div style={{fontSize:11,color:"rgba(15,58,74,0.45)",marginTop:2}}>📞 {c.contacts[0].phone}{c.contacts[0].email?" · ✉️ "+c.contacts[0].email:""}</div>}
                      </div>
                    ))
                  }
                </div>
              )}
            </div>
          </div>
          {/* Info tóm tắt */}
          <div style={{background:"rgba(168,230,221,0.18)",border:"1px solid rgba(20,150,140,0.18)",borderRadius:10,padding:"12px 14px",fontSize:12,color:"rgba(15,58,74,0.7)",display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <span>🗺️ Điểm đến: <strong>{info?.dest||"—"}</strong></span>
            <span>👥 Pax: <strong>{pax}</strong></span>
            <span>📅 {info?.days}N{info?.nights}Đ</span>
            <span>🌐 <strong>{template==="intl"?"Nước ngoài":"Trong nước"}</strong></span>
          </div>
          <div style={{display:"flex",gap:10,paddingTop:4}}>
            <button onClick={onClose} style={{flex:1,background:"#fff",border:"1.5px solid rgba(20,150,140,0.2)",borderRadius:10,padding:12,cursor:"pointer",fontWeight:600,fontSize:13,color:"rgba(15,58,74,0.6)",fontFamily:"inherit"}}>Huỷ</button>
            <button onClick={handleSave} disabled={saving} style={{flex:2,background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:10,padding:12,cursor:saving?"not-allowed":"pointer",fontWeight:800,fontSize:14,fontFamily:"inherit",opacity:saving?0.7:1}}>
              {saving?"⏳ Đang lưu...":"💾 Lưu lịch sử"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function QuoteHistoryView({user,template,onLoadState,currentQuoteId,onSetQuoteId}){
  const canDelete=hasPerm(user,"exportQuote");
  const isDMCHistory=template==="dmc";
  /* Use DMC-specific Firebase functions when in DMC mode */
  const _onHistory=isDMCHistory?(window.fbOnDMCHistory||window.fbOnQuoteHistory):window.fbOnQuoteHistory;
  const _deleteQuote=isDMCHistory?(window.fbDeleteDMCQuote||window.fbDeleteQuote):window.fbDeleteQuote;
  const _getProject=isDMCHistory?(window.fbGetDMCQuoteProject||window.fbGetQuoteProject):window.fbGetQuoteProject;
  const _updateCollaborators=isDMCHistory?(window.fbUpdateDMCCollaborators||window.fbUpdateCollaborators):window.fbUpdateCollaborators;
  const [quotes,setQuotes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [filterType,setFilterType]=useState("");
  const [filterUser,setFilterUser]=useState("");
  const [filterCustomer,setFilterCustomer]=useState("");
  const allUserOptions=[...new Set(quotes.map(q=>q.createdByUsername).filter(Boolean))];
  const [delConfirm,setDelConfirm]=useState(null);
  const [loadingId,setLoadingId]=useState(null);
  const [expanded,setExpanded]=useState(null); // {type:"versions"|"collab", id}
  const [projectData,setProjectData]=useState({}); // {quoteId: projectDoc}
  const [collabInput,setCollabInput]=useState("");
  const [allUsers]=useState(()=>ldUsers());

  useEffect(()=>{
    if(!_onHistory)return;
    const unsub=_onHistory(list=>{
      setQuotes(list);
      setLoading(false);
      /* Auto-migrate quotes without codes */
      if(!isDMCHistory&&list.some(q=>!q.quoteCode)&&window.fbMigrateQuoteCodes){
        window.fbMigrateQuoteCodes();
      }
    });
    return()=>unsub&&unsub();
  },[]);

  /* Load project data khi mở panel */
  const loadProject=async(quoteId,type)=>{
    if(expanded?.id===quoteId&&expanded?.type===type){setExpanded(null);return;}
    setExpanded({id:quoteId,type});
    if(!projectData[quoteId]&&window.fbGetQuoteProject){
      const p=await window.fbGetQuoteProject(quoteId);
      setProjectData(prev=>({...prev,[quoteId]:p||{versions:[],collaborators:[]}}));
    }
  };

  /* Tải lại state từ cloud */
  const handleLoad=async(quote)=>{
    if(!_getProject){alert("Firebase chưa sẵn sàng");return;}
    setLoadingId(quote.id);
    try{
      const p=await _getProject(quote.id);
      if(p?.currentState){
        onLoadState(p.currentState,quote.id);
        if(onSetQuoteId)onSetQuoteId(quote.id);
        if(window.showToast)window.showToast("Đã tải báo giá","success",quote.name);
      }else{alert("Chưa có dữ liệu state. Hãy lưu lại qua nút Lưu lịch sử.");}
    }catch(e){alert("❌ Lỗi tải: "+e.message);}
    finally{setLoadingId(null);}
  };

  /* Khôi phục version cụ thể */
  const handleRestoreVersion=async(quote,version)=>{
    if(!confirm(`Khôi phục về "${version.note}"?

Báo giá hiện tại sẽ bị thay thế.`))return;
    onLoadState(version.state,quote.id);
    if(onSetQuoteId)onSetQuoteId(quote.id);
  };

  /* Thêm collaborator */
  const handleAddCollab=async(quote)=>{
    if(!collabInput.trim())return;
    const found=allUsers.find(u=>u.u===collabInput.trim()||u.name?.toLowerCase()===collabInput.trim().toLowerCase());
    if(!found){alert("Không tìm thấy user: "+collabInput);return;}
    const p=projectData[quote.id]||{};
    const collabs=[...new Set([...(p.collaborators||[]),found.u])];
    await _updateCollaborators(quote.id,collabs);
    setProjectData(prev=>({...prev,[quote.id]:{...p,collaborators:collabs}}));
    setCollabInput("");
    // Send notification to invited user
    if(window.fbSendNotification) {
      await window.fbSendNotification(found.u, {
        type: "collab_invite",
        title: "Bạn được mời cộng tác",
        message: `${user.name} đã mời bạn cộng tác trên báo giá "${quote.name}"`,
        createdBy: user.name + " (" + user.role + ")",
        data: { quoteId: quote.id, quoteName: quote.name }
      });
    }
  };
  const handleRemoveCollab=async(quote,username)=>{
    const p=projectData[quote.id]||{};
    const collabs=(p.collaborators||[]).filter(c=>c!==username);
    await _updateCollaborators(quote.id,collabs);
    setProjectData(prev=>({...prev,[quote.id]:{...p,collaborators:collabs}}));
  };

  const handleDelete=async(id)=>{
    try{await _deleteQuote(id);setDelConfirm(null);}
    catch(e){alert("❌ Lỗi: "+e.message);}
  };

  /* CEO thấy tất cả; các role khác chỉ thấy quote của mình hoặc được cộng tác */
  const visibleQuotes=quotes.filter(q=>{
    const isCEO=user.role==="CEO";
    const matchesUser=isCEO||q.createdByUsername===user.u||(q.collaborators||[]).includes(user.u);
    const matchesTemplate=!template||template==="dmc"||q.template===template;
    return matchesUser&&matchesTemplate;
  });

  const filtered=visibleQuotes.filter(q=>{
    if(filterType==="domestic"&&q.template!=="domestic")return false;
    if(filterType==="intl"&&q.template!=="intl")return false;
    if(filterUser&&q.createdByUsername!==filterUser)return false;
    if(filterCustomer&&!q.customer?.toLowerCase().includes(filterCustomer.toLowerCase()))return false;
    const ql=search.toLowerCase();
    if(!ql)return true;
    return q.name?.toLowerCase().includes(ql)||
           q.customer?.toLowerCase().includes(ql)||
           q.dest?.toLowerCase().includes(ql)||
           q.savedBy?.toLowerCase().includes(ql)||
           q.createdByName?.toLowerCase().includes(ql)||
           q.quoteCode?.toLowerCase().includes(ql);
  });

  const fmtDt=s=>{if(!s)return"—";try{return new Date(s).toLocaleString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}catch(e){return s;}};
  const isActive=(id)=>currentQuoteId===id;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:"#0f3a4a"}}>🕐 Lịch sử Báo giá</div>
          <div style={{fontSize:12,color:"rgba(15,58,74,0.5)",marginTop:3}}>
            {loading?"Đang tải...":`${visibleQuotes.length} báo giá của bạn · Tổng cloud: ${quotes.length}`}
            {currentQuoteId&&<span style={{marginLeft:8,color:"#14a08c",fontWeight:600}}>· Đang làm việc: {quotes.find(q=>q.id===currentQuoteId)?.name||currentQuoteId}</span>}
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {/* Text search */}
        <div style={{flex:2,minWidth:200,position:"relative"}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:0.4}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Tên tour, điểm đến..."
            style={{width:"100%",padding:"9px 12px 9px 32px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",outline:"none",color:"#0f3a4a"}}/>
        </div>
        {/* Customer filter */}
        <div style={{flex:1,minWidth:140,position:"relative"}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:13,opacity:0.35}}>👤</span>
          <input value={filterCustomer} onChange={e=>setFilterCustomer(e.target.value)} placeholder="Khách hàng..."
            style={{width:"100%",padding:"9px 12px 9px 30px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",outline:"none",color:"#0f3a4a"}}/>
        </div>
        {/* Type filter */}
        <select value={filterType} onChange={e=>setFilterType(e.target.value)}
          style={{padding:"9px 12px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",color:"#0f3a4a",background:"#fff",outline:"none"}}>
          <option value="">🌐 Tất cả loại</option>
          <option value="domestic">🇻🇳 Trong nước</option>
          <option value="intl">✈️ Nước ngoài</option>
        </select>
        {/* User filter (CEO only - sees all) */}
        {user.role==="CEO"&&allUserOptions.length>1&&<select value={filterUser} onChange={e=>setFilterUser(e.target.value)}
          style={{padding:"9px 12px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",color:"#0f3a4a",background:"#fff",outline:"none"}}>
          <option value="">👥 Tất cả user</option>
          {allUserOptions.map(u=>{
            const usr=ldUsers().find(x=>x.u===u);
            return <option key={u} value={u}>{usr?.name||u}</option>;
          })}
        </select>}
        {(search||filterType||filterUser||filterCustomer)&&<button onClick={()=>{setSearch("");setFilterType("");setFilterUser("");setFilterCustomer("");}}
          style={{padding:"9px 12px",background:"rgba(220,50,80,0.08)",border:"1px solid rgba(220,50,80,0.2)",borderRadius:10,fontSize:12,fontWeight:600,color:"#dc3250",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>✕ Xoá lọc</button>}
      </div>

      {loading&&<div style={{textAlign:"center",padding:"60px 0",color:"rgba(15,58,74,0.4)"}}>⏳ Đang tải lịch sử từ Cloud...</div>}
      {!loading&&filtered.length===0&&(
        <div style={{textAlign:"center",padding:"60px 0",color:"rgba(15,58,74,0.35)"}}>
          <div style={{fontSize:40,marginBottom:12}}>🕐</div>
          <div style={{fontSize:15,fontWeight:600}}>{quotes.length===0?"Chưa có báo giá nào được lưu":"Không tìm thấy phù hợp"}</div>
          <div style={{fontSize:12,marginTop:6,opacity:0.8}}>Bấm <strong>💾 Lưu lịch sử</strong> trên header để lưu báo giá</div>
        </div>
      )}

      {!loading&&filtered.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(q=>{
            const isExp=expanded?.id===q.id;
            const proj=projectData[q.id];
            const versionCount=proj?.versions?.length||0;
            const collabCount=proj?.collaborators?.length||0;
            const active=isActive(q.id);
            return(
              <div key={q.id} style={{background:"#fff",borderRadius:14,border:active?"2px solid #14a08c":"1px solid rgba(20,150,140,0.15)",boxShadow:active?"0 0 0 3px rgba(20,160,140,0.1)":"0 2px 8px rgba(15,58,74,0.06)",overflow:"hidden"}}>
                {/* Main row */}
                <div style={{padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                      {active&&<span style={{background:"#14a08c",color:"#fff",fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>⚡ Đang làm</span>}
                      {/* Quote Code badge */}
                      {q.quoteCode&&<span style={{background:"linear-gradient(135deg,#0f3a4a,#14566b)",color:"#fff",fontSize:10,fontWeight:800,padding:"2px 9px",borderRadius:6,letterSpacing:0.5,fontFamily:"monospace"}}>#{q.quoteCode}</span>}
                      <span style={{background:q.template==="intl"?"rgba(41,128,185,0.1)":"rgba(39,174,96,0.1)",color:q.template==="intl"?"#2980b9":"#27ae60",border:"1px solid",borderColor:q.template==="intl"?"rgba(41,128,185,0.3)":"rgba(39,174,96,0.3)",borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>
                        {q.template==="intl"?"✈️ Quốc tế":q.template==="dmc"?"📋 DMC":"🇻🇳 Nội địa"}
                      </span>
                    </div>
                    <div style={{fontWeight:800,fontSize:15,color:"#0f3a4a",marginBottom:2}}>{q.name}</div>
                    <div style={{fontSize:12,color:"rgba(15,58,74,0.5)"}}>{q.customer&&`👤 ${q.customer} · `}{q.dest&&`📍 ${q.dest} · `}{q.days}N{q.nights}Đ · {q.pax} pax</div>
                    <div style={{fontSize:11,color:"rgba(15,58,74,0.45)",marginTop:2}}>
                      👤 Tạo bởi: <strong>{q.createdByName||q.savedBy?.split("(")[0].trim()||"—"}</strong>
                      {q.updatedBy&&q.updatedBy!==q.savedBy&&<span> · Sửa: <strong>{q.updatedBy.split("(")[0].trim()}</strong></span>}
                    </div>
                    <div style={{fontSize:11,color:"rgba(15,58,74,0.35)",marginTop:1}}>Tạo: {fmtDt(q.createdAt)}{q.updatedAt!==q.createdAt?" · Sửa: "+fmtDt(q.updatedAt):""}</div>
                  </div>
                  {/* Actions */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    {/* Tải lại */}
                    <button onClick={()=>handleLoad(q)} disabled={loadingId===q.id}
                      style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",cursor:loadingId===q.id?"not-allowed":"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit",opacity:loadingId===q.id?0.7:1,display:"flex",alignItems:"center",gap:5}}>
                      {loadingId===q.id?"⏳":"📂"} {loadingId===q.id?"Đang tải...":"Tải lại"}
                    </button>
                    {/* Versions */}
                    <button onClick={()=>loadProject(q.id,"versions")}
                      style={{background:isExp&&expanded.type==="versions"?"rgba(142,68,173,0.15)":"rgba(142,68,173,0.08)",border:"1px solid rgba(142,68,173,0.25)",color:"#8e44ad",borderRadius:8,padding:"7px 11px",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
                      📋 {versionCount>0?versionCount+" ver":"Versions"}
                    </button>
                    {/* Cộng tác — chỉ creator mới thấy nút mời, nhưng ai cũng thấy danh sách */}
                    <button onClick={()=>loadProject(q.id,"collab")}
                      style={{background:isExp&&expanded.type==="collab"?"rgba(41,128,185,0.15)":"rgba(41,128,185,0.08)",border:"1px solid rgba(41,128,185,0.25)",color:"#2980b9",borderRadius:8,padding:"7px 11px",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
                      👥 {collabCount>0?collabCount+" người":"Cộng tác"}
                    </button>
                    {(canDelete&&q.createdByUsername===user.u)&&<button onClick={()=>setDelConfirm(q)} style={{background:"rgba(220,50,80,0.07)",border:"1px solid rgba(220,50,80,0.2)",color:"#dc3250",borderRadius:8,padding:"7px 9px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🗑️</button>}
                  </div>
                </div>

                {/* Version panel */}
                {isExp&&expanded.type==="versions"&&(
                  <div style={{borderTop:"1px solid rgba(142,68,173,0.15)",background:"rgba(142,68,173,0.04)",padding:"14px 18px"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#8e44ad",marginBottom:10}}>📋 Lịch sử phiên bản (tối đa 20)</div>
                    {!proj&&<div style={{fontSize:12,color:"rgba(15,58,74,0.4)",fontStyle:"italic"}}>⏳ Đang tải...</div>}
                    {proj&&(proj.versions||[]).length===0&&<div style={{fontSize:12,color:"rgba(15,58,74,0.4)",fontStyle:"italic"}}>Chưa có phiên bản nào được lưu qua cloud.</div>}
                    {proj&&[...(proj.versions||[])].reverse().map((v,i)=>(

/* ── Export Biên bản nghiệm thu PDF ── */
function exportAcceptanceCertPDF(contract,form,user){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const pageW=210,mX=20,mX2=190;
  let y=20;
  const ln=(h=6)=>{y+=h;};
  const txt=(t,x,opts)=>pdf.text(t,x||mX,y,opts||{});
  const line=()=>{pdf.setDrawColor(200);pdf.line(mX,y,mX2,y);ln(5);};

  pdf.setFont("helvetica");
  // Header
  pdf.setFontSize(11);pdf.setFont(undefined,"bold");
  txt("CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM",pageW/2,{align:"center"});ln(6);
  pdf.setFont(undefined,"normal");pdf.setFontSize(10);
  txt("Độc lập - Tự do - Hạnh phúc",pageW/2,{align:"center"});ln(5);
  txt("───────────────────────────",pageW/2,{align:"center"});ln(10);
  pdf.setFontSize(15);pdf.setFont(undefined,"bold");
  txt("BIÊN BẢN NGHIỆM THU DỊCH VỤ DU LỊCH",pageW/2,{align:"center"});ln(7);
  pdf.setFontSize(11);pdf.setFont(undefined,"italic");
  txt(`(Căn cứ Hợp đồng số: ${contract.contractNo||"_____"})`,pageW/2,{align:"center"});ln(10);
  pdf.setFont(undefined,"normal");pdf.setFontSize(10);
  txt(`Ngày ${form.date?new Date(form.date).toLocaleDateString("vi-VN"):"__/__/____"}, tại TP. Hồ Chí Minh`);ln(10);

  // Bên A
  pdf.setFont(undefined,"bold");txt("BÊN A (BÊN CUNG CẤP DỊCH VỤ):");ln(6);
  pdf.setFont(undefined,"normal");
  txt("Công ty Cổ phần Viettours Incentives & Events");ln(5);
  txt("Địa chỉ: 268 Tô Hiến Thành, P.15, Q.10, TP. Hồ Chí Minh");ln(5);
  txt(`Đại diện: ${user?.name||"_______________"} – ${user?.role||"_______________"}`);ln(10);

  // Bên B
  pdf.setFont(undefined,"bold");txt("BÊN B (ĐẠI DIỆN ĐOÀN KHÁCH):");ln(6);
  pdf.setFont(undefined,"normal");
  txt(`${(contract.partyB?.name||"________________________").toUpperCase()}`);ln(5);
  if(contract.partyB?.address){txt(`Địa chỉ: ${contract.partyB.address}`);ln(5);}
  if(contract.partyB?.rep){txt(`Đại diện: ${contract.partyB.rep} – ${contract.partyB.title||""}`);ln(5);}
  if(contract.partyB?.tel){txt(`Điện thoại: ${contract.partyB.tel}`);ln(5);}
  ln(5);line();

  // Điều 1
  pdf.setFont(undefined,"bold");pdf.setFontSize(11);
  txt("ĐIỀU 1: NỘI DUNG DỊCH VỤ NGHIỆM THU");ln(7);
  pdf.setFont(undefined,"normal");pdf.setFontSize(10);
  const rows=[
    ["Tên chương trình:",contract.tourName||"—"],
    ["Điểm đến:",contract.tourDest||"—"],
    ["Thời gian:",(contract.tourDays||"—")+"N"+(contract.tourNights||"—")+"Đ"],
    ["Số khách:",(contract.contractPax||"—")+" khách"],
    ["Giá trị hợp đồng:",Math.round((+contract.pricePerPax||0)*(+contract.contractPax||0)).toLocaleString("vi-VN")+" đ"],
  ];
  rows.forEach(([k,v])=>{txt(k);pdf.text(v,80,y);ln(6);});
  ln(3);line();

  // Điều 2
  pdf.setFont(undefined,"bold");pdf.setFontSize(11);
  txt("ĐIỀU 2: KẾT QUẢ NGHIỆM THU");ln(7);
  pdf.setFont(undefined,"normal");pdf.setFontSize(10);
  const noteLines=pdf.splitTextToSize(form.note||"Hai bên xác nhận dịch vụ du lịch đã được thực hiện đúng theo hợp đồng.",mX2-mX);
  noteLines.forEach(l=>{txt(l);ln(5.5);});
  ln(3);line();

  // Điều 3
  pdf.setFont(undefined,"bold");pdf.setFontSize(11);
  txt("ĐIỀU 3: CAM KẾT THANH LÝ HỢP ĐỒNG");ln(7);
  pdf.setFont(undefined,"normal");pdf.setFontSize(10);
  txt(`Hợp đồng số ${contract.contractNo||"_____"} được coi là đã hoàn thành và thanh lý kể từ ngày ký biên bản này.`);ln(10);

  // Ký tên
  const sigY=y+5;
  pdf.setFont(undefined,"bold");pdf.setFontSize(10);
  pdf.text("ĐẠI DIỆN BÊN A",mX+15,sigY,{align:"center"});
  pdf.text("ĐẠI DIỆN BÊN B",mX2-15,sigY,{align:"center"});
  pdf.setFont(undefined,"italic");pdf.setFontSize(9);
  pdf.text("(Ký, ghi rõ họ tên)",mX+15,sigY+5,{align:"center"});
  pdf.text("(Ký, ghi rõ họ tên)",mX2-15,sigY+5,{align:"center"});
  pdf.setFont(undefined,"bold");pdf.setFontSize(10);
  pdf.text((user?.name||"").toUpperCase(),mX+15,sigY+30,{align:"center"});
  pdf.text((contract.partyB?.rep||"").toUpperCase(),mX2-15,sigY+30,{align:"center"});

  if(window.showToast)window.showToast("Đã xuất Biên bản nghiệm thu","export",`HĐ #${contract.contractNo||""}`); pdf.save(`BBNT_${(contract.contractNo||"HD").replace(/[^a-zA-Z0-9_]/g,"_")}_${(contract.partyB?.name||"").replace(/[^a-zA-Z0-9_]/g,"_").slice(0,20)}.pdf`);
}

/* ── Payment Panel ── */
function PaymentPanel({contract,onUpdate,canEdit,user}){
  /* Đảm bảo mỗi payment có id (backward compat với data cũ không có id) */
  const [payments,setPayments]=useState((contract.payments||[]).map((p,i)=>p.id?p:{...p,id:"p_"+i+"_"+Date.now()}));
  const [adding,setAdding]=useState(false);
  const [newP,setNewP]=useState({label:"",amount:"",dueDate:"",note:""});
  const [editAmt,setEditAmt]=useState(null); // {id, val} — inline edit số tiền
  const total=Math.round((+contract.pricePerPax||0)*(+contract.contractPax||0));
  const totalPaid=payments.filter(p=>p.status==="paid").reduce((s,p)=>s+(+p.amount||0),0);
  const totalReceived=payments.filter(p=>p.status==="paid"&&p.receivedAmount!=null).reduce((s,p)=>s+(+p.receivedAmount||+p.amount||0),0);
  const paidPct=total>0?Math.min(100,totalPaid/total*100):0;

  const commit=(next)=>{setPayments(next);onUpdate({payments:next});};
  const togglePaid=(id)=>{
    const next=payments.map(p=>p.id===id?{...p,status:p.status==="paid"?"pending":"paid",paidDate:p.status==="paid"?null:new Date().toISOString().slice(0,10)}:p);
    commit(next);
  };
  /* Lưu số tiền thực nhận */
  const saveAmount=(id)=>{
    if(!editAmt||editAmt.id!==id)return;
    const next=payments.map(p=>p.id===id?{...p,receivedAmount:+editAmt.val||+p.amount}:p);
    commit(next);setEditAmt(null);
  };
  const addPayment=()=>{
    if(!newP.label.trim()||!newP.amount)return;
    const next=[...payments,{...newP,id:Date.now().toString(36),status:"pending",amount:+newP.amount}];
    commit(next);setAdding(false);setNewP({label:"",amount:"",dueDate:"",note:""});
  };
  const delPayment=(id)=>commit(payments.filter(p=>p.id!==id));

  /* Gửi đề nghị thanh toán tới CEO/Trưởng Phòng */
  const [requesting,setRequesting]=useState(null); // payment id đang gửi
  const [approverPicker,setApproverPicker]=useState(null); // {paymentId} — đang chọn người duyệt
  const [selectedApprover,setSelectedApprover]=useState(""); // username đã chọn
  /* Danh sách user có thể duyệt */
  const approvers=ldUsers().filter(u=>["CEO","Trưởng Phòng"].includes(u.role)&&u.u!==user?.u&&u.u);
  const sendApprovalRequest=async(p,targetApprover)=>{
    if(!window.fbSendNotification||!targetApprover)return;
    setRequesting(p.id);
    setApproverPicker(null);
    try{
      const contractNo=contract.contractNo||contract.id;
      await window.fbSendNotification(targetApprover.u,{
        type:"payment_approval",
        title:"💰 Đề nghị xác nhận thanh toán",
        message:`${user?.name||"?"} đề nghị xác nhận: HĐ #${contractNo} · "${p.label}" · ${(+p.amount||0).toLocaleString("vi-VN")} đ`,
        createdBy:(user?.name||"?")+" ("+(user?.role||"")+")",
        data:{
          contractId:contract.id,
          contractNo,
          paymentId:p.id,
          paymentLabel:p.label,
          amount:+p.amount,
          requestedBy:user?.u||"",
          requestedByName:user?.name||"",
          assignedTo:targetApprover.u,
          assignedToName:targetApprover.name,
        }
      });
      /* Đánh dấu đã gửi đề nghị + ghi rõ người được chỉ định */
      const next=payments.map(x=>x.id===p.id?{...x,approvalRequested:true,approvalRequestedBy:user?.name||"",approvalRequestedAt:new Date().toISOString(),assignedTo:targetApprover.u,assignedToName:targetApprover.name}:x);
      commit(next);
      const toast=document.createElement("div");
      if(window.showToast)window.showToast("Đã gửi đề nghị thanh toán","approval_request","Chờ "+targetApprover.name+" duyệt");
    }catch(e){alert("❌ Lỗi gửi đề nghị: "+e.message);}
    finally{setRequesting(null);setSelectedApprover("");}
  };

  return(
    <div style={{padding:"14px 20px 16px",background:"rgba(168,230,221,0.07)",borderTop:"1px solid rgba(20,150,140,0.1)"}}>
      {/* Progress */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
        <div style={{flex:1,height:6,background:"rgba(0,0,0,0.07)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:paidPct+"%",background:paidPct>=100?"#27ae60":"#14a08c",borderRadius:3,transition:"width .4s"}}/>
        </div>
        <div style={{fontSize:12,fontWeight:700,color:paidPct>=100?"#27ae60":"#0d7a6a",whiteSpace:"nowrap"}}>
          {totalPaid.toLocaleString("vi-VN")} / {total.toLocaleString("vi-VN")} đ ({paidPct.toFixed(0)}%)
        </div>
      </div>
      {/* Rows */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {payments.length===0&&<div style={{fontSize:12,color:"rgba(15,58,74,0.4)",fontStyle:"italic",padding:"4px 0"}}>Chưa có đợt thanh toán — bấm "+ Thêm đợt" để thêm</div>}
        {payments.map(p=>{
          const ps=PAYMENT_STATUS[p.status]||PAYMENT_STATUS.pending;
          return(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,background:"#fff",borderRadius:8,padding:"8px 12px",border:"1px solid rgba(20,150,140,0.1)"}}>
              {canEdit&&<button onClick={()=>togglePaid(p.id)} title={p.status==="paid"?"Đánh dấu chưa TT":"Đánh dấu đã TT"} style={{width:22,height:22,borderRadius:"50%",border:"2px solid",cursor:"pointer",borderColor:ps.color,background:p.status==="paid"?ps.color:"transparent",color:"#fff",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{p.status==="paid"?"✓":""}</button>}
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontWeight:700,fontSize:13,color:"#0f3a4a"}}>{p.label}</span>
                {p.note&&<span style={{fontSize:11,color:"rgba(15,58,74,0.45)",marginLeft:6}}>{p.note}</span>}
              </div>
              {/* Số tiền kế hoạch + thực nhận */}
              <div style={{textAlign:"right",minWidth:130}}>
                <div style={{fontSize:12,color:"rgba(15,58,74,0.45)",marginBottom:1}}>
                  KH: {(+p.amount||0).toLocaleString("vi-VN")} đ
                </div>
                {canEdit&&editAmt!==null&&editAmt?.id===p.id?(
                  <input autoFocus type="number" value={editAmt?.val||""}
                    onChange={e=>setEditAmt(prev=>prev?{...prev,val:e.target.value}:null)}
                    onBlur={()=>saveAmount(p.id)}
                    onKeyDown={e=>{if(e.key==="Enter")saveAmount(p.id);if(e.key==="Escape")setEditAmt(null);}}
                    style={{width:120,padding:"3px 7px",border:"1.5px solid #14a08c",borderRadius:6,fontSize:13,fontWeight:700,color:"#0d7a6a",fontFamily:"inherit",outline:"none",textAlign:"right"}}/>
                ):(
                  <div onClick={()=>canEdit&&setEditAmt({id:p.id,val:String(p.receivedAmount!=null?p.receivedAmount:p.amount||"")})}
                    title={canEdit?"Click để nhập số tiền thực nhận":""}
                    style={{fontSize:13,fontWeight:700,color:p.status==="paid"?"#27ae60":"#0f3a4a",cursor:canEdit?"pointer":"default",borderBottom:canEdit?"1px dashed rgba(20,150,140,0.3)":"none",display:"inline-block"}}>
                    TT: {p.receivedAmount!=null?(+p.receivedAmount).toLocaleString("vi-VN"):(+p.amount||0).toLocaleString("vi-VN")} đ
                    {canEdit&&<span style={{fontSize:9,marginLeft:4,opacity:0.4}}>✏️</span>}
                  </div>
                )}
              </div>
              <div style={{fontSize:11,color:"rgba(15,58,74,0.4)",whiteSpace:"nowrap",textAlign:"right",minWidth:70}}>
                {p.dueDate&&<div>Hạn: {p.dueDate}</div>}
                {p.paidDate&&<div style={{color:"#27ae60"}}>TT: {p.paidDate}</div>}
              </div>
              <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,background:ps.color+"22",color:ps.color,whiteSpace:"nowrap"}}>{ps.label}</span>
              {/* Đề nghị TT - hiện cho mọi user có exportQuote, không hiện cho CEO/Trưởng Phòng (họ tự duyệt) */}

              {canEdit&&<button onClick={()=>delPayment(p.id)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(220,50,80,0.45)",fontSize:13,padding:"0 2px",lineHeight:1}}>✕</button>}
            </div>
          );
        })}
      </div>
      {canEdit&&!adding&&<button onClick={()=>setAdding(true)} style={{marginTop:8,background:"rgba(20,150,140,0.08)",border:"1px dashed rgba(20,150,140,0.3)",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,color:"#0d7a6a",cursor:"pointer",fontFamily:"inherit"}}>+ Thêm đợt thanh toán</button>}
      {canEdit&&adding&&(
        <div style={{marginTop:8,display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",background:"rgba(168,230,221,0.15)",padding:"10px 12px",borderRadius:9,border:"1px solid rgba(20,150,140,0.15)"}}>
          {[{ph:"Đợt 1...",k:"label",w:80},{ph:"Số tiền",k:"amount",t:"number",w:130},{ph:"Hạn thanh toán",k:"dueDate",t:"date",w:150},{ph:"Ghi chú",k:"note",flex:1}].map(f=>(
            <input key={f.k} type={f.t||"text"} value={newP[f.k]} onChange={e=>setNewP(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph}
              style={{padding:"6px 10px",border:"1px solid rgba(20,150,140,0.25)",borderRadius:7,fontSize:12,fontFamily:"inherit",width:f.w,flex:f.flex,minWidth:f.flex?80:undefined,outline:"none"}}/>
          ))}
          <button onClick={addPayment} style={{padding:"6px 16px",background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>Thêm</button>
          <button onClick={()=>setAdding(false)} style={{padding:"6px 10px",background:"none",border:"1px solid rgba(0,0,0,0.12)",borderRadius:7,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Huỷ</button>
        </div>
      )}
    </div>
  );
}

/* ── Contract View ── */
function ContractView({user}){
  const canEdit=hasPerm(user,"manageContracts");
  const viewOnly=!canEdit&&hasPerm(user,"viewContracts"); // Admin: xem được nhưng không tạo/sửa
  const [contracts,setContracts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [search,setSearch]=useState("");
  const [filterStatus,setFilterStatus]=useState("");
  const [expanded,setExpanded]=useState(null); // contract id for payment panel
  const [acceptanceModal,setAcceptanceModal]=useState(null);
  const [delConfirm,setDelConfirm]=useState(null);
  const [migrated,setMigrated]=useState(false);

  useEffect(()=>{
    if(!window.fbOnContracts)return;
    const unsub=window.fbOnContracts(list=>{setContracts(list);setLoading(false);});
    return()=>unsub&&unsub();
  },[]);

  // Auto-migrate localStorage contracts to Firestore (one-time)
  useEffect(()=>{
    if(loading||migrated||!window.fbGetContracts||!window.fbPushContracts)return;
    setMigrated(true);
    (async()=>{
      try{
        const cloud=await window.fbGetContracts();
        const cloudIds=new Set(cloud.map(c=>c.id));
        const local=[];
        for(let i=0;i<localStorage.length;i++){
          const key=localStorage.key(i);
          if(key&&key.startsWith("vte_contracts_")){
            try{JSON.parse(localStorage.getItem(key)||"[]").forEach(c=>{if(!cloudIds.has(c.id))local.push({...c,_tourKey:key});});}catch(e){}
          }
        }
        if(local.length>0){await window.fbPushContracts([...cloud,...local]);console.log("Migrated",local.length,"contracts");}
      }catch(e){console.warn("Contract migration failed:",e.message);}
    })();
  },[loading,migrated]);

  const updateContract=async(id,updates)=>{
    const next=contracts.map(c=>c.id===id?{...c,...updates,updatedAt:new Date().toISOString(),updatedBy:user.name}:c);
    setContracts(next);setSyncing(true);
    try{await window.fbPushContracts(next);}catch(e){alert("❌ Lỗi đồng bộ: "+e.message);}
    finally{setSyncing(false);}
  };
  const deleteContract=async(id)=>{
    const next=contracts.filter(c=>c.id!==id);
    setContracts(next);setSyncing(true);
    try{await window.fbPushContracts(next);}catch(e){alert("❌ Lỗi: "+e.message);}
    finally{setSyncing(false);setDelConfirm(null);}
  };

  const filtered=contracts.filter(c=>{
    const cs=c.contractStatus||"draft";
    if(filterStatus&&cs!==filterStatus)return false;
    const q=search.toLowerCase();
    if(!q)return true;
    return c.contractNo?.toLowerCase().includes(q)||c.tourName?.toLowerCase().includes(q)||c.partyB?.name?.toLowerCase().includes(q)||c.tourDest?.toLowerCase().includes(q);
  });

  // Stats
  const totalValue=contracts.reduce((s,c)=>s+Math.round((+c.pricePerPax||0)*(+c.contractPax||0)),0);
  const totalPaidAll=contracts.reduce((s,c)=>s+(c.payments||[]).filter(p=>p.status==="paid").reduce((ss,p)=>ss+(+p.amount||0),0),0);
  const paidPct=totalValue>0?Math.min(100,totalPaidAll/totalValue*100):0;
  const fmtDt=s=>{try{return new Date(s).toLocaleDateString("vi-VN");}catch(e){return s||"—";}};

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:"#0f3a4a"}}>📜 Quản lý Hợp đồng</div>
          <div style={{fontSize:12,color:"rgba(15,58,74,0.5)",marginTop:3}}>
            {loading?"Đang tải...":`${contracts.length} hợp đồng · Đồng bộ real-time Cloud`}
            {syncing&&<span style={{color:"#8e44ad",marginLeft:8}}>☁️ Đang đồng bộ...</span>}
          </div>
        </div>
      </div>

      {/* View-only notice for Admin */}
      {viewOnly&&<div style={{marginBottom:16,padding:"10px 16px",background:"rgba(41,128,185,0.08)",border:"1px solid rgba(41,128,185,0.25)",borderRadius:10,fontSize:12,color:"#2980b9",fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
        👁️ Chế độ xem — Bạn có thể xem toàn bộ hợp đồng nhưng không thể tạo hoặc điều chỉnh
      </div>}
      {/* Summary cards */}
      {!loading&&contracts.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,marginBottom:18}}>
          <div style={{background:"linear-gradient(135deg,#0f1c2d,#16314a)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
            <div style={{fontSize:11,opacity:0.7}}>📋 Tổng hợp đồng</div>
            <div style={{fontSize:26,fontWeight:800,marginTop:4}}>{contracts.length}</div>
          </div>
          <div style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
            <div style={{fontSize:11,opacity:0.85}}>💰 Tổng giá trị</div>
            <div style={{fontSize:15,fontWeight:800,marginTop:4}}>{totalValue.toLocaleString("vi-VN")} đ</div>
          </div>
          <div style={{background:"linear-gradient(135deg,#27ae60,#2ecc71)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
            <div style={{fontSize:11,opacity:0.85}}>✅ Đã thu</div>
            <div style={{fontSize:15,fontWeight:800,marginTop:4}}>{totalPaidAll.toLocaleString("vi-VN")} đ</div>
            <div style={{height:3,background:"rgba(255,255,255,0.3)",borderRadius:2,marginTop:6,overflow:"hidden"}}>
              <div style={{height:"100%",width:paidPct+"%",background:"#fff"}}/>
            </div>
            <div style={{fontSize:10,opacity:0.8,marginTop:2}}>{paidPct.toFixed(0)}% tổng giá trị</div>
          </div>
          {Object.entries(CONTRACT_STATUS).map(([k,s])=>{
            const cnt=contracts.filter(c=>(c.contractStatus||"draft")===k).length;
            if(cnt===0)return null;
            return(
              <div key={k} style={{background:s.bg,border:`1px solid ${s.color}44`,borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:11,color:s.color,fontWeight:700}}>{s.icon} {s.label}</div>
                <div style={{fontSize:22,fontWeight:800,color:s.color,marginTop:4}}>{cnt}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Search & Filter */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200,position:"relative"}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:0.4}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Tìm số HĐ, tên tour, bên B..."
            style={{width:"100%",padding:"9px 12px 9px 32px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",outline:"none",color:"#0f3a4a"}}/>
        </div>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
          style={{padding:"9px 14px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",color:"#0f3a4a",background:"#fff",outline:"none"}}>
          <option value="">Tất cả trạng thái</option>
          {Object.entries(CONTRACT_STATUS).map(([k,s])=><option key={k} value={k}>{s.icon} {s.label}</option>)}
        </select>
        {(search||filterStatus)&&<button onClick={()=>{setSearch("");setFilterStatus("");}} style={{padding:"9px 14px",background:"rgba(220,50,80,0.08)",border:"1px solid rgba(220,50,80,0.2)",borderRadius:10,fontSize:12,fontWeight:600,color:"#dc3250",cursor:"pointer",fontFamily:"inherit"}}>✕ Xoá lọc</button>}
      </div>

      {loading&&<div style={{textAlign:"center",padding:"60px 0",color:"rgba(15,58,74,0.4)"}}>⏳ Đang tải hợp đồng từ Cloud...</div>}
      {!loading&&filtered.length===0&&(
        <div style={{textAlign:"center",padding:"60px 0",color:"rgba(15,58,74,0.35)"}}>
          <div style={{fontSize:40,marginBottom:12}}>📜</div>
          <div style={{fontSize:15,fontWeight:600}}>{contracts.length===0?"Chưa có hợp đồng nào":"Không tìm thấy kết quả"}</div>
          <div style={{fontSize:12,marginTop:6,opacity:0.8}}>Tạo hợp đồng từ nút <strong>📜 Hợp đồng</strong> trong dropdown Xuất</div>
        </div>
      )}

      {/* Contract list */}
      {!loading&&filtered.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(c=>{
            const cs=CONTRACT_STATUS[c.contractStatus||"draft"];
            const cAmount=Math.round((+c.pricePerPax||0)*(+c.contractPax||0));
            const paidAmt=(c.payments||[]).filter(p=>p.status==="paid").reduce((s,p)=>s+(+p.amount||0),0);
            const payPct=cAmount>0?Math.min(100,paidAmt/cAmount*100):0;
            const isExpanded=expanded===c.id;
            return(
              <div key={c.id} style={{background:"#fff",borderRadius:14,border:`1px solid ${cs.color}44`,boxShadow:"0 2px 8px rgba(15,58,74,0.06)",overflow:"hidden"}}>
                {/* Contract row */}
                <div style={{padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
                  {/* Info */}
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}>
                      <span style={{background:cs.color,color:"#fff",fontSize:10,fontWeight:800,padding:"3px 9px",borderRadius:5}}>HĐ #{c.contractNo||"(chưa đánh số)"}</span>
                      <span style={{background:cs.bg,color:cs.color,fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:10,border:`1px solid ${cs.color}44`}}>{cs.icon} {cs.label}</span>
                      {c.hasAcceptance&&<span style={{background:"rgba(39,174,96,0.12)",color:"#27ae60",fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:10}}>✅ Đã nghiệm thu</span>}
                    </div>
                    <div style={{fontWeight:800,fontSize:15,color:"#0f3a4a",marginBottom:2}}>{c.partyB?.name||"(Chưa có Bên B)"}</div>
                    <div style={{fontSize:12,color:"rgba(15,58,74,0.5)"}}>{c.tourName&&`🗺️ ${c.tourName}`}{c.tourDest&&` · ${c.tourDest}`}{c.contractDate&&` · ${c.contractDate}`}</div>
                    {c.partyB?.rep&&<div style={{fontSize:11,color:"rgba(15,58,74,0.4)",marginTop:2}}>👤 {c.partyB.rep} · {c.partyB.tel||""}</div>}
                  </div>
                  {/* Amount + payment */}
                  <div style={{minWidth:160,textAlign:"right"}}>
                    <div style={{color:"#dc3250",fontWeight:800,fontSize:16}}>{cAmount.toLocaleString("vi-VN")} đ</div>
                    <div style={{fontSize:11,color:"rgba(15,58,74,0.45)",marginTop:2}}>{c.contractPax} khách × {Math.round(+c.pricePerPax||0).toLocaleString("vi-VN")} đ</div>
                    {(c.payments||[]).length>0&&(
                      <div style={{marginTop:6}}>
                        <div style={{height:4,background:"rgba(0,0,0,0.07)",borderRadius:2,overflow:"hidden",marginBottom:2}}>
                          <div style={{height:"100%",width:payPct+"%",background:payPct>=100?"#27ae60":"#14a08c",borderRadius:2}}/>
                        </div>
                        <div style={{fontSize:10,color:payPct>=100?"#27ae60":"rgba(15,58,74,0.45)"}}>{paidAmt.toLocaleString("vi-VN")} đ / {payPct.toFixed(0)}% đã thu</div>
                      </div>
                    )}
                  </div>
                  {/* Actions */}
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                    <button onClick={()=>setExpanded(isExpanded?null:c.id)} style={{background:isExpanded?"rgba(20,150,140,0.15)":"rgba(20,150,140,0.08)",border:"1px solid rgba(20,150,140,0.25)",color:"#0d7a6a",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}} title="Quản lý thanh toán">
                      💰 {isExpanded?"Đóng":"Thanh toán"}
                    </button>
                    {/* Tạo BBNT: hiện khi chưa có, cho mọi trạng thái */}
                    {canEdit&&!c.hasAcceptance&&(
                      <button onClick={()=>setAcceptanceModal(c)} style={{background:"rgba(39,174,96,0.1)",border:"1px solid rgba(39,174,96,0.25)",color:"#27ae60",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}} title="Tạo biên bản nghiệm thu">✅ Nghiệm thu</button>
                    )}
                    {/* Xuất lại BBNT: hiện khi đã có, hoặc trạng thái completed */}
                    {(c.hasAcceptance||(c.contractStatus==="completed"&&canEdit))&&(
                      <button onClick={()=>c.hasAcceptance?exportAcceptanceCertPDF(c,{date:c.acceptanceDate||new Date().toISOString().slice(0,10),note:c.acceptanceNote||""},user):setAcceptanceModal(c)}
                        style={{background:"rgba(39,174,96,0.12)",border:"1px solid rgba(39,174,96,0.35)",color:"#27ae60",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}} title={c.hasAcceptance?"Xuất lại biên bản nghiệm thu PDF":"Tạo biên bản nghiệm thu"}>
                        📄 BBNT
                      </button>
                    )}
                    {canEdit&&<select value={c.contractStatus||"draft"} onChange={e=>updateContract(c.id,{contractStatus:e.target.value})}
                      style={{padding:"5px 8px",border:"1px solid rgba(20,150,140,0.2)",borderRadius:7,fontSize:11,fontFamily:"inherit",color:"rgba(15,58,74,0.7)",background:"#fff",outline:"none",cursor:"pointer"}}>
                      {Object.entries(CONTRACT_STATUS).map(([k,s])=><option key={k} value={k}>{s.icon} {s.label}</option>)}
                    </select>}
                    <button onClick={()=>{const startD=c.tourStartDate?new Date(c.tourStartDate):new Date();const endD=new Date(startD.getTime()+((c.tourDays||1)-1)*86400000);exportContract(c,{name:c.tourName||"",dest:c.tourDest||"",days:c.tourDays||1,nights:c.tourNights||0,startDate:c.tourStartDate||""},startD,endD,"pdf");}} style={{background:"rgba(20,150,140,0.08)",border:"1px solid rgba(20,150,140,0.2)",color:"#0d7a6a",borderRadius:7,padding:"6px 9px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}} title="Xuất PDF">📜</button>
                    {canEdit&&<button onClick={()=>setDelConfirm(c)} style={{background:"rgba(220,50,80,0.07)",border:"1px solid rgba(220,50,80,0.2)",color:"#dc3250",borderRadius:7,padding:"6px 9px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}} title="Xoá">🗑️</button>}
                  </div>
                </div>
                {/* Payment panel */}
                {isExpanded&&<PaymentPanel contract={c} canEdit={canEdit} user={user} onUpdate={updates=>updateContract(c.id,updates)}/>}
              </div>
            );
          })}
        </div>
      )}

      {/* Acceptance cert modal */}
      {acceptanceModal&&<AcceptanceCertModal contract={acceptanceModal} user={user}
        onSave={(form)=>{updateContract(acceptanceModal.id,{contractStatus:"completed",hasAcceptance:true,acceptanceDate:form.date,acceptanceNote:form.note});setAcceptanceModal(null);}}
        onClose={()=>setAcceptanceModal(null)}/>}

      {/* Delete confirm */}
      {delConfirm&&(
        <div className="modal-bg" onClick={()=>setDelConfirm(null)}>
          <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:400,padding:"28px 30px",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>🗑️</div>
            <div style={{fontSize:17,fontWeight:800,color:"#0f3a4a",marginBottom:8}}>Xoá hợp đồng này?</div>
            <div style={{fontSize:13,color:"rgba(15,58,74,0.6)",marginBottom:20}}>HĐ <strong>#{delConfirm.contractNo}</strong> · {delConfirm.partyB?.name}<br/>Hành động này không thể hoàn tác.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelConfirm(null)} style={{flex:1,padding:12,border:"1.5px solid rgba(20,150,140,0.2)",borderRadius:10,background:"#fff",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",color:"rgba(15,58,74,0.6)"}}>Huỷ</button>
              <button onClick={()=>deleteContract(delConfirm.id)} style={{flex:1,padding:12,border:"none",borderRadius:10,background:"linear-gradient(135deg,#dc3250,#e74c3c)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🗑️ Xoá</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ CUSTOMERS – Khách hàng ═══════════════════════════ */
function CustomerModal({customer,onSave,onClose,canEdit}){
  const empty={id:"",name:"",type:"company",contacts:[{name:"",phone:"",email:"",position:""}],note:""};
  const [form,setForm]=useState(customer||empty);
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setContact=(i,k,v)=>setForm(p=>{const c=[...p.contacts];c[i]={...c[i],[k]:v};return{...p,contacts:c};});
  const addContact=()=>setForm(p=>({...p,contacts:[...p.contacts,{name:"",phone:"",email:"",position:""}]}));

function CustomerView({user}){
  const canEdit=hasPerm(user,"manageCustomers");
  const [customers,setCustomers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [search,setSearch]=useState("");
  const [filterType,setFilterType]=useState("");
  const [modal,setModal]=useState(null);
  const [delConfirm,setDelConfirm]=useState(null);

  useEffect(()=>{
    if(!window.fbOnCustomers)return;
    setLoading(true);
    const unsub=window.fbOnCustomers(data=>{
      if(data){setCustomers(data);} else{setCustomers([]);}
      setLoading(false);
    });
    // Get lastSync from snapshot metadata
    if(window.fbOnCustomers._meta) setLastSync(window.fbOnCustomers._meta);
    return()=>unsub&&unsub();
  },[]);

  // Also track meta via separate listener
  useEffect(()=>{
    if(!window.fbOnNCC)return; // reuse pattern
    // Listen for updatedAt/updatedBy from the doc
    if(!window._fbCusMetaUnsub){
      // We get meta from the snapshot itself in fbOnCustomers, need to extend it
    }
  },[]);

  const pushToCloud=async(list)=>{
    setSyncing(true);
    try{await window.fbPushCustomers(list);}
    catch(e){alert("❌ Lỗi đồng bộ: "+e.message);}
    finally{setSyncing(false);}
  };

  const handleSave=(form)=>{
    let next;
    if(form.id&&customers.find(c=>c.id===form.id)){
      next=customers.map(c=>c.id===form.id?{...form,updatedAt:new Date().toISOString(),updatedBy:user.name}:c);
    }else{
      next=[...customers,{...form,createdAt:new Date().toISOString(),createdBy:user.name}];
    }
    setCustomers(next);
    pushToCloud(next);
    setModal(null);
  };

  const handleDelete=(id)=>{
    const next=customers.filter(c=>c.id!==id);
    setCustomers(next);
    pushToCloud(next);
    setDelConfirm(null);
  };

  const filtered=customers.filter(c=>{
    const q=search.toLowerCase();
    if(filterType&&c.type!==filterType)return false;
    if(!q)return true;
    return(
      c.name?.toLowerCase().includes(q)||
      c.note?.toLowerCase().includes(q)||
      c.contacts?.some(ct=>ct.name?.toLowerCase().includes(q)||ct.phone?.includes(q)||ct.email?.toLowerCase().includes(q)||ct.position?.toLowerCase().includes(q))
    );
  });

  const cardStyle={background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid rgba(41,128,185,0.15)",boxShadow:"0 2px 8px rgba(15,58,74,0.06)",transition:"all .2s",cursor:"pointer"};

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:"#0f3a4a"}}>👥 Danh sách Khách hàng</div>
          <div style={{fontSize:12,color:"rgba(15,58,74,0.5)",marginTop:3}}>
            {loading?"Đang tải...":customers.length+" khách hàng · Đồng bộ real-time Cloud"}
            {syncing&&<span style={{color:"#2980b9",marginLeft:8}}>☁️ Đang đồng bộ...</span>}
          </div>
        </div>
        {canEdit&&<button onClick={()=>setModal({customer:null})} style={{background:"linear-gradient(135deg,#2980b9,#3498db)",color:"#fff",border:"none",borderRadius:10,padding:"10px 20px",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>➕ Thêm khách hàng</button>}
      </div>

      {/* Search & Filter */}
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200,position:"relative"}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:0.4}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Tìm tên, contact, email, SĐT..."
            style={{width:"100%",padding:"9px 12px 9px 32px",border:"1.5px solid rgba(41,128,185,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",outline:"none",color:"#0f3a4a"}}/>
        </div>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)}
          style={{padding:"9px 14px",border:"1.5px solid rgba(41,128,185,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",color:"#0f3a4a",background:"#fff",outline:"none"}}>
          <option value="">Tất cả</option>
          <option value="company">🏢 Công ty</option>
          <option value="individual">👤 Cá nhân</option>
        </select>
        {(search||filterType)&&<button onClick={()=>{setSearch("");setFilterType("");}} style={{padding:"9px 14px",background:"rgba(220,50,80,0.08)",border:"1px solid rgba(220,50,80,0.2)",borderRadius:10,fontSize:12,fontWeight:600,color:"#dc3250",cursor:"pointer",fontFamily:"inherit"}}>✕ Xoá lọc</button>}
      </div>

      {loading&&<div style={{textAlign:"center",padding:"60px 0",color:"rgba(15,58,74,0.4)"}}>⏳ Đang tải danh sách từ Cloud...</div>}

      {!loading&&filtered.length===0&&(
        <div style={{textAlign:"center",padding:"60px 0",color:"rgba(15,58,74,0.35)"}}>
          <div style={{fontSize:40,marginBottom:12}}>👥</div>
          <div style={{fontSize:15,fontWeight:600}}>{customers.length===0?"Chưa có khách hàng nào":"Không tìm thấy kết quả"}</div>
          <div style={{fontSize:12,marginTop:6}}>{customers.length===0&&canEdit?"Bấm \"➕ Thêm khách hàng\" để bắt đầu":""}</div>
        </div>
      )}

      {!loading&&filtered.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
          {filtered.map(c=>(
            <div key={c.id} style={cardStyle} onClick={()=>setModal({customer:c})}
              onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 6px 20px rgba(15,58,74,0.12)";e.currentTarget.style.borderColor="rgba(41,128,185,0.35)";}}
              onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 8px rgba(15,58,74,0.06)";e.currentTarget.style.borderColor="rgba(41,128,185,0.15)";}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,marginRight:8}}>
                  <span style={{fontSize:20}}>{c.type==="company"?"🏢":"👤"}</span>
                  <div style={{fontWeight:800,fontSize:15,color:"#0f3a4a"}}>{c.name}</div>
                </div>
                {canEdit&&(
                  <div style={{display:"flex",gap:5}} onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>setModal({customer:c})} style={{background:"rgba(41,128,185,0.1)",border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",color:"#2980b9",fontFamily:"inherit"}}>✏️</button>
                    <button onClick={()=>setDelConfirm(c)} style={{background:"rgba(220,50,80,0.08)",border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",color:"#dc3250",fontFamily:"inherit"}}>🗑️</button>
                  </div>
                )}
              </div>
              {/* Badge loại */}
              <div style={{marginBottom:10}}>
                <span style={{background:c.type==="company"?"rgba(41,128,185,0.12)":"rgba(39,174,96,0.12)",color:c.type==="company"?"#2980b9":"#27ae60",border:`1px solid ${c.type==="company"?"rgba(41,128,185,0.3)":"rgba(39,174,96,0.3)"}`,borderRadius:12,padding:"2px 10px",fontSize:11,fontWeight:700}}>
                  {c.type==="company"?"🏢 Công ty":"👤 Cá nhân"}
                </span>
              </div>
              {/* Contacts */}
              {c.contacts?.filter(ct=>ct.name||ct.phone||ct.email).slice(0,2).map((ct,i)=>(
                <div key={i} style={{fontSize:12,color:"rgba(15,58,74,0.65)",borderTop:i===0?"1px dashed rgba(41,128,185,0.15)":"none",paddingTop:i===0?8:4,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
                  {ct.name&&<span style={{fontWeight:700}}>{ct.name}{ct.position&&<span style={{fontWeight:400,opacity:0.7}}> · {ct.position}</span>}</span>}
                  {ct.phone&&<a href={"tel:"+ct.phone} onClick={e=>e.stopPropagation()} style={{color:"#2980b9",textDecoration:"none"}}>📞 {ct.phone}</a>}
                  {ct.email&&<a href={"mailto:"+ct.email} onClick={e=>e.stopPropagation()} style={{color:"#2980b9",textDecoration:"none"}}>✉️ {ct.email}</a>}
                </div>
              ))}
              {c.contacts?.length>2&&<div style={{fontSize:11,color:"rgba(15,58,74,0.4)",marginTop:4}}>+{c.contacts.length-2} contact khác...</div>}
              {c.note&&<div style={{fontSize:11,color:"rgba(15,58,74,0.5)",marginTop:8,borderTop:"1px dashed rgba(41,128,185,0.1)",paddingTop:6,fontStyle:"italic"}}>📝 {c.note}</div>}
            </div>
          ))}
        </div>
      )}

      {modal&&<CustomerModal customer={modal.customer} canEdit={canEdit} onSave={handleSave} onClose={()=>setModal(null)}/>}

      {delConfirm&&(
        <div className="modal-bg" onClick={()=>setDelConfirm(null)}>
          <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:400,padding:"28px 30px",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>🗑️</div>
            <div style={{fontSize:17,fontWeight:800,color:"#0f3a4a",marginBottom:8}}>Xoá khách hàng này?</div>
            <div style={{fontSize:13,color:"rgba(15,58,74,0.6)",marginBottom:20}}>Xoá <strong>"{delConfirm.name}"</strong> khỏi danh sách.<br/>Toàn bộ tài khoản sẽ bị ảnh hưởng.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelConfirm(null)} style={{flex:1,padding:12,border:"1.5px solid rgba(41,128,185,0.2)",borderRadius:10,background:"#fff",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",color:"rgba(15,58,74,0.6)"}}>Huỷ</button>
              <button onClick={()=>handleDelete(delConfirm.id)} style={{flex:1,padding:12,border:"none",borderRadius:10,background:"linear-gradient(135deg,#dc3250,#e74c3c)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🗑️ Xoá</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  const addContact=()=>setForm(p=>({...p,contacts:[...p.contacts,{name:"",phone:"",email:"",position:""}]}));

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

                    {canEdit&&form.contacts.length>1&&<button onClick={()=>delContact(i)} style={{background:"rgba(220,50,80,0.08)",border:"none",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#dc3250",cursor:"pointer",fontFamily:"inherit"}}>✕ Xoá</button>}

                    <input style={inp} value={c.name} onChange={e=>setContact(i,"name",e.target.value)} placeholder="Họ tên" disabled={!canEdit}/>
                    <input style={inp} value={c.position} onChange={e=>setContact(i,"position",e.target.value)} placeholder="Chức vụ" disabled={!canEdit}/>
                    <input style={inp} value={c.phone} onChange={e=>setContact(i,"phone",e.target.value)} placeholder="Số điện thoại" disabled={!canEdit}/>
                    <input style={inp} value={c.email} onChange={e=>setContact(i,"email",e.target.value)} placeholder="Email" disabled={!canEdit}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
          {/* Ghi chú */}
          <div>
            <label style={{fontSize:12,fontWeight:700,color:"rgba(15,58,74,0.6)",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:6}}>Ghi chú</label>
            <textarea style={{...inp,resize:"vertical",minHeight:70}} value={form.note} onChange={e=>setF("note",e.target.value)} placeholder="Ghi chú thêm về NCC..." disabled={!canEdit}/>
          </div>
          {canEdit&&(
            <div style={{display:"flex",gap:10,paddingTop:4}}>
              <button onClick={onClose} style={{flex:1,background:"#fff",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,padding:12,cursor:"pointer",fontWeight:600,fontSize:13,color:"rgba(15,58,74,0.6)",fontFamily:"inherit"}}>Huỷ</button>
              <button onClick={handleSave} style={{flex:2,background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontWeight:800,fontSize:14,fontFamily:"inherit"}}>💾 Lưu NCC</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function NCCView({user}){
  const canEdit=hasPerm(user,"manageNCC");
  const [suppliers,setSuppliers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [search,setSearch]=useState("");
  const [filterSector,setFilterSector]=useState("");
  const [modal,setModal]=useState(null); // null | {ncc} | "new"
  const [delConfirm,setDelConfirm]=useState(null);

  /* ── Firebase real-time ── */
  useEffect(()=>{
    if(!window.fbOnNCC)return;
    setLoading(true);
    const unsub=window.fbOnNCC(data=>{
      if(data){setSuppliers(data.suppliers||[]);setLastSync({at:data.updatedAt,by:data.updatedBy});}
      else{setSuppliers([]);}
      setLoading(false);
    });
    return()=>unsub&&unsub();
  },[]);

  const pushToCloud=async(list)=>{
    if(!window.fbPushNCC)return;
    setSyncing(true);
    try{await window.fbPushNCC(list);}catch(e){alert("❌ Lỗi đồng bộ: "+e.message);}
    finally{setSyncing(false);}
  };

  const handleSave=(form)=>{
    let next;
    if(form.id&&suppliers.find(s=>s.id===form.id)){
      next=suppliers.map(s=>s.id===form.id?{...form,updatedAt:new Date().toISOString(),updatedBy:user.name}:s);
    }else{
      next=[...suppliers,{...form,createdAt:new Date().toISOString(),createdBy:user.name}];
    }
    setSuppliers(next);
    pushToCloud(next);
    setModal(null);
  };

  const handleDelete=(id)=>{
    const next=suppliers.filter(s=>s.id!==id);
    setSuppliers(next);
    pushToCloud(next);
    setDelConfirm(null);
  };

  /* ── Filter ── */
  const filtered=suppliers.filter(s=>{
    const q=search.toLowerCase();
    if(filterSector&&!s.sectors?.includes(filterSector))return false;
    if(!q)return true;
    return(
      s.name?.toLowerCase().includes(q)||
      s.location?.toLowerCase().includes(q)||
      s.note?.toLowerCase().includes(q)||
      s.sectors?.some(sec=>sec.toLowerCase().includes(q))||
      s.contacts?.some(c=>c.name?.toLowerCase().includes(q)||c.phone?.includes(q)||c.email?.toLowerCase().includes(q)||c.position?.toLowerCase().includes(q))
    );
  });

  const cardStyle={background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid rgba(20,150,140,0.15)",boxShadow:"0 2px 8px rgba(15,58,74,0.06)",transition:"all .2s",cursor:"pointer"};

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:"#0f3a4a"}}>🏢 Danh sách Nhà Cung Cấp</div>
          <div style={{fontSize:12,color:"rgba(15,58,74,0.5)",marginTop:3}}>
            {loading?"Đang tải...":suppliers.length+" NCC · "}
            {lastSync&&!loading&&<span>Sync: <strong>{lastSync.by?.split("(")[0].trim()}</strong> · {new Date(lastSync.at).toLocaleString("vi-VN")}</span>}
            {syncing&&<span style={{color:"#8e44ad"}}>☁️ Đang đồng bộ...</span>}
          </div>
        </div>
        {canEdit&&<button onClick={()=>setModal({ncc:null})} style={{background:"linear-gradient(135deg,#0d7a6a,#14a08c)",color:"#fff",border:"none",borderRadius:10,padding:"10px 20px",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>➕ Thêm NCC</button>}
      </div>

      {/* Search & Filter */}
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200,position:"relative"}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:0.4}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Tìm tên NCC, contact, địa điểm..."
            style={{width:"100%",padding:"9px 12px 9px 32px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",outline:"none",color:"#0f3a4a"}}/>
        </div>
        <select value={filterSector} onChange={e=>setFilterSector(e.target.value)}
          style={{padding:"9px 14px",border:"1.5px solid rgba(20,150,140,0.25)",borderRadius:10,fontSize:13,fontFamily:"inherit",color:"#0f3a4a",background:"#fff",outline:"none"}}>
          <option value="">Tất cả lĩnh vực</option>

        </div>

      {/* Grid */}
      {!loading&&filtered.length>0&&(

          {filtered.map(s=>(

              onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 8px rgba(15,58,74,0.06)";e.currentTarget.style.borderColor="rgba(20,150,140,0.15)";}}>
              {/* Name + actions */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{fontWeight:800,fontSize:15,color:"#0f3a4a",flex:1,marginRight:8}}>{s.name}</div>
                {canEdit&&(
                  <div style={{display:"flex",gap:5}} onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>setModal({ncc:s})} title="Sửa" style={{background:"rgba(20,150,140,0.1)",border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",color:"#0d7a6a",fontFamily:"inherit"}}>✏️</button>
                    <button onClick={()=>setDelConfirm(s)} title="Xoá" style={{background:"rgba(220,50,80,0.08)",border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",color:"#dc3250",fontFamily:"inherit"}}>🗑️</button>
                  </div>
                )}
              </div>
              {/* Sectors */}
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                {(s.sectors||[]).map(sec=>(
                  <span key={sec} style={{background:SECTOR_COLOR[sec]||"#7f8c8d",color:"#fff",borderRadius:12,padding:"2px 9px",fontSize:11,fontWeight:700}}>{sec}</span>
                ))}
              </div>
              {/* Location */}
              {s.location&&<div style={{fontSize:12,color:"rgba(15,58,74,0.55)",marginBottom:8,display:"flex",alignItems:"center",gap:4}}>📍 {s.location}</div>}
              {/* Contacts */}
              {s.contacts?.filter(c=>c.name||c.phone||c.email).slice(0,2).map((c,i)=>(
                <div key={i} style={{fontSize:12,color:"rgba(15,58,74,0.65)",borderTop:i===0?"1px dashed rgba(20,150,140,0.15)":"none",paddingTop:i===0?8:4,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
                  {c.name&&<span style={{fontWeight:700}}>{c.name}{c.position&&<span style={{fontWeight:400,opacity:0.7}}> · {c.position}</span>}</span>}
                  {c.phone&&<a href={"tel:"+c.phone} onClick={e=>e.stopPropagation()} style={{color:"#0d7a6a",textDecoration:"none"}}>📞 {c.phone}</a>}
                  {c.email&&<a href={"mailto:"+c.email} onClick={e=>e.stopPropagation()} style={{color:"#0d7a6a",textDecoration:"none"}}>✉️ {c.email}</a>}

              {s.contacts?.length>2&&<div style={{fontSize:11,color:"rgba(15,58,74,0.4)",marginTop:4}}>+{s.contacts.length-2} contact khác...</div>}

          ))}

      )}

      {/* Modal thêm/sửa */}
      {modal&&<NCCModal ncc={modal.ncc} canEdit={canEdit} onSave={handleSave} onClose={()=>setModal(null)}/>}

      {/* Confirm xoá */}
      {delConfirm&&(
        <div className="modal-bg" onClick={()=>setDelConfirm(null)}>
          <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:420,padding:"28px 30px",textAlign:"center"}}>

            <div style={{fontSize:17,fontWeight:800,color:"#0f3a4a",marginBottom:8}}>Xoá NCC này?</div>
            <div style={{fontSize:13,color:"rgba(15,58,74,0.6)",marginBottom:20}}>Bạn sắp xoá <strong>"{delConfirm.name}"</strong>.<br/>Hành động này sẽ xoá trên toàn bộ tài khoản.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelConfirm(null)} style={{flex:1,padding:12,border:"1.5px solid rgba(20,150,140,0.2)",borderRadius:10,background:"#fff",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",color:"rgba(15,58,74,0.6)"}}>Huỷ</button>
              <button onClick={()=>handleDelete(delConfirm.id)} style={{flex:1,padding:12,border:"none",borderRadius:10,background:"linear-gradient(135deg,#dc3250,#e74c3c)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🗑️ Xoá</button>

  );
